<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- スマホ幅は軽量なスマホ専用UI(m.html)へ即リダイレクト（3Dを読み込まない）。?force3d で従来の3D版を強制 -->
<script>
(function(){try{
  if(window.matchMedia('(max-width:680px)').matches && !/[?&]force3d\b/.test(location.search)){
    location.replace('m.html'+location.search+location.hash);
  }
}catch(e){}})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BODYVERSE</title>
<!-- ── PWA / iOS ホーム画面アプリ ── -->
<meta name="theme-color" content="#15171a">
<meta name="description" content="BODYVERSE — 体組成3Dビジュアライザー（個人トレーナー向け）">
<link rel="manifest" href="./manifest.webmanifest">
<!-- iOS Safari: スタンドアロン（フルスクリーン）起動 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BODYVERSE">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#15171a;--surf:#1e2024;--surf2:#2a2d33;
  --blue:#4f9fff;--green:#00e5a0;--red:#ff6b6b;--gold:#ffd060;
  --text:#e6e8ec;--muted:#9aa0aa;--border:#3a3f46}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:15.5px;
  -webkit-text-size-adjust:100%;text-size-adjust:100%}
/* PWA(iOS standalone): ノッチ/ホームインジケータを避ける safe-area。env()は通常ブラウザでは0 */
.wrap{padding-bottom:env(safe-area-inset-bottom)}
header{padding-top:calc(.28rem + env(safe-area-inset-top)) !important}
@supports(padding:max(0px)){
  header{padding-left:max(1.2rem,env(safe-area-inset-left));
    padding-right:max(1.2rem,env(safe-area-inset-right))}
}
/* スクロールバーを全体でダークグレーに統一（白いネイティブバー・上下ボタンを撤去） */
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;
  border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#4a505a;
  border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-button{display:none;width:0;height:0}
::-webkit-scrollbar-corner{background:transparent}
.wrap{display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh}
header{background:var(--surf);border-bottom:1px solid var(--border);
  padding:.28rem 1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
header h1{font-size:1rem;font-weight:700}
header small{color:var(--muted);font-size:.75rem}
/* Brand logo: transparent PNG, sits directly on the dark header */
.brand-logo{height:52px;width:auto;display:block;user-select:none}
.hbtns{display:flex;gap:.4rem;margin-left:auto}
.hbtn{background:var(--surf2);border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:.34rem .72rem;font-size:.82rem;cursor:pointer;transition:all .15s}
.hbtn.on,.hbtn:hover{background:var(--blue);border-color:var(--blue);color:#fff}
.hbtn.g.on,.hbtn.g:hover{background:var(--green);border-color:var(--green);color:#000}
/* custom customer dropdown (themed + scrollable) */
.csel-wrap{position:relative;display:inline-block}
.csel-btn{display:flex;align-items:center;gap:.3rem;max-width:150px}
.csel-btn .csel-lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.csel-btn .csel-arw{flex:0 0 auto;font-size:.6rem;opacity:.7}
.csel-menu{position:absolute;top:calc(100% + 4px);right:0;min-width:170px;max-height:240px;
  max-width:calc(100vw - 1.4rem);
  overflow-y:auto;background:var(--surf);border:1px solid var(--border);border-radius:6px;
  z-index:60;box-shadow:0 8px 26px rgba(0,0,0,.55);padding:4px;display:none}
.csel-menu.open{display:block}
.csel-item{padding:.4rem .6rem;border-radius:4px;font-size:.78rem;color:var(--text);
  cursor:pointer;white-space:nowrap;transition:background .12s}
.csel-item:hover{background:var(--surf2)}
.csel-item.sel{background:var(--blue);color:#fff}
.csel-item.ph{color:var(--muted)}
.csel-item.new{color:var(--blue);border-top:1px solid var(--border);margin-top:3px;padding-top:.5rem}
.csel-item.new:hover{background:rgba(79,159,255,.15)}
.csel-menu::-webkit-scrollbar{width:8px}
.csel-menu::-webkit-scrollbar-track{background:transparent}
.csel-menu::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.csel-menu::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.csel-dateitem{display:flex;align-items:center}
.csel-del{margin-left:auto;padding:.05rem .3rem;border-radius:4px;cursor:pointer;opacity:.55;font-size:.74rem;flex:0 0 auto}
.csel-del:hover{opacity:1;background:rgba(255,107,107,.22)}
/* month picker in header (save target month) */
.save-month{color-scheme:dark;color:var(--text);background:var(--surf2);
  font-size:.78rem;padding:.28rem .5rem;cursor:pointer}
.save-month::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer}
/* goal-progress HUD overlay (top-right of 3D viewport) */
.goal-hud{position:absolute;top:.7rem;right:.7rem;z-index:9;width:212px;
  background:rgba(30,32,36,.85);border:1px solid var(--border);border-radius:10px;
  padding:.6rem .7rem;backdrop-filter:blur(8px);box-shadow:0 6px 22px rgba(0,0,0,.45);display:none}
.goal-hud.show{display:block}
.gh-bar{display:flex;align-items:center;gap:.4rem;margin-bottom:.15rem}
.gh-title{font-size:.74rem;color:var(--blue);font-weight:700}
.gh-mini-pct{display:none;color:var(--green);font-size:1rem;line-height:1}
.gh-min{margin-left:auto;flex:0 0 auto;width:20px;height:20px;line-height:1;padding:0;
  background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;
  cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.gh-min:hover{color:var(--text);border-color:var(--muted);background:var(--surf2)}
/* collapsed (minimized) state → compact pill: 🎯 67% */
.goal-hud.min{width:auto;padding:.4rem .55rem;cursor:pointer}
.goal-hud.min .gh-date,.goal-hud.min .gh-overall,.goal-hud.min #ghRows,.goal-hud.min .gh-title{display:none}
.goal-hud.min .gh-bar{margin-bottom:0}
.goal-hud.min .gh-mini-pct{display:inline}
.gh-date{font-size:.62rem;color:var(--muted);margin-bottom:.45rem}
.gh-overall{display:flex;align-items:baseline;gap:.35rem;margin-bottom:.55rem}
.gh-overall b{font-size:1.5rem;color:var(--green);line-height:1}
.gh-overall span{font-size:.62rem;color:var(--muted)}
.gh-row{margin-bottom:.5rem}
.gh-head{display:flex;justify-content:space-between;align-items:baseline;font-size:.66rem;margin-bottom:.2rem}
.gh-head .gh-nm{color:var(--muted)}
.gh-head .gh-val .gh-cur{color:var(--text);font-weight:700}
.gh-head .gh-val .gh-goal{color:var(--muted);font-size:.6rem}
.gh-track{height:6px;background:var(--surf2);border-radius:3px;overflow:hidden}
.gh-fill{height:100%;border-radius:3px;transition:width .4s}
.gh-pct{font-size:.58rem;color:var(--muted);margin-top:.15rem;text-align:right}
.gh-empty{font-size:.66rem;color:var(--muted);line-height:1.55}
.main{display:grid;grid-template-columns:1fr 320px;overflow:hidden}
/* 3-D viewport */
.vp{position:relative;background:#060a14;overflow:hidden}
/* Fullscreen: the whole page (document root) goes fullscreen, so everything stays
   visible — header, 3-D viewport, right detail panel AND body-level overlays like
   the customer-management modal and toasts. The .wrap is already height:100vh so it
   fills; the ResizeObserver on the canvas parent re-sizes the renderer automatically. */
:root:fullscreen{background:var(--bg)}
:root:-webkit-full-screen{background:var(--bg)}
/* touch-action:none → タッチで3D回転/ピンチズーム（OrbitControls）を専有しページのスクロール/ズームと衝突させない */
#c{display:block;width:100%;height:100%;touch-action:none}
.overlay-btns{position:absolute;top:.7rem;left:.7rem;display:flex;flex-direction:column;gap:.4rem}
/* 体重トレンドの小さな常時表示ピル（左下）。warnは別途フルスクリーンも出す */
.wtrend-pill{position:absolute;left:.7rem;bottom:.7rem;z-index:9;display:none;align-items:center;gap:.4rem;
  padding:.32rem .62rem;border-radius:999px;font-size:.78rem;font-weight:700;color:var(--text);
  background:rgba(20,22,26,.84);border:1px solid var(--border);backdrop-filter:blur(4px)}
.wtrend-pill.show{display:inline-flex}
.wtrend-pill .wt-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.wtrend-pill.warn{border-color:#d9534f}
.wtrend-pill.warn .wt-dot{background:#ff5b5b;box-shadow:0 0 8px #ff5b5b}
.wtrend-pill.track{border-color:#1e9e6a}
.wtrend-pill.track .wt-dot{background:#19d390;box-shadow:0 0 8px #19d390}
.wtrend-pill.flat{border-color:#9aa3ad}
.wtrend-pill.flat .wt-dot{background:#9aa3ad}
.wtrend-pill.reached{border-color:#d4a017}
.wtrend-pill.reached .wt-dot{background:#f0c14b;box-shadow:0 0 8px #f0c14b}
.wtrend-pill .wt-delta{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
.ob{background:rgba(30,32,36,.85);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:.34rem .7rem;font-size:.8rem;cursor:pointer;
  backdrop-filter:blur(4px);transition:all .15s;white-space:nowrap}
.ob:hover,.ob.on{background:var(--blue);border-color:var(--blue);color:#fff}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:var(--muted);font-size:.85rem}
/* control panel */
.ctrl{background:var(--surf);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
/* モバイル下タブ＋シートの部品: PC幅では非表示。スマホ@mediaで有効化 */
.mnav,.m-backdrop,.sheet-close,.sheet-grip{display:none}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:.6rem .1rem;background:none;border:none;color:var(--muted);
  font-size:.86rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.pane{display:none;flex:1;overflow-y:auto;flex-direction:column;
  overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.pane.on{display:flex}
.sec{padding:.75rem;border-bottom:1px solid var(--border)}
.sec h3{font-size:.78rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:.55rem}
.gtog{display:flex;gap:.35rem;margin-bottom:.4rem}
.gtog button{flex:1;padding:.38rem;background:var(--surf2);
  border:1px solid var(--border);color:var(--text);border-radius:6px;
  cursor:pointer;font-size:.78rem;transition:all .15s}
.gtog button.on{background:var(--blue);border-color:var(--blue);color:#fff}
.sg{margin-bottom:.6rem}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.2rem}
.sh span{font-size:.88rem}
.sh b{font-size:.88rem;font-weight:700;color:var(--blue);min-width:54px;text-align:right}
.sg.tgt .sh b{color:var(--green)}
input[type=range]{width:100%;-webkit-appearance:none;height:3px;
  border-radius:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:13px;height:13px;border-radius:50%;background:var(--blue);cursor:pointer}
.sg.tgt input[type=range]::-webkit-slider-thumb{background:var(--green)}
.metrics{display:flex;flex-wrap:wrap;gap:.45rem;padding:.75rem}
.mc{background:var(--surf2);border:1px solid var(--border);border-radius:7px;
  padding:.45rem .65rem;flex:1;min-width:72px;text-align:center}
.mc .ml{font-size:.72rem;color:var(--muted);margin-bottom:.12rem}
.mc .mv{font-size:1.12rem;font-weight:800}
.mv.g{color:var(--green)}.mv.y{color:var(--gold)}.mv.r{color:var(--red)}
textarea{width:100%;background:var(--surf2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:.45rem;font-size:.7rem;
  resize:vertical;min-height:120px;font-family:monospace}
.pbtn{width:100%;margin-top:.38rem;padding:.45rem;background:var(--blue);
  color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.76rem;font-weight:700}
.pbtn.green{background:var(--green);color:#000}
.parse-msg{font-size:.7rem;color:var(--green);margin-top:.35rem;min-height:.9rem}
.quick-btns{display:flex;flex-direction:column;gap:.35rem}
.quick-btn{padding:.38rem .5rem;background:var(--surf2);border:1px solid var(--border);
  color:var(--text);border-radius:6px;cursor:pointer;font-size:.76rem;
  text-align:left;transition:all .15s}
.quick-btn:hover{border-color:var(--green);color:var(--green)}
/* InBody form */
.ib-form{display:flex;flex-direction:column;gap:.42rem}
.ib-sep{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);padding:.3rem 0 .1rem;border-bottom:1px solid var(--border);margin-top:.3rem}
.ib-row{display:grid;grid-template-columns:1fr 76px 34px;align-items:center;gap:.35rem}
.ib-row label{font-size:.76rem;color:var(--text)}
.ib-row input[type=number]{background:var(--surf2);border:1px solid var(--border);
  border-radius:5px;color:var(--text);padding:.3rem .45rem;font-size:.82rem;
  text-align:right;width:100%;-moz-appearance:textfield}
.ib-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.ib-row input[type=number]:focus{outline:none;border-color:var(--blue)}
.ib-row input[type=number].auto{color:var(--muted);font-style:italic}
.ib-row .unit{font-size:.7rem;color:var(--muted)}
.ib-row.info-only input{color:var(--muted)}
.ib-calc-note{font-size:.68rem;color:var(--muted);margin-top:.2rem;line-height:1.4}

/* ── Slider number input ── */
.sg-num{background:var(--surf2);border:1px solid var(--border);border-radius:4px;
  color:var(--blue);font-weight:700;font-size:.76rem;text-align:right;
  width:62px;padding:.16rem .3rem;-moz-appearance:textfield}
.sg-num::-webkit-inner-spin-button{-webkit-appearance:none}
.sg-num:focus{outline:none;border-color:var(--blue)}
.sg.tgt .sg-num{color:var(--green)}
.sg.tgt .sg-num:focus{border-color:var(--green)}

/* ── Segment Analysis Panel — left side panel ── */
.sp{
  position:absolute;top:0;left:0;bottom:0;width:300px;z-index:12;
  background:linear-gradient(180deg,rgba(26,28,32,.97) 0%,rgba(21,23,26,.95) 100%);
  border-right:1px solid rgba(79,159,255,.2);
  backdrop-filter:blur(16px);
  transform:translateX(-100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:8px 0 48px rgba(0,0,0,.65),inset 0 0 0 1px rgba(79,159,255,.04);
  overflow:hidden;
}
.sp::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;z-index:1;
  background:linear-gradient(90deg,transparent 0%,rgba(79,159,255,.75) 50%,transparent 100%);
}
.sp::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    180deg,transparent 0px,transparent 30px,
    rgba(79,159,255,.016) 30px,rgba(79,159,255,.016) 31px);
}
.sp.open{transform:translateX(0)}
.sp-head{
  padding:.72rem .82rem .58rem;
  border-bottom:1px solid rgba(79,159,255,.1);
  display:flex;align-items:center;gap:.45rem;
  flex-shrink:0;background:rgba(79,159,255,.035);position:relative;z-index:1;
}
.sp-head h3{
  font-size:.74rem;font-weight:900;text-transform:uppercase;
  letter-spacing:.12em;color:var(--blue);flex:1;
  text-shadow:0 0 16px rgba(79,159,255,.6);
}
.sp-close{
  background:none;border:1px solid rgba(79,159,255,.2);color:rgba(79,159,255,.45);
  cursor:pointer;font-size:.68rem;padding:.14rem .32rem;border-radius:4px;
  transition:all .15s;flex-shrink:0;line-height:1;
}
.sp-close:hover{color:var(--blue);background:rgba(79,159,255,.12);border-color:var(--blue)}
.sp-body{
  display:flex;flex-direction:column;gap:.48rem;
  padding:.6rem .68rem .7rem;overflow-y:auto;flex:1;position:relative;z-index:1;
}
.sp-radar-wrap{
  flex-shrink:0;background:#2a2d33;
  border:1px solid rgba(79,159,255,.16);border-radius:10px;padding:.6rem .55rem .4rem;
  position:relative;overflow:hidden;
}
.sp-radar-wrap canvas{width:100%!important;height:268px!important}
.sp-radar-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:10px;
  background:radial-gradient(ellipse at 50% 45%,rgba(79,159,255,.09) 0%,transparent 65%);
}
.sp-radar-wrap h4{
  font-size:.76rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.12em;color:rgba(79,159,255,.7);text-align:center;margin-bottom:.4rem;
}
.sp-cards{display:flex;flex-direction:column;gap:.38rem}
.sc{
  background:rgba(79,159,255,.04);
  border:1px solid rgba(79,159,255,.13);border-left:2px solid rgba(79,159,255,.35);
  border-radius:0 9px 9px 0;padding:.5rem .6rem;
  display:flex;flex-direction:column;gap:.28rem;
  transition:border-color .2s,background .2s,box-shadow .2s;position:relative;overflow:hidden;
}
.sc:hover{
  border-color:rgba(79,159,255,.3);border-left-color:rgba(79,159,255,.7);
  background:rgba(79,159,255,.075);box-shadow:0 2px 16px rgba(79,159,255,.08);
}
.sc.editing{border-left-color:var(--blue)}
.sc-name{
  font-size:.74rem;font-weight:900;color:rgba(160,176,212,.95);
  text-transform:uppercase;letter-spacing:.1em;
  display:flex;align-items:center;gap:.3rem;
}
.sc-name::before{
  content:'';display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--blue);box-shadow:0 0 8px rgba(79,159,255,.8),0 0 16px rgba(79,159,255,.3);
  flex-shrink:0;
}
.sc-bar-row{display:flex;align-items:center;gap:.34rem}
.sc-bar-lbl{font-size:.72rem;color:var(--muted);width:14px;flex-shrink:0;text-align:center;font-weight:700}
.sc-bar-bg{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:4px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.sc-bar-val{font-size:.8rem;font-weight:800;width:42px;text-align:right;flex-shrink:0}
.sc-ratio{
  font-size:.7rem;color:rgba(160,176,212,.7);
  display:flex;justify-content:space-between;
  padding-top:.22rem;border-top:1px solid rgba(79,159,255,.07);
}
.sc-ratio span{font-weight:700}
.sc-ratio .rm{color:rgba(0,229,160,.7)}
.sc-ratio .rf{color:rgba(255,208,96,.7)}
/* 初回 → 現在 （目標）の併記 */
.sc-cmp{margin-top:.28rem;display:flex;flex-direction:column;gap:.16rem}
.sc-cmp-row{font-size:.66rem;color:var(--muted);display:flex;align-items:baseline;gap:.3rem;line-height:1.35}
.sc-cmp-tag{font-weight:800;flex-shrink:0;width:1.1em}
.sc-cmp-body{font-weight:600;letter-spacing:.01em}
/* edit inputs in segment panel */
.sc-edit{display:none;flex-direction:column;gap:.22rem;margin-top:.28rem;
  border-top:1px solid rgba(79,159,255,.1);padding-top:.28rem}
.sc.editing .sc-edit{display:flex}
.sc-edit-row{display:flex;align-items:center;gap:.3rem}
.sc-edit-lbl{font-size:.6rem;color:var(--muted);width:14px}
.sc-edit input{background:rgba(6,10,22,.8);border:1px solid rgba(79,159,255,.2);border-radius:4px;
  color:var(--text);font-size:.74rem;padding:.18rem .3rem;text-align:right;
  -moz-appearance:textfield;flex:1}
.sc-edit input::-webkit-inner-spin-button{-webkit-appearance:none}
.sc-edit input:focus{outline:none;border-color:var(--blue)}
.sc-edit-unit{font-size:.6rem;color:var(--muted)}
.sc-edit-save{background:var(--blue);border:none;color:#fff;border-radius:4px;
  font-size:.66rem;font-weight:700;padding:.22rem .45rem;cursor:pointer;width:100%;margin-top:.18rem;
  box-shadow:0 0 12px rgba(79,159,255,.35)}
/* ── Segment input grid (in 基本情報 section) ── */
.sgi-wrap{display:flex;flex-direction:column;gap:.3rem;margin-top:.35rem}
.sgi-head{display:grid;grid-template-columns:46px 1fr 1fr;gap:.3rem .45rem;
  padding:.0 0 .32rem;border-bottom:1px solid var(--border)}
.sgi-head span{font-size:.74rem;color:var(--muted);text-align:center;font-weight:700;
  letter-spacing:.02em}
.sgi-head span:first-child{text-align:left}
.sgi-row{display:grid;grid-template-columns:46px 1fr 1fr;gap:.3rem .45rem;align-items:center}
.sgi-name{font-size:.88rem;font-weight:700;color:var(--text)}
.sgi-cell{display:flex;align-items:center;gap:.22rem}
.sgi-cell input{background:var(--surf2);border:1px solid var(--border);border-radius:5px;
  color:var(--text);font-size:.92rem;padding:.3rem .34rem;text-align:right;
  width:100%;-moz-appearance:textfield;min-width:0}
.sgi-cell input::-webkit-inner-spin-button{-webkit-appearance:none}
.sgi-cell input:focus{outline:none;border-color:var(--blue)}
.sgi-unit{font-size:.72rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.sgi-derived{font-size:.74rem;color:var(--muted);text-align:right;
  grid-column:1/-1;padding:.15rem 0 .1rem;border-top:1px solid var(--border)}

/* ── Body Annotation Overlay ── */
.anno-layer{position:absolute;inset:0;pointer-events:none;z-index:8;overflow:hidden}
.anno-svg{position:absolute;inset:0;width:100%;height:100%}
.anno-card{position:absolute;background:rgba(4,8,22,.93);
  border:1px solid rgba(79,159,255,.32);border-radius:9px;
  padding:.5rem .58rem;min-width:138px;max-width:158px;
  box-shadow:0 4px 24px rgba(0,0,0,.55);transition:opacity .3s}
.anno-card.hidden{opacity:0;pointer-events:none}
.ac-head{display:flex;align-items:center;gap:.3rem;margin-bottom:.4rem}
.ac-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.ac-name{font-size:.8rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.08em;color:var(--blue)}
.ac-row{display:flex;align-items:center;gap:.34rem;margin-bottom:.26rem}
.ac-lbl{font-size:.72rem;color:var(--muted);width:16px;flex-shrink:0}
.ac-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.ac-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.ac-val{font-size:.82rem;font-weight:800;width:46px;text-align:right;flex-shrink:0}
.ac-val.m{color:var(--green)}.ac-val.f{color:var(--gold)}
.ac-delta{display:inline-block;font-size:.66rem;font-weight:700;
  padding:.03rem .25rem;border-radius:3px;margin-left:.2rem}
.ac-delta.up{background:rgba(0,229,160,.2);color:var(--green)}
.ac-delta.dn{background:rgba(255,107,107,.2);color:var(--red)}
.anno-btn{background:rgba(30,32,36,.9);border:1px solid var(--border);
  color:var(--blue);border-radius:6px;padding:.3rem .6rem;
  font-size:.7rem;cursor:pointer;transition:all .15s}
.anno-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.sp-toggle-btn{
  position:absolute;top:50%;left:0;
  transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,16,36,.95);
  border:1px solid rgba(79,159,255,.45);border-left:none;
  border-radius:0 10px 10px 0;
  color:var(--blue);
  cursor:pointer;padding:.5rem .3rem;
  backdrop-filter:blur(8px);
  transition:left .32s cubic-bezier(.4,0,.2,1),background .15s,color .15s,border-color .15s,box-shadow .15s;
  z-index:13;
  box-shadow:2px 0 22px rgba(79,159,255,.22),inset -1px 0 0 rgba(79,159,255,.08);
  animation:spTabPulse 3.2s ease-in-out infinite;
}
.sp-toggle-btn .sp-toggle-arw{font-size:.72rem;opacity:.8;transition:transform .25s}
.sp-toggle-btn:hover{background:rgba(79,159,255,.2);border-color:rgba(79,159,255,.72);box-shadow:2px 0 30px rgba(79,159,255,.42)}
.sp-toggle-btn:hover .sp-toggle-arw{transform:translateX(3px)}
.sp-toggle-btn.open{
  left:300px;color:rgba(122,138,176,.7);
  border-color:rgba(79,159,255,.2);box-shadow:2px 0 12px rgba(0,0,0,.35);
  animation:none;
}
.sp-toggle-btn.open .sp-toggle-arw{transform:rotate(180deg)}
@keyframes spTabPulse{
  0%,100%{box-shadow:2px 0 22px rgba(79,159,255,.22),inset -1px 0 0 rgba(79,159,255,.08)}
  50%{box-shadow:2px 0 30px rgba(79,159,255,.4),inset -1px 0 0 rgba(79,159,255,.12)}
}
@media (prefers-reduced-motion:reduce){.sp-toggle-btn{animation:none}}

/* ── Customer Management Modal ── */
.cm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:none;align-items:center;justify-content:center}
.cm-overlay.open{display:flex}
.cm-modal{background:var(--surf);border:1px solid var(--border);border-radius:12px;
  width:min(96vw,1040px);height:min(92vh,740px);
  display:grid;grid-template-rows:auto 1fr;overflow:hidden;
  box-shadow:0 24px 64px rgba(0,0,0,.6)}
/* modal header */
.cm-head{background:var(--surf2);border-bottom:1px solid var(--border);
  padding:.6rem 1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
/* modal body */
.cm-body{display:grid;grid-template-columns:190px 1fr;overflow:hidden;min-height:0}
/* sidebar */
.cm-side{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cm-side-lbl{padding:.5rem .75rem;border-bottom:1px solid var(--border);
  font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.cm-side-search{padding:.5rem .6rem;border-bottom:1px solid var(--border)}
.cm-side-search input{width:100%;box-sizing:border-box;background:var(--surf2);
  border:1px solid var(--border);color:var(--text);border-radius:6px;
  padding:.4rem .55rem;font-size:.78rem;outline:none}
.cm-side-search input:focus{border-color:var(--blue)}
.cm-side-search input::placeholder{color:var(--muted)}
.cm-cust-list{flex:1;overflow-y:auto}
.cm-ci{padding:.55rem .7rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.cm-ci:hover{background:var(--surf2)}
.cm-ci.sel{background:rgba(79,159,255,.1);border-left:3px solid var(--blue)}
.cm-ci-name{font-size:.82rem;font-weight:600;color:var(--text)}
.cm-ci-namerow{display:flex;align-items:center;gap:.34rem;justify-content:space-between}
.cm-ci-sub{font-size:.66rem;color:var(--muted);margin-top:.12rem}
.cm-ci.sel .cm-ci-name{color:var(--blue)}
.cm-ci-badge{font-size:.56rem;font-weight:700;padding:.08rem .3rem;border-radius:10px;
  white-space:nowrap;flex:0 0 auto;line-height:1.5}
.cm-ci-badge.ok{color:var(--green);background:rgba(0,229,160,.13);border:1px solid rgba(0,229,160,.33)}
.cm-ci-badge.pending{color:var(--gold);background:rgba(255,208,96,.13);border:1px solid rgba(255,208,96,.4)}
.cm-ci-badge.paused{color:#cbd2db;background:rgba(154,160,170,.16);border:1px solid rgba(154,160,170,.42)}
.cm-ci.paused{opacity:.6}
.cm-ci.paused.sel{opacity:1}
.cm-side-foot{padding:.6rem;border-top:1px solid var(--border)}
/* main area */
.cm-main{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cm-cust-hdr{padding:.55rem .8rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:.5rem;min-height:46px;flex-shrink:0}
.cm-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 .6rem;flex-shrink:0}
.cm-tab{padding:.5rem .7rem;background:none;border:none;color:var(--muted);font-size:.76rem;
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.cm-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.cm-pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.cm-pane.on{display:flex}
/* records pane */
.cm-rec-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
  padding:.5rem .6rem;border-bottom:1px solid var(--border);background:var(--surf2)}
.cm-rec-bar-cnt{flex:1;min-width:140px;font-size:.7rem;color:var(--muted)}
.cm-rec-bar .cbtn:disabled{opacity:.45;cursor:not-allowed}
.cm-rec-scroll{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cm-tbl{width:100%;border-collapse:collapse;font-size:.76rem}
.cm-tbl th{background:var(--surf2);color:var(--muted);font-size:.64rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;padding:.45rem .55rem;
  text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
.cm-tbl th:nth-child(2){text-align:left}
.cm-tbl th:first-child{text-align:center;width:1%}
.cm-tbl td{padding:.42rem .55rem;border-bottom:1px solid var(--border);
  text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.cm-tbl td:nth-child(2){text-align:left;font-weight:600}
.cm-tbl td:first-child{text-align:center}
.cm-tbl input[type=checkbox]{cursor:pointer;accent-color:var(--blue);width:15px;height:15px}
.cm-tbl tr:hover td{background:var(--surf2)}
/* charts pane */
.cm-range-bar{display:flex;gap:.35rem;margin-bottom:.6rem;flex-wrap:wrap;padding:.6rem .7rem 0}
.cm-range-btn{padding:.3rem .7rem;background:var(--surf2);border:1px solid var(--border);
  border-radius:999px;color:var(--muted);font-size:.7rem;cursor:pointer;transition:all .15s}
.cm-range-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.cm-range-btn:hover{border-color:var(--blue)}
.cm-charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;
  padding:.7rem;overflow-y:auto;align-content:start}
.cm-chart-box{background:var(--surf2);border:1px solid var(--border);
  border-radius:8px;padding:.6rem}
.cm-chart-box h4{font-size:.68rem;color:var(--muted);margin-bottom:.35rem;font-weight:600}
/* add-record form */
.cm-add-form{border-top:1px solid var(--border);background:var(--surf2);
  padding:.65rem .8rem;flex-shrink:0}
.cm-add-form h4{font-size:.68rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:.55rem}
.af-status{font-size:.7rem;padding:.32rem .55rem;border-radius:6px;margin-bottom:.5rem}
.af-status.update{background:rgba(255,208,96,.15);color:#ffd060;border:1px solid rgba(255,208,96,.35)}
.af-status.new{background:rgba(0,229,160,.12);color:#00e5a0;border:1px solid rgba(0,229,160,.3)}
.cm-fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:.45rem;margin-bottom:.5rem}
.cm-field{display:flex;flex-direction:column;gap:.18rem}
.cm-field label{font-size:.66rem;color:var(--muted)}
.cm-field input{background:var(--surf);border:1px solid var(--border);border-radius:5px;
  color:var(--text);padding:.28rem .4rem;font-size:.78rem;
  text-align:right;width:100%;-moz-appearance:textfield}
.cm-field input[type=text]{text-align:left}
.cm-field input[type=date]{text-align:left}
.cm-field input::-webkit-inner-spin-button{-webkit-appearance:none}
.cm-field input:focus{outline:none;border-color:var(--blue)}
/* new customer form */
.cm-new-form{padding:1rem;display:flex;flex-direction:column;gap:.55rem;max-width:320px}
.cm-new-form label{font-size:.78rem;color:var(--text);font-weight:600}
.cm-new-form input,.cm-new-form select{
  background:var(--surf2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:.38rem .55rem;font-size:.85rem;width:100%}
.cm-new-form input:focus,.cm-new-form select:focus{outline:none;border-color:var(--blue)}
/* empty state */
.cm-empty{flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:.6rem;color:var(--muted);font-size:.82rem;padding:2rem}
/* shared buttons */
.cbtn{padding:.36rem .72rem;border-radius:6px;font-size:.76rem;font-weight:600;
  cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.cbtn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.cbtn-green{background:var(--green);color:#000;border-color:var(--green)}
.cbtn-ghost{background:var(--surf2);color:var(--text);border-color:var(--border)}
.cbtn-red{background:rgba(255,107,107,.12);color:var(--red);border-color:rgba(255,107,107,.3)}
.cbtn-sm{padding:.22rem .5rem;font-size:.68rem}
.cbtn:disabled{opacity:.4;cursor:default}

/* ── Summary / analysis pane (顧客管理) ── */
.cm-sum-scroll{flex:1;overflow-y:auto;padding:.7rem .8rem 1rem}
.roster-chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.1rem}
.roster-chip{font-size:.72rem;padding:.28rem .55rem;border-radius:14px;cursor:pointer;
  background:rgba(255,208,96,.12);color:var(--gold);border:1px solid rgba(255,208,96,.38);transition:background .15s}
.roster-chip:hover{background:rgba(255,208,96,.26)}
.roster-chip.paused{background:rgba(154,160,170,.15);color:#cbd2db;border:1px solid rgba(154,160,170,.4)}
.roster-chip.paused:hover{background:rgba(154,160,170,.3)}
.roster-allok{font-size:.82rem;color:var(--green);font-weight:600;padding:.35rem .1rem}
.roster-allok.muted{color:var(--muted)}
.rsheet-box{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:.6rem .7rem;margin-bottom:.5rem}
.rsheet-note{font-size:.72rem;color:var(--muted);flex:1;min-width:180px;line-height:1.4}
/* 新規契約率（成約率）セクション */
.sales-form{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:.6rem .7rem;margin-bottom:.5rem}
.sales-frow{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.45rem}
.sales-frow:last-child{margin-bottom:0}
.sales-flbl{font-size:.74rem;color:var(--text);min-width:8.4em}
.sales-month{background:var(--surf);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.25rem .4rem;font-size:.78rem;color-scheme:dark}
.sales-num{width:4rem;background:var(--surf);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.25rem .4rem;font-size:.8rem;text-align:right}
.sales-numlbl{font-size:.68rem;color:var(--muted)}
.sales-tbl-wrap{overflow-x:auto;margin-top:.1rem}
.sales-tbl{width:100%;border-collapse:collapse;font-size:.72rem;white-space:nowrap}
.sales-tbl th,.sales-tbl td{padding:.3rem .45rem;border-bottom:1px solid var(--border);text-align:right}
.sales-tbl th{color:var(--muted);font-weight:700}
.sales-tbl th:first-child,.sales-tbl td:first-child{text-align:left}
.sales-tbl .sgrp-c{color:#4f9fff}
.sales-tbl .sgrp-t{color:#00e5a0}
.sales-tbl .sales-rate{font-weight:800}
.sales-del{cursor:pointer;color:var(--muted);background:none;border:none;font-size:.8rem;padding:.1rem .3rem;border-radius:5px}
.sales-del:hover{color:var(--red);background:rgba(255,107,107,.12)}
.sales-note{font-size:.66rem;color:var(--muted);margin:.3rem 0 .1rem;line-height:1.5}
.cm-sec-title{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);margin:.9rem 0 .5rem;display:flex;align-items:center;gap:.4rem}
.cm-sec-title:first-child{margin-top:.1rem}
.cm-sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:.5rem}
.cm-sum-card{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:.55rem .6rem}
.cm-sum-card .l{font-size:.62rem;color:var(--muted);margin-bottom:.18rem}
.cm-sum-card .v{font-size:1.08rem;font-weight:800;line-height:1.1}
.cm-sum-card .sub{font-size:.6rem;color:var(--muted);margin-top:.2rem}
.cm-delta{display:inline-block;font-size:.6rem;font-weight:800;padding:.05rem .3rem;border-radius:4px;margin-top:.22rem}
.cm-delta.good{background:rgba(0,229,160,.16);color:var(--green)}
.cm-delta.bad{background:rgba(255,107,107,.16);color:var(--red)}
.cm-delta.flat{background:rgba(122,138,176,.16);color:var(--muted)}
.cm-delta.tiny{font-size:.56rem;padding:.02rem .22rem;margin:0}
/* health risk band */
.cm-risk-row{margin-bottom:.7rem}
.cm-risk-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.28rem}
.cm-risk-head .nm{font-size:.74rem;font-weight:600}
.cm-risk-head .vl{font-size:.78rem;font-weight:800}
.cm-risk-chip{font-size:.58rem;font-weight:800;padding:.05rem .35rem;border-radius:4px;margin-left:.35rem}
.cm-risk-track{position:relative;display:flex;height:9px;border-radius:5px;overflow:hidden}
.cm-risk-zone{height:100%}
.cm-risk-marker{position:absolute;top:-3px;width:2px;height:15px;background:#fff;
  box-shadow:0 0 4px rgba(0,0,0,.7);border-radius:1px;transform:translateX(-1px)}
.cm-risk-scale{display:flex;justify-content:space-between;font-size:.54rem;color:var(--muted);margin-top:.16rem}
/* goal progress */
.cm-goal-row{margin-bottom:.6rem}
.cm-goal-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.24rem;font-size:.72rem}
.cm-goal-head b{font-weight:800}
.cm-prog-track{height:10px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.cm-prog-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cm-goal-edit{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:.45rem;
  background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:.6rem;margin-top:.3rem}
.cm-goal-edit .f{display:flex;flex-direction:column;gap:.16rem}
.cm-goal-edit label{font-size:.62rem;color:var(--muted)}
.cm-goal-edit input{background:var(--surf);border:1px solid var(--border);border-radius:5px;color:var(--text);
  padding:.26rem .4rem;font-size:.78rem;text-align:right;-moz-appearance:textfield}
.cm-goal-edit input::-webkit-inner-spin-button{-webkit-appearance:none}
.cm-goal-edit input:focus{outline:none;border-color:var(--green)}
.cm-goal-edit select{background:var(--surf);border:1px solid var(--border);border-radius:5px;color:var(--text);
  padding:.26rem .4rem;font-size:.78rem;color-scheme:dark}
.cm-goal-edit select:focus{outline:none;border-color:var(--green)}
/* segment subsection in add-record form */
.cm-seg-sub{grid-column:1/-1;border-top:1px dashed var(--border);margin-top:.3rem;padding-top:.4rem;
  font-size:.62rem;color:var(--muted);font-weight:700}
.cm-empty-mini{color:var(--muted);font-size:.72rem;padding:.5rem .2rem}

/* ───────── Responsive: tablet & phone ───────── */
@media(max-width:980px){
  /* tablet: narrow the side control panel */
  .main{grid-template-columns:1fr 264px}
  header h1{font-size:.95rem}
  .brand-logo{height:56px}
}
@media(max-width:680px){
  /* phone: 3Dを画面いっぱいに表示し、操作は下からせり上がるシートにする */
  .main{grid-template-columns:1fr;grid-template-rows:1fr}
  .wrap{padding-bottom:calc(56px + env(safe-area-inset-bottom))}
  .ctrl{position:fixed;left:0;right:0;bottom:0;top:auto;height:84vh;max-height:84vh;
    transform:translateY(110%);transition:transform .28s ease;z-index:60;
    border-left:none;border-top:1px solid var(--border);
    border-radius:18px 18px 0 0;box-shadow:0 -12px 40px rgba(0,0,0,.55)}
  .ctrl.sheet-open{transform:translateY(0)}
  /* compact header with a horizontally-scrollable button row */
  header{padding:.5rem .7rem;gap:.45rem}
  header h1{font-size:.9rem}
  header small{display:none}
  .brand-logo{height:46px}
  .hbtns{margin-left:0;width:100%;flex-wrap:nowrap;overflow-x:auto;
    -webkit-overflow-scrolling:touch;padding-bottom:.15rem;scrollbar-width:none}
  .hbtns::-webkit-scrollbar{height:0;width:0}
  .hbtn{flex:0 0 auto;white-space:nowrap;padding:.42rem .7rem}
  .csel-btn{max-width:118px}
  /* iOS Safari: フォントが16px未満の入力欄はフォーカス時に自動ズームする→スマホでは16pxに固定 */
  input,select,textarea{font-size:16px !important}
  /* スマホ: 視点ボタンは上部に横並びの小チップ、注釈/全画面は省いて3Dを主役に */
  .overlay-btns{top:.5rem;left:.5rem;flex-direction:row;flex-wrap:wrap;gap:.28rem;
    align-items:flex-start;max-width:74vw}
  .ob{padding:.28rem .55rem;font-size:.7rem;min-height:0;white-space:nowrap;opacity:.92;margin-top:0 !important}
  #annoBtn,#btnFullscreen{display:none}
  .tab{padding:.7rem .1rem;min-height:46px;font-size:.84rem}
  .hbtn{min-height:38px}
  .sp-toggle-btn{padding:.8rem .55rem}
  /* slide-in panels / HUD must not exceed the viewport */
  .sp{width:min(300px,88vw)}
  .goal-hud{width:188px}
  /* customer modal → full screen, stacked sidebar/main */

  .wtrend-pill{bottom:calc(56px + env(safe-area-inset-bottom) + .5rem)}

.eva-warn{position:fixed;inset:0;z-index:99999;display:none;
  align-items:center;justify-content:center;
  font-family:'Impact','Arial Black','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;

.eva-warn.show{display:flex}
/* 赤フラッシュ背景 */
.eva-warn .eva-flash{position:absolute;inset:0;background:#b00000;
  animation:evaFlash .42s steps(1,end) infinite}
@keyframes evaFlash{0%,49%{opacity:.30}50%,100%{opacity:.62}}
/* スキャンライン */
.eva-warn .eva-scan{position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.55) 0 2px,transparent 2px 4px)}
/* 上下ハザード斜線バー */
.eva-warn .eva-hazard{position:absolute;left:0;right:0;height:34px;
  background:repeating-linear-gradient(45deg,#ffb400 0 22px,#0a0a0a 22px 44px);
  animation:evaHazard .6s linear infinite}
.eva-warn .eva-hazard.top{top:0}
.eva-warn .eva-hazard.bot{bottom:0}
@keyframes evaHazard{from{background-position:0 0}to{background-position:62px 0}}
/* 中央の角ばったパネル */
.eva-warn .eva-core{position:relative;text-align:center;color:#0a0a0a;padding:2.4rem 3rem;
  background:#ffb400;
  clip-path:polygon(0 14px,14px 0,calc(100% - 14px) 0,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0 calc(100% - 14px));
  box-shadow:0 0 0 4px #0a0a0a,0 0 60px rgba(0,0,0,.6);
  animation:evaCore .42s steps(1,end) infinite;max-width:92vw}
@keyframes evaCore{0%,49%{transform:scale(1)}50%,100%{transform:scale(1.015)}}
.eva-warn .eva-warnword{font-size:clamp(2.6rem,11vw,6.4rem);font-weight:900;letter-spacing:.18em;
  line-height:.95;margin:0;text-shadow:3px 3px 0 #b00000}

  font-family:'Courier New',monospace;font-weight:700}

  letter-spacing:.12em;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}

.eva-warn .eva-ack{pointer-events:auto;cursor:pointer;margin-top:1.4rem;
  background:#0a0a0a;color:#ffb400;border:2px solid #0a0a0a;
  font-family:'Courier New',monospace;font-weight:700;letter-spacing:.3em;

.eva-warn .eva-ack:hover{background:#ffb400;color:#0a0a0a;border-color:#0a0a0a}

/* ── 「順調」版（目標へ前進＝増量で増・減量で減）：点滅なし・落ち着いた高級感 ── */
.eva-warn.calm{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Segoe UI',sans-serif}
.eva-warn.calm .eva-hazard,.eva-warn.calm .eva-scan{display:none}          /* ハザード/スキャンは消す */
.eva-warn.calm .eva-flash{background:radial-gradient(120% 120% at 50% 30%,rgba(8,20,28,.62),rgba(4,8,12,.82));

  color:#eafdf8;animation:evaCalmIn .55s cubic-bezier(.2,.8,.25,1) both;   /* 一度だけのフェードイン（点滅しない） */
  box-shadow:0 0 0 1px rgba(0,229,200,.55),0 0 34px rgba(0,229,200,.14),0 24px 70px rgba(0,0,0,.6);

.eva-warn.calm .eva-warnword small{color:#00e5c8;opacity:.95}

.eva-warn.calm .eva-ack{background:transparent;color:#00e5c8;border:1px solid #00e5c8}
.eva-warn.calm .eva-ack:hover{background:#00e5c8;color:#072019;border-color:#00e5c8}

@media (prefers-reduced-motion:reduce){

}
