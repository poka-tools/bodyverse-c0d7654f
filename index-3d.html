/* Horizontal reference-band bar with a marker at the current value. */
const CM_ZONE = { g:{fill:'rgba(0,229,160,.32)', solid:'#00e5a0'},
                  y:{fill:'rgba(255,208,96,.32)', solid:'#ffd060'},
                  r:{fill:'rgba(255,107,107,.32)', solid:'#ff6b6b'} };
function cmRiskBand(name, value, unit, zones, dispMin, dispMax) {
  const row = document.createElement('div'); row.className = 'cm-risk-row';
  const head = document.createElement('div'); head.className = 'cm-risk-head';
  const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = name;
  const right = document.createElement('span');
  const vl = document.createElement('span'); vl.className = 'vl';
  vl.textContent = (value == null ? '—' : (Number.isInteger(value) ? value : value.toFixed(1))) + (unit || '');
  right.appendChild(vl);
  // current zone → chip
  let zone = zones[zones.length - 1];
  if (value != null) zone = zones.find(z => value <= z.to) || zone;
  if (value != null) {
    const chip = document.createElement('span'); chip.className = 'cm-risk-chip';
    chip.style.background = CM_ZONE[zone.c].fill; chip.style.color = CM_ZONE[zone.c].solid;
    chip.textContent = zone.label; right.appendChild(chip);
  }
  head.appendChild(nm); head.appendChild(right); row.appendChild(head);

  const track = document.createElement('div'); track.className = 'cm-risk-track';
  let prevTo = dispMin;
  zones.forEach(z => {
    const seg = document.createElement('div'); seg.className = 'cm-risk-zone';
    const w = Math.max(0, (Math.min(z.to, dispMax) - prevTo) / (dispMax - dispMin) * 100);
    seg.style.width = w + '%'; seg.style.background = CM_ZONE[z.c].fill;
    track.appendChild(seg); prevTo = z.to;
  });
  if (value != null) {
    const mk = document.createElement('div'); mk.className = 'cm-risk-marker';
    const p = Math.max(0, Math.min(1, (value - dispMin) / (dispMax - dispMin))) * 100;
    mk.style.left = p + '%'; track.appendChild(mk);
  }
  row.appendChild(track);

  const scale = document.createElement('div'); scale.className = 'cm-risk-scale';
  const lo = document.createElement('span'); lo.textContent = dispMin;
  const hi = document.createElement('span'); hi.textContent = dispMax + (unit || '');
  scale.appendChild(lo); scale.appendChild(hi); row.appendChild(scale);
  return row;
}

/* ═══════════════════════════════════════

function renderSummary(cust) {

  const grid = document.createElement('div'); grid.className = 'cm-sum-grid';
  const age = cmAge(cust);
  const bmi = cmBMI(latest, cust), lbm = cmLBM(latest);
  const bmiPrev = prev ? cmBMI(prev, cust) : null, lbmPrev = prev ? cmLBM(prev) : null;
  const ffmi = cmFFMInorm(latest, cust), fmi = cmFMI(latest, cust), fatMass = cmFatMass(latest);
  const ffmiPrev = prev ? cmFFMInorm(prev, cust) : null, fmiPrev = prev ? cmFMI(prev, cust) : null, fatPrev = prev ? cmFatMass(prev) : null;
  const initSub = (c, b, dg=1, u='') => (b != null && c != null && first !== latest) ? `初回比 ${(c-b>=0?'+':'')}${(c-b).toFixed(dg)}${u}` : '';

  const cards = [
    ['体重', latest.weight, 'kg', prev?.weight, first?.weight, {lowerBetter:true, neutral:true, unit:'kg'}, null],
    ['体脂肪率', latest.bodyFatPct, '%', prev?.bodyFatPct, first?.bodyFatPct, {lowerBetter:true, unit:'%'}, 'var(--red)'],

    ['体脂肪量', fatMass, 'kg', fatPrev, (first?cmFatMass(first):null), {lowerBetter:true, unit:'kg'}, 'var(--red)'],
    ['FFMI', ffmi, '', ffmiPrev, (first?cmFFMInorm(first,cust):null), {lowerBetter:false}, 'var(--blue)'],
    ['FMI', fmi, '', fmiPrev, (first?cmFMI(first,cust):null), {lowerBetter:true}, 'var(--gold)'],

      const big = document.createElement('span'); big.style.cssText = `font-size:1.85rem;font-weight:800;line-height:1;color:${col}`; big.textContent = `${op.pct}%`;

        ['目標骨格筋率', goal.muscleMass, '%', latest.muscleMass, 1],
        ['目標内臓脂肪Lv', goal.visceralFat, '', latest.visceralFat, 1],

  const bf = cmBodyFatZones(cust.gender, age);

  if (ffmi != null) scroll.appendChild(cmRiskBand('FFMI（筋肉の発達度）', ffmi, '', fz.zones, fz.min, fz.max));

/* Goal progress bars (initial → goal). */
function cmGoalProgress(cust, first, latest) {
  const box = document.createElement('div');
  const goal = cust.goal;
  const metrics = [
    { k:'weight',     lbl:'体重',     unit:'kg' },
    { k:'bodyFatPct', lbl:'体脂肪率', unit:'%'  },
    { k:'muscleMass', lbl:'骨格筋率', unit:'%'  },
  ];
  const active = goal && metrics.some(m => goal[m.k] != null);
  if (!active) {
    const hint = document.createElement('div'); hint.className = 'cm-empty-mini';
    hint.textContent = 'まだ目標が未設定です。下のフォームで目標値を保存すると、達成率バーが表示されます。';
    box.appendChild(hint); return box;
  }
  metrics.forEach(m => {
    const g = goal[m.k], cur = latest?.[m.k], start = (first?.[m.k] ?? cur);
    if (g == null || cur == null) return;
    const row = document.createElement('div'); row.className = 'cm-goal-row';
    const head = document.createElement('div'); head.className = 'cm-goal-head';
    const nm = document.createElement('span'); nm.textContent = m.lbl;
    const vs = document.createElement('span');
    const denom = g - start;
    let pct = denom === 0 ? (Math.abs(cur - g) < 1e-9 ? 100 : 0) : ((cur - start) / denom) * 100;
    pct = Math.max(0, Math.min(100, pct));
    const remain = (g - cur);
    const b = document.createElement('b'); b.textContent = `${cur.toFixed(1)}`;
    vs.appendChild(b);
    vs.appendChild(document.createTextNode(` / 目標 ${g.toFixed(1)}${m.unit}　達成 ${pct.toFixed(0)}%`));
    head.appendChild(nm); head.appendChild(vs); row.appendChild(head);
    const track = document.createElement('div'); track.className = 'cm-prog-track';
    const fill = document.createElement('div'); fill.className = 'cm-prog-fill';
    fill.style.width = pct + '%';
    fill.style.background = pct >= 100 ? 'linear-gradient(90deg,#00e5a0,#4f9fff)'
                          : pct >= 50  ? 'linear-gradient(90deg,rgba(0,229,160,.5),#00e5a0)'
                                       : 'linear-gradient(90deg,rgba(255,208,96,.5),#ffd060)';
    track.appendChild(fill); row.appendChild(track);
    const note = document.createElement('div'); note.style.cssText = 'font-size:.6rem;color:var(--muted);margin-top:.2rem';
    note.textContent = Math.abs(remain) < 1e-9 ? '目標達成！' : `目標まで ${remain > 0 ? '+' : ''}${remain.toFixed(1)}${m.unit}`;
    row.appendChild(note); box.appendChild(row);
  });
  return box;
}

/* Overall goal achievement (%) — average of per-metric progress (初回→目標 に対する現在地).
   Uses the same per-metric formula as cmGoalProgress. Returns {pct,count} or null. */
function cmOverallProgress(cust, first, latest) {
  const goal = cust.goal; if (!goal) return null;
  let sum = 0, n = 0;
  ['weight', 'bodyFatPct', 'muscleMass'].forEach(k => {
    const g = goal[k], cur = latest?.[k], start = (first?.[k] ?? cur);
    if (g == null || cur == null) return;
    const denom = g - start;
    let pct = denom === 0 ? (Math.abs(cur - g) < 1e-9 ? 100 : 0) : ((cur - start) / denom) * 100;
    pct = Math.max(0, Math.min(100, pct));
    sum += pct; n++;
  });
  return n ? { pct: Math.round(sum / n), count: n } : null;
}

/* Goal editor (per customer). */
function cmGoalEditor(cust) {
  const wrap = document.createElement('div'); wrap.className = 'cm-goal-edit';
  const goal = cust.goal || {};
  const defs = [
    { k:'weight',     lbl:'目標体重(kg)',   step:0.1 },
    { k:'bodyFatPct', lbl:'目標体脂肪率(%)', step:0.1 },
    { k:'muscleMass', lbl:'目標骨格筋率(%)', step:0.1 },
    { k:'visceralFat',lbl:'目標内臓脂肪Lv',  step:0.1 },
  ];
  const inputs = {};
  defs.forEach(d => {
    const f = document.createElement('div'); f.className = 'f';
    const l = document.createElement('label'); l.textContent = d.lbl;
    const i = document.createElement('input'); i.type = 'number'; i.step = d.step;
    if (goal[d.k] != null) i.value = goal[d.k];
    inputs[d.k] = i; f.appendChild(l); f.appendChild(i); wrap.appendChild(f);
  });
  // 目的（増量／減量／維持／判定無し）— 体重変化の警告/順調表示の出し分けに使う
  const pf = document.createElement('div'); pf.className = 'f'; pf.style.gridColumn = '1/-1';
  const pl = document.createElement('label'); pl.textContent = '目的（体重変化の警告判定）';
  const psel = document.createElement('select');
  [['gain','増量'], ['cut','減量'], ['maintain','維持'], ['none','判定無し']].forEach(([v, t]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = t; psel.appendChild(o);
  });
  // 既存の目的があればそれを、無ければ目標体重と最新体重から自動推定（プリフィル）
  const latestW = (cust.records && cust.records[0] && cust.records[0].weight != null) ? cust.records[0].weight : null;
  psel.value = goal.purpose || (latestW != null ? (customerWeightDir(cust, latestW) || 'maintain') : 'maintain');
  pf.appendChild(pl); pf.appendChild(psel); wrap.appendChild(pf);
  const save = document.createElement('button');
  save.className = 'cbtn cbtn-green'; save.style.cssText = 'grid-column:1/-1';
  save.textContent = '🎯 目標を保存';
  save.addEventListener('click', () => {
    const g = {};
    defs.forEach(d => { const v = parseFloat(inputs[d.k].value); if (!isNaN(v)) g[d.k] = v; });
    // この編集器は4スカラーのみ扱う。部位別（目標）グリッドで設定済みの値は維持する。
    ['armM','armF','legM','legF','trunkM','trunkF'].forEach(k => { if (goal[k] != null) g[k] = goal[k]; });
    g.purpose = psel.value;   // 目的を保存（warn/track の出し分けに使用）
    CDB.setGoal(cust.name, g);
    renderSummary(CDB.get(cust.name));
    if (activeName === cust.name) {
      const fresh = CDB.get(cust.name);
      applyGoalToTarget(fresh);                 // reflect new goal on 3D target + metrics
      buildSliders(document.getElementById('tgtSliders'), SLIDERS_TGT, 'target');
      rebuildBodies(); updateMetrics();         // updateMetrics → updateGoalHUD
      // 目的を変えたら、表示中レコードで体重ステータス（順調/警告）を即再判定
      const recs = fresh.records || [];
      const shown = recs.find(r => r.date === hudDisplayDate) || recs[0];
      if (shown) checkWeightIncrease(fresh, shown);
    }
  });
  wrap.appendChild(save);
  return wrap;
}

   IMPORT / EXPORT
═══════════════════════════════════════ */
function cmDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

window.cmExportJSON = function () {
  const data = CDB.all();
  if (!Object.keys(data).length) { alert('書き出す顧客データがありません'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  cmDownload(blob, `bodyvis_customers_${cmToday()}.json`);
};

window.cmImportJSON = function (input) {
  const file = input.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const incoming = JSON.parse(reader.result);
      if (typeof incoming !== 'object' || incoming === null || Array.isArray(incoming)) throw new Error('JSON形式が不正です');
      const cur = CDB.all();
      let added = 0, merged = 0;
      Object.values(incoming).forEach(c => {
        if (!c || !c.name) return;
        c.records = Array.isArray(c.records) ? c.records : [];
        if (cur[c.name]) {
          const byDate = {};
          [...(cur[c.name].records || []), ...c.records].forEach(r => { if (r && r.date) byDate[r.date] = r; });
          cur[c.name].records = Object.values(byDate).sort((a, b) => b.date.localeCompare(a.date));
          if (c.goal) cur[c.name].goal = c.goal;
          if (c.age != null && cur[c.name].age == null) cur[c.name].age = c.age;
          merged++;
        } else { cur[c.name] = c; added++; }
      });
      CDB.save(cur);
      buildCMSidebar();
      const names = Object.keys(cur);
      if (names.length) selectCustomer(activeName && cur[activeName] ? activeName : names[0]);
      alert(`取込完了：新規 ${added} 名 / 更新 ${merged} 名`);
    } catch (e) {
      alert('取込に失敗しました：' + e.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
};

window.cmExportCSV = function () {
  if (!activeName) { alert('顧客を選択してください'); return; }
  const cust = CDB.get(activeName);
  if (!cust || !cust.records.length) { alert('書き出す記録がありません'); return; }
  const cols = ['date','height','weight','bodyFatPct','muscleMass','bmi','visceralFat','subcutFat','bodyAge','bmr',
                'armM','armF','legM','legF','trunkM','trunkF','note'];
  const head = ['測定日','身長','体重','体脂肪率','骨格筋率','BMI','内臓脂肪Lv','皮下脂肪','体年齢','基礎代謝量',
                '腕筋率','腕脂率','脚筋率','脚脂率','体幹筋率','体幹脂率','メモ'];
  const esc = v => { v = (v == null ? '' : String(v)); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const rows = [...cust.records].sort((a, b) => a.date.localeCompare(b.date))
                 .map(r => cols.map(c => esc(r[c])).join(','));
  const csv = '﻿' + head.join(',') + '\n' + rows.join('\n');   // BOM → Excelで日本語が文字化けしない
  cmDownload(new Blob([csv], { type: 'text/csv' }), `${cust.name}_体組成記録_${cmToday()}.csv`);
};

/* Refresh the header customer dropdown to match the database. */

  const sel = document.getElementById('custSelect');

  const keep = (activeName && names.includes(activeName)) ? activeName
             : (names.includes(sel.value) ? sel.value : '');

  const ph = document.createElement('option');

/* Reflect the hidden <select> state on the custom button label. */
function syncCustBtn() {
  const sel = document.getElementById('custSelect');

  if (!sel || !lbl) return;
  const opt = sel.selectedOptions && sel.selectedOptions[0];
  lbl.textContent = (opt && sel.value && sel.value !== '__new__')
    ? opt.textContent
    : (sel.options.length > 2 ? '— 保存先を選択 —' : '顧客なし');
}

/* Rebuild the scrollable custom menu from the hidden <select> options. */
function buildCustMenu() {
  const sel  = document.getElementById('custSelect');
  const menu = document.getElementById('custSelMenu');
  if (!sel || !menu) return;
  menu.textContent = '';
  Array.from(sel.options).forEach(opt => {
    const it = document.createElement('div');
    it.className = 'csel-item'
      + (opt.value === '__new__' ? ' new' : '')
      + (opt.value === '' ? ' ph' : '')
      + (opt.value === sel.value && opt.value ? ' sel' : '');
    it.textContent = opt.textContent;
    it.onclick = () => chooseCust(opt.value);
    menu.appendChild(it);
  });
}

function chooseCust(val) {
  const sel = document.getElementById('custSelect');
  closeCustMenu();
  sel.value = val;
  sel.dispatchEvent(new Event('change'));   // runs onCustSelectChange
  syncCustBtn();
}

window.toggleCustMenu = function (e) {

function closeCustMenu() {

}
document.addEventListener('click', (e) => {

window.onCustSelectChange = function () {

/* ═══════════════════════════════════════
   LOAD A CUSTOMER / RECORD ONTO THE 3D BODY
   Selecting a name shows the latest record; the 📅 date picker
   switches to any recorded date in one click. Goal progress (for the
   displayed record vs. the customer's goal) is shown in the HUD.
═══════════════════════════════════════ */

/* Copy one measurement record into state.current (+ per-segment composition). */
function applyRecordToState(r) {
  ['height', 'weight', 'bodyFatPct', 'muscleMass', 'visceralFat', 'subcutFat'].forEach(k => {
    if (r[k] != null) state.current[k] = r[k];
  });
  // BMI・体年齢は手入力値（3Dには影響しない）。記録に無ければ null にして前の顧客の値が残らないようにする。
  state.current.bmi     = (r.bmi     != null) ? r.bmi     : null;
  state.current.bodyAge = (r.bodyAge != null) ? r.bodyAge : null;
  state.current.bmr     = (r.bmr     != null) ? r.bmr     : null;
  const segMap = [
    ['arms',  'armM',   'armF'],
    ['legs',  'legM',   'legF'],
    ['trunk', 'trunkM', 'trunkF'],
  ];
  segMap.forEach(([seg, mk, fk]) => {
    if (r[mk] != null) state.segments[seg].musclePct = r[mk];
    if (r[fk] != null) state.segments[seg].fatPct    = r[fk];
  });
}

/* Push the customer's goal into state.target so 比較/モーフ work. */
function applyGoalToTarget(cust) {
  const g = cust.goal;
  if (!g) return;
  state.target.height = state.current.height;
  ['weight', 'bodyFatPct', 'muscleMass', 'visceralFat'].forEach(k => {
    if (g[k] != null) state.target[k] = g[k];
  });
  // 目標の部位別体組成を復元（記録と同じ平坦キー）
  [['arms','armM','armF'],['legs','legM','legF'],['trunk','trunkM','trunkF']].forEach(([seg, mk, fk]) => {
    if (g[mk] != null) state.targetSegments[seg].musclePct = g[mk];
    if (g[fk] != null) state.targetSegments[seg].fatPct    = g[fk];
  });
}

/* Main loader: select a customer (optionally a specific record date) → 3D. */
function loadCustomerToView(name, date) {
  const cust = CDB.get(name);
  if (!cust) { refreshDateUI(null); updateGoalHUD(); return; }
  activeName = name;

  // sync gender to this customer
  if (cust.gender && cust.gender !== state.gender) {
    state.gender = cust.gender;
    document.getElementById('gMale').classList.toggle('on', cust.gender === 'male');
    document.getElementById('gFemale').classList.toggle('on', cust.gender === 'female');
    buildQuickBtns();
  }

  const recs = cust.records || [];
  let rec = null;
  if (recs.length) {
    rec = (date && recs.find(r => r.date === date)) || recs[0];   // records are newest-first
    applyRecordToState(rec);
  }
  applyGoalToTarget(cust);

  // refresh panels + 3D
  buildSliders(document.getElementById('curSliders'), SLIDERS_CUR, 'current');
  buildSliders(document.getElementById('tgtSliders'), SLIDERS_TGT, 'target');
  buildCurExtra();   // BMI・体年齢の手入力欄を表示中レコードの値で更新
  if (typeof buildAllSegGrids === 'function') buildAllSegGrids();
  rebuildBodies();
  updateMetrics();
  updateSegPanel();   // 月切替に合わせて部位別パネル（バランスレーダー＋筋/脂バー）も更新（パネル表示中のみ・アニメ付き）

  refreshDateUI(cust, rec ? rec.date : null);
  updateGoalHUD(rec ? rec.date : null);

  // sync the save-date picker to the displayed record's actual date (so 保存 updates it by default)
  const sm = document.getElementById('saveMonth');
  if (sm && rec) sm.value = rec.date;

  // 前月比の判定：warnはフルスクリーン警告、track/flatは左下ピル。記録無しはピル/警告とも消す。
  checkWeightIncrease(cust, rec);
}
window.loadCustomerToView = loadCustomerToView;

/* ── Date picker (themed, scrollable — reuses .csel-* styles) ── */
function refreshDateUI(cust, activeDate) {
  const wrap = document.getElementById('recDateWrap');
  const lbl  = document.getElementById('recDateLbl');
  if (!wrap || !lbl) return;
  const recs = (cust && cust.records) || [];
  if (!recs.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const d = activeDate || recs[0].date;
  lbl.textContent = '📅 ' + ymLabel(d);
  buildDateMenu(cust, d);
}

function ymLabel(date) {                       // 'YYYY-MM-DD' → 'YYYY年M月D日'（実際の測定日を表示）
  if (!date) return '';
  const [y, m, d] = date.split('-');
  const base = `${y}年${parseInt(m, 10)}月`;
  return d ? `${base}${parseInt(d, 10)}日` : base;
}

function buildDateMenu(cust, activeDate) {
  const menu = document.getElementById('recDateMenu');
  if (!menu) return;
  menu.textContent = '';
  (cust.records || []).forEach(r => {           // newest-first
    const it = document.createElement('div');
    it.className = 'csel-item csel-dateitem' + (r.date === activeDate ? ' sel' : '');
    const main = document.createElement('span');
    main.textContent = ymLabel(r.date);
    it.appendChild(main);
    if (r.weight != null || r.bodyFatPct != null) {
      const sub = document.createElement('span');
      sub.style.cssText = 'color:var(--muted);font-size:.62rem;margin-left:.5rem';
      const bits = [];
      if (r.weight != null)     bits.push(r.weight.toFixed(1) + 'kg');
      if (r.bodyFatPct != null) bits.push(r.bodyFatPct.toFixed(1) + '%');
      sub.textContent = bits.join(' / ');
      it.appendChild(sub);
    }
    it.onclick = () => chooseRecDate(r.date);

    const del = document.createElement('span');     // per-month delete
    del.className = 'csel-del';
    del.textContent = '🗑';
    del.title = 'この記録を削除';
    del.onclick = (e) => { e.stopPropagation(); deleteRecDate(r.date); };
    it.appendChild(del);

    menu.appendChild(it);
  });
}

function chooseRecDate(date) {
  document.getElementById('recDateMenu')?.classList.remove('open');
  if (activeName) loadCustomerToView(activeName, date);
}

/* Delete one month's record from the active customer (with explicit confirmation). */
function deleteRecDate(date) {
  const cust = activeName && CDB.get(activeName);
  if (!cust) return;
  const rec = (cust.records || []).find(r => r.date === date);
  const dLabel = ymLabel(date);
  const bits = [];
  if (rec) {
    if (rec.weight != null)     bits.push(`体重 ${rec.weight}kg`);
    if (rec.bodyFatPct != null) bits.push(`体脂肪率 ${rec.bodyFatPct}%`);
    if (rec.muscleMass != null) bits.push(`骨格筋率 ${rec.muscleMass}%`);
  }
  const detail = bits.length ? `\n（${bits.join(' / ')}）` : '';
  if (!confirm(`${cust.name} さんの ${dLabel} の記録を削除します。${detail}\n\n⚠️ この操作は元に戻せません。削除してよいですか？`)) return;

  const wasShown = (hudDisplayDate === date);
  CDB.delRec(cust.name, date);
  document.getElementById('recDateMenu')?.classList.remove('open');

  const fresh = CDB.get(cust.name);
  const recs  = (fresh && fresh.records) || [];
  buildCMSidebar();
  if (document.getElementById('cmOverlay')?.classList.contains('open')) renderRecords(fresh);

  if (wasShown) {
    // deleted the month currently on screen → fall back to the latest remaining record
    if (recs.length) loadCustomerToView(cust.name, recs[0].date);
    else { refreshDateUI(fresh); updateGoalHUD(null); }
  } else {
    refreshDateUI(fresh, hudDisplayDate);   // keep current view, just refresh the list
  }
  cmToast(`🗑 ${dLabel} の記録を削除しました`);
}

window.toggleDateMenu = function (e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('recDateMenu');
  if (!menu) return;
  if (menu.classList.contains('open')) { menu.classList.remove('open'); return; }
  closeCustMenu();
  menu.classList.add('open');
  const sel = menu.querySelector('.csel-item.sel');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
};

/* Render achievement of the currently displayed values (state.current) toward the goal. */
function updateGoalHUD(displayDate) {
  if (displayDate !== undefined) hudDisplayDate = displayDate;
  const dd = hudDisplayDate;
  const hud = document.getElementById('goalHud');
  const btn = document.getElementById('goalHudBtn');
  if (!hud) return;
  const cust = activeName ? CDB.get(activeName) : null;
  const goal = cust && cust.goal;
  const hasGoal = goal && ['weight', 'bodyFatPct', 'muscleMass'].some(k => goal[k] != null);

  // toggle button only meaningful when there's a goal to show
  if (btn) btn.style.display = hasGoal ? '' : 'none';
  if (!goalHudOn || !hasGoal) { hud.classList.remove('show'); return; }
  hud.classList.add('show');
  if (btn) btn.classList.add('on');

  /* Progress is measured between actual records: first(oldest) → the displayed record.
   * On the first month the displayed record IS the first record, so progress is 0%. */
  const recs  = cust.records || [];
  const first = cmFirst(cust);                                   // oldest record (baseline)
  const shown = (dd && recs.find(r => r.date === dd)) || recs[0] || null;   // displayed record

  document.getElementById('ghDate').textContent =
    (cust.name || '') + (shown ? '　' + ymLabel(shown.date) + ' 時点' : '');

  const rows = document.getElementById('ghRows');
  rows.textContent = '';

  if (!shown) {                                                  // no records yet
    document.getElementById('ghOverall').textContent = '—';
    document.getElementById('ghMiniPct').textContent = '🎯 —';
    const e = document.createElement('div'); e.className = 'gh-empty';
    e.textContent = '記録がありません。測定値を保存すると達成率が表示されます。';
    rows.appendChild(e);
    return;
  }

  const isFirstMonth = !first || first.date === shown.date;      // only / oldest record shown

  const metrics = [
    { k: 'weight',     lbl: '体重',     unit: 'kg' },
    { k: 'bodyFatPct', lbl: '体脂肪率', unit: '%'  },
    { k: 'muscleMass', lbl: '骨格筋率', unit: '%'  },
  ];
  const pcts = [];

  metrics.forEach(m => {
    const g     = goal[m.k];
    const cur   = shown[m.k];
    const start = first ? first[m.k] : null;
    if (g == null || cur == null) return;

    // baseline → goal progress; first month (start===cur) is 0% by definition
    let pct, achieved;
    if (start == null || isFirstMonth) {
      pct = 0; achieved = false;
    } else {
      const denom = g - start;
      const raw = denom === 0 ? (Math.abs(cur - g) < 1e-9 ? 100 : 0) : ((cur - start) / denom) * 100;
      pct = Math.max(0, Math.min(100, raw));
      achieved = (denom > 0 && cur >= g) || (denom < 0 && cur <= g) || (denom === 0 && Math.abs(cur - g) < 1e-9);
    }
    pcts.push(pct);

    const row = document.createElement('div'); row.className = 'gh-row';
    const head = document.createElement('div'); head.className = 'gh-head';
    const nm = document.createElement('span'); nm.className = 'gh-nm'; nm.textContent = m.lbl;
    const val = document.createElement('span'); val.className = 'gh-val';
    const cb = document.createElement('span'); cb.className = 'gh-cur'; cb.textContent = cur.toFixed(1);
    const gb = document.createElement('span'); gb.className = 'gh-goal';
    gb.textContent = ` / 目標 ${g.toFixed(1)}${m.unit}`;
    val.appendChild(cb); val.appendChild(gb);
    head.appendChild(nm); head.appendChild(val); row.appendChild(head);

    const track = document.createElement('div'); track.className = 'gh-track';
    const fill = document.createElement('div'); fill.className = 'gh-fill';
    fill.style.width = pct + '%';
    fill.style.background = pct >= 100 ? 'linear-gradient(90deg,#00e5a0,#4f9fff)'
                          : pct >= 50  ? 'linear-gradient(90deg,rgba(0,229,160,.5),#00e5a0)'
                                       : 'linear-gradient(90deg,rgba(255,208,96,.5),#ffd060)';
    track.appendChild(fill); row.appendChild(track);

    const pc = document.createElement('div'); pc.className = 'gh-pct';
    const gap = Math.abs(g - cur);
    pc.textContent = achieved ? '達成 100% ・ 目標達成！'
      : `達成 ${pct.toFixed(0)}% ・ あと ${gap.toFixed(1)}${m.unit}`;
    row.appendChild(pc); rows.appendChild(row);
  });

  const overall = pcts.length ? Math.round(pcts.reduce((a, b) => a + b, 0) / pcts.length) : 0;
  document.getElementById('ghOverall').textContent = overall + '%';
  document.getElementById('ghMiniPct').textContent = '🎯 ' + overall + '%';

  if (!pcts.length) {
    const e = document.createElement('div'); e.className = 'gh-empty';
    e.textContent = '比較できる記録値がありません。記録を保存すると達成率が表示されます。';
    rows.appendChild(e);
  }
}
window.updateGoalHUD = updateGoalHUD;

/* Save the current panel values as a dated measurement, and the target values as the goal. */
window.saveCurrentToCustomer = function () {
  const sel  = document.getElementById('custSelect');
  const name = (sel && sel.value && sel.value !== '__new__') ? sel.value : (activeName || '');
  if (!name || !CDB.get(name)) {
    alert('保存先の顧客を選択してください。\n右上のプルダウンで選ぶか、「＋ 新規顧客…」で登録できます。');
    if (!Object.keys(CDB.all()).length) { openCustomerModal(); showNewCustomerForm(); }
    return;
  }

  const c = state.current, sg = state.segments, t = state.target, ts = state.targetSegments;
  const mEl  = document.getElementById('saveMonth');
  const date = (mEl && mEl.value) || new Date().toISOString().slice(0, 10);   // chosen measurement date (YYYY-MM-DD)
  const ym   = date.slice(0, 7);                            // month key (dedup is still 1 record per month)
  const prevRec = CDB.get(name).records?.find(r => r.date.slice(0, 7) === ym);
  const dup  = !!prevRec;
  if (dup && !confirm(`${name} さんの ${ymLabel(prevRec.date)} の記録を ${ymLabel(date)} として上書きします（1ヶ月1件）。よろしいですか？`)) return;

  CDB.addRec(name, {
    date,
    height: c.height, weight: c.weight, bodyFatPct: c.bodyFatPct,
    muscleMass: c.muscleMass, visceralFat: c.visceralFat, subcutFat: c.subcutFat,
    // BMI・体年齢・基礎代謝量は「測定値（任意）」欄の手入力値。空ならその月の既存値を保持。
    bmi: c.bmi ?? (prevRec ? prevRec.bmi ?? null : null),
    bodyAge: c.bodyAge ?? (prevRec ? prevRec.bodyAge ?? null : null),
    bmr: c.bmr ?? (prevRec ? prevRec.bmr ?? null : null),
    armM: sg.arms.musclePct,  armF: sg.arms.fatPct,
    legM: sg.legs.musclePct,  legF: sg.legs.fatPct,
    trunkM: sg.trunk.musclePct, trunkF: sg.trunk.fatPct,
    note: '3D画面から保存',
  });
  const prevGoal = CDB.get(name).goal || {};
  CDB.setGoal(name, {
    weight: t.weight, bodyFatPct: t.bodyFatPct, muscleMass: t.muscleMass, visceralFat: t.visceralFat,
    // 目標の部位別体組成（記録と同じ平坦キーで保存）
    armM: ts.arms.musclePct,   armF: ts.arms.fatPct,
    legM: ts.legs.musclePct,   legF: ts.legs.fatPct,
    trunkM: ts.trunk.musclePct, trunkF: ts.trunk.fatPct,
    // 目的は目標エディタで設定する項目なので、ここでは既存値を保持（消さない）
    ...(prevGoal.purpose ? { purpose: prevGoal.purpose } : {}),
  });

  activeName = name;
  refreshCustSelect();
  buildCMSidebar();
  refreshDateUI(CDB.get(name), date);   // new/updated record → refresh date picker
  updateGoalHUD(date);                  // and goal HUD
  if (document.getElementById('cmOverlay').classList.contains('open')) selectCustomer(name);
  cmToast(`✓ ${name} さんに保存しました（${ymLabel(date)} の記録 ／ 目標も更新）`);
};

/* Lightweight transient toast. */
let cmToastTimer = null;
function cmToast(msg) {
  let el = document.getElementById('cmToast');
  if (!el) {
    el = document.createElement('div'); el.id = 'cmToast';
    el.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);'
      + 'background:rgba(0,229,160,.96);color:#04221a;font-weight:700;font-size:.82rem;'
      + 'padding:.6rem 1.1rem;border-radius:8px;z-index:300;box-shadow:0 6px 24px rgba(0,0,0,.45);'
      + 'opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(cmToastTimer);
  cmToastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2600);
}

/* ══ EVA/NERV 風 体重増加 警告 ══ */
let evaWarnTimer = null;
function buildEvaWarn() {
  let ov = document.getElementById('evaWarn');
  if (ov) return ov;
  ov = document.createElement('div');
  ov.id = 'evaWarn';
  ov.className = 'eva-warn';
  ov.innerHTML =
      '<div class="eva-flash"></div>'
    + '<div class="eva-hazard top"></div>'
    + '<div class="eva-hazard bot"></div>'
    + '<div class="eva-scan"></div>'
    + '<div class="eva-core">'
    +   '<p class="eva-warnword"><span id="evaWord">警告</span><small id="evaWordSub">WARNING</small></p>'
    +   '<div class="eva-msg" id="evaMsg">体重増加を検知</div>'
    +   '<div class="eva-delta" id="evaDelta"></div>'
    +   '<div class="eva-code" id="evaCode">CODE:482 / PATTERN 青</div>'
    +   '<button type="button" class="eva-ack" id="evaAck">確認</button>'
    + '</div>';
  document.body.appendChild(ov);
  // ACK ボタン / 背景クリックで閉じる
  ov.querySelector('#evaAck').addEventListener('click', e => { e.stopPropagation(); hideEvaWarn(); });
  ov.addEventListener('click', () => hideEvaWarn());
  ov.querySelector('.eva-core').addEventListener('click', e => e.stopPropagation());
  return ov;
}
function hideEvaWarn() {
  const ov = document.getElementById('evaWarn');
  if (ov) ov.classList.remove('show');
  clearTimeout(evaWarnTimer);
}
/* kind='warn'（赤・点滅＝目標から逆行）／'track'（点滅なし・順調＝目標へ前進）／'flat'（点滅なし・横ばい＝中立）。
   dir='gain'|'cut'|'maintain' で文言（増量中／減量中、逆行の内容）を切り替える。 */
function showEvaWarn(prevW, curW, prevDate, curDate, kind, dir) {
  const ov = buildEvaWarn();
  const calm = kind !== 'warn';                  // track と flat は穏やか（点滅なし）
  ov.classList.toggle('calm', calm);
  ov.querySelector('#evaWord').textContent    = kind === 'warn' ? '警告' : kind === 'track' ? '順調' : kind === 'reached' ? '目標圏内' : '横ばい';
  ov.querySelector('#evaWordSub').textContent = kind === 'warn' ? 'WARNING' : kind === 'track' ? 'ON TRACK' : kind === 'reached' ? 'IN RANGE' : 'FLAT';
  ov.querySelector('#evaMsg').textContent =
      kind === 'reached' ? `目標体重の許容範囲内（±${GOAL_TOLERANCE}kg）`
    : kind === 'track' ? `目標へ前進（${dir === 'gain' ? '増量中' : dir === 'cut' ? '減量中' : '維持中'}）`
    : kind === 'flat'  ? '前月から横ばい'
    : dir === 'gain'   ? '増量目的に対して減少'
    : dir === 'cut'    ? '減量目的に対して増加'
    :                    '維持目的から逸脱';
  const diff = curW - prevW;
  const sign = diff >= 0 ? '＋' : '−';
  ov.querySelector('#evaDelta').textContent =
    `前月 ${prevW.toFixed(1)}kg → 今月 ${curW.toFixed(1)}kg（${sign}${Math.abs(diff).toFixed(1)}kg）`;
  ov.querySelector('#evaCode').textContent =
    `${ymLabel(prevDate)} → ${ymLabel(curDate)}  ／  ${calm ? 'PATTERN 青' : 'CODE:482'}`;
  ov.classList.add('show');
  clearTimeout(evaWarnTimer);
  evaWarnTimer = setTimeout(hideEvaWarn, 5200);   // 約5秒で自動解除（確認/背景クリックでも閉じる）
}
window.hideEvaWarn = hideEvaWarn;

/* 目標体重と表示中体重から方向を判定。'gain'/'cut'/'maintain'、目標未設定はnull。 */
const EVA_WEIGHT_EPS = 0.05;   // この値以下の増分は誤差とみなし反応しない
const EVA_DIR_MARGIN = 0.3;    // 目標体重との差がこれ未満なら「維持」扱い（目的の自動推定用）
const GOAL_TOLERANCE = 2;      // 目標体重±この値(kg)以内は「許容範囲（目標圏内）」＝目的を問わず到達扱い
function customerWeightDir(cust, curWeight) {
  const g = cust && cust.goal;
  if (!g) return null;                                      // 目標未設定＝方向不明
  // 目標エディタで明示選択された目的を最優先（'gain'|'cut'|'maintain'|'none'）
  if (g.purpose) return g.purpose;
  // 後方互換：目的未選択の既存顧客は目標体重との比較で自動推定
  if (g.weight == null) return null;
  if (g.weight - curWeight >  EVA_DIR_MARGIN) return 'gain'; // 目標が今より重い＝増量
  if (curWeight - g.weight >  EVA_DIR_MARGIN) return 'cut';  // 目標が今より軽い＝減量
  return 'maintain';
}

/* 体重変化の判定（共通ロジック）。rec と直前（より古い）月＝前月を比較し、目的(dir)と突き合わせて
   {kind:'track'|'warn'|'flat', dir, diff, prevW, curW, prevDate, curDate} を返す。
   前月の記録があれば必ず状態を返す（毎月かならず前月比を出す方針）。分類:
   ・目標へ前進（増量で増・減量で減・維持で横ばい）＝順調（track）
   ・目標から逆行（増量で減・減量で増・維持で増減）＝要注意（warn）
   ・増量/減量目的で前月比ほぼ変化なし＝横ばい（flat・中立）
   表示しないのは: rec無/体重無/前月（比較対象）無/目標未設定/判定無し(purpose='none') のときだけ。 */
function weightTrendStatus(cust, rec) {
  if (!cust || !rec || rec.weight == null) return null;
  const recs = cust.records || [];                 // newest-first
  const idx = recs.indexOf(rec);
  if (idx < 0) return null;
  const prev = recs.slice(idx + 1).find(r => r.weight != null);   // 直近の、より古い記録＝前月
  if (!prev) return null;                          // 前月（比較対象）が無い＝初回月は比較不能
  const dir = customerWeightDir(cust, rec.weight);
  if (dir === null || dir === 'none') return null; // 目標未設定／判定無し（明示的なオプトアウト）
  const diff = rec.weight - prev.weight;
  const base = { dir, diff, prevW: prev.weight, curW: rec.weight, prevDate: prev.date, curDate: rec.date };
  // 目標体重±GOAL_TOLERANCE(2kg)以内は「許容範囲（目標圏内）」＝目的を問わず到達扱い。
  // 手動選択の増量/減量より優先し、この圏内では小さな増減で要注意（warn）を出さない。
  const g = cust.goal;
  if (g && g.weight != null && Math.abs(rec.weight - g.weight) <= GOAL_TOLERANCE) {
    return { kind: 'reached', ...base };
  }
  let kind;
  if (Math.abs(diff) <= EVA_WEIGHT_EPS) {
    kind = (dir === 'maintain') ? 'track' : 'flat';   // 維持目的の横ばい＝順調／増減目的の横ばい＝中立
  } else if (dir === 'maintain') {
    kind = 'warn';                                     // 維持目的で増減＝逸脱
  } else {
    const toward = (dir === 'gain' && diff > 0) || (dir === 'cut' && diff < 0);
    kind = toward ? 'track' : 'warn';                  // 増量で増/減量で減＝順調、逆＝要注意
  }
  return { kind, ...base };
}

/* 左下の小さなトレンドピル（warn/track/flat を常時表示）。st が null なら隠す。 */
function updateWTrendPill(st) {
  const pill = document.getElementById('wTrendPill');
  if (!pill) return;
  if (!st) { pill.classList.remove('show'); return; }
  const sign = st.diff >= 0 ? '＋' : '−';
  pill.className = 'wtrend-pill show ' + st.kind;
  pill.querySelector('#wtPillWord').textContent  = st.kind === 'warn' ? '要注意' : st.kind === 'track' ? '順調' : st.kind === 'reached' ? '目標圏内' : '横ばい';
  pill.querySelector('#wtPillDelta').textContent = `${sign}${Math.abs(st.diff).toFixed(1)}kg`;
}

/* 表示中レコードの判定結果を反映：小さなピルは常に更新し、フルスクリーンのEVAオーバーレイは
   warn（要注意＝目標から逆行）のときだけ出す。順調/横ばいはピルとレポートにとどめる。 */
function checkWeightIncrease(cust, rec) {
  const st = weightTrendStatus(cust, rec);
  updateWTrendPill(st);                                  // 画面の小さな常時表示
  if (st && st.kind === 'warn') showEvaWarn(st.prevW, st.curW, st.prevDate, st.curDate, st.kind, st.dir);
  else hideEvaWarn();                                    // track/flat/none はオーバーレイを出さない
}

/* Wait for the report's images (base64 chart PNGs) and fonts to be ready, then print.
   Setting img.src = <data URL> decodes asynchronously, so calling window.print()
   on the very next line shows blank charts on the *first* output (they appear on the
   2nd because the data URLs are already decoded). Await decode() before printing. */
function printReportRoot(reportName) {
  // PDFの既定ファイル名はタブ(document.title)由来。印刷中だけ `${APP_NAME}_顧客名` に差し替え、
  // afterprint で元に戻す（restorePrintTitle）。
  if (reportName) {
    if (prevDocTitle == null) prevDocTitle = document.title;
    document.title = reportName;
  }
  const root = document.getElementById('reportRoot');
  const imgs = root ? [...root.querySelectorAll('img')] : [];
  const waits = imgs.map(img => {
    if (img.complete && img.naturalWidth) return Promise.resolve();
    if (img.decode) return img.decode().catch(() => {});
    return new Promise(res => { img.onload = img.onerror = res; });
  });
  if (document.fonts && document.fonts.ready) waits.push(document.fonts.ready.catch(() => {}));
  // If printing from fullscreen, exit it first (the browser would force-exit anyway);
  // flag for restore via the afterprint listener.
  const doPrint = () => {
    if (isFullscreen()) {
      restoreFsAfterPrint = true;
      exitFullscreen().then(() => window.print(), () => window.print());
    } else {
      window.print();
    }
  };
  Promise.all(waits).then(doPrint, doPrint);
}

/* ── 全顧客レポートを「顧客名.html」にして ZIP 一括ダウンロード ──
   各レポートは画像（グラフ=base64・体型図=inline SVG）を内包する自己完結HTML。
   ブラウザで開けば鮮明に表示でき、Ctrl+P で個別にPDF保存できる。 */
function loadJSZip() {
  if (window.JSZip) return Promise.resolve(window.JSZip);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = './vendor/jszip/jszip.min.js';
    s.onload  = () => window.JSZip ? resolve(window.JSZip) : reject(new Error('JSZip 初期化に失敗しました'));
    s.onerror = () => reject(new Error('JSZip の読み込みに失敗しました'));
    document.head.appendChild(s);
  });
}

/* レポートの装飾CSSを収集。@media print 内の #reportRoot 規則を画面でも効くよう取り出す
   （標準HTMLで開いたときに崩れず表示させるため）。画面用 display:none の素のルールは除外。 */
function collectReportCSS() {
  const out = [];
  const handle = (r) => {
    if (r.type === CSSRule.MEDIA_RULE)      { for (const inner of r.cssRules) handle(inner); return; }
    if (r.type === CSSRule.PAGE_RULE)       { out.push(r.cssText); return; }
    if (r.type === CSSRule.STYLE_RULE && r.selectorText && r.selectorText.indexOf('#reportRoot') !== -1) {
      if (r.selectorText.trim() === '#reportRoot' && /display\s*:\s*none/.test(r.style.cssText)) return; // 画面非表示の素ルールは除外
      out.push(r.cssText);
    }
  };
  for (const sheet of document.styleSheets) {
    let rules; try { rules = sheet.cssRules; } catch { continue; }   // クロスオリジンCSSはスキップ
    for (const r of rules) handle(r);
  }
  return out.join('\n');
}

function repLogoDataUrl() {
  // 0) 事前生成の base64（logo-data.js）。fetch も canvas も使わず環境非依存で最も確実。
  if (typeof window.BODYVERSE_LOGO_B64 === 'string' && window.BODYVERSE_LOGO_B64) {
    return Promise.resolve(window.BODYVERSE_LOGO_B64);
  }
  // 1) すでに読み込み済みのヘッダーロゴ(img.brand-logo)をcanvas経由でdataURI化（同一オリジン）
  try {
    const img = document.querySelector('img.brand-logo');
    if (img && img.complete && img.naturalWidth) {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      return Promise.resolve(c.toDataURL('image/png'));
    }
  } catch {}
  // 2) フォールバック: fetch でPNGを取得してdataURI化
  return fetch('bodyverse-logo.png')
    .then(r => r.ok ? r.blob() : null)
    .then(b => b ? new Promise(res => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.onerror = () => res(null); fr.readAsDataURL(b); }) : null)
    .catch(() => null);
}

function repSanitizeFilename(name) {
  return (String(name == null ? '' : name).replace(/[\\/:*?"<>|]+/g, '_').replace(/\s+/g, '_').replace(/^_+|_+$/g, '').slice(0, 60)) || '顧客';
}
function repEscapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

  const customers = Object.values(CDB.all()).filter(c => c && (c.records || []).length);
  if (!customers.length) { alert('記録のある顧客がいません。先に測定記録を追加してください。'); return; }

  const btn = document.getElementById('cmZipBtn');
  if (btn) { btn.disabled = true; btn.dataset.label = btn.textContent; }

  let JSZip;
  try { JSZip = await loadJSZip(); }
  catch (e) { alert(e.message); if (btn) { btn.disabled = false; } return; }

  try {
    const logoDataUrl = await repLogoDataUrl();
    const reportCSS   = collectReportCSS();
    const zip   = new JSZip();
    const today = new Date().toISOString().slice(0, 10);
    const used  = {};

    for (let i = 0; i < customers.length; i++) {
      const cust = customers[i];
      if (btn) btn.textContent = `生成中… ${i + 1}/${customers.length}`;
      buildReport(cust);                                  // 全期間でレポートを #reportRoot に生成
      const html = serializeReport(cust, reportCSS, logoDataUrl);
      let base = `${APP_NAME}_${repSanitizeFilename(cust.name)}`;
      let fn = base, n = 2; while (used[fn]) fn = `${base}(${n++})`; used[fn] = 1;   // 同名顧客の衝突回避
      zip.file(fn + '.html', html);
      await new Promise(r => setTimeout(r, 0));            // UIに制御を返す（多人数でも固まらない）
    }

    const blob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `体組成レポート_全${customers.length}名_${today}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    cmToast(`✓ ${customers.length}名分のレポートをZIPでダウンロードしました`);
  } catch (e) {
    alert('ZIP の生成に失敗しました：' + (e && e.message ? e.message : e));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = btn.dataset.label || '🗂 全レポートZIP'; }
  }
};

/* ───────────────────────────────────────
   2D BODY ILLUSTRATION FOR THE REPORT
   A front-view silhouette drawn as inline SVG, parameterised by the SAME body
   data the 3D mesh uses (computeBodyData + segMul). The 3D front projection maps
   a torso/arm/leg ring's half-width (rx) directly to the 2D outline at that
   height, so the illustration's proportions match the 3D body. No WebGL capture.
─────────────────────────────────────── */

/* Record/goal → params object for computeBodyData (with sensible fallbacks). */
function repBodyParams(r, fbHeight) {
  return {
    height:      r.height      != null ? r.height      : (fbHeight || 170),
    weight:      r.weight,
    bodyFatPct:  r.bodyFatPct  != null ? r.bodyFatPct  : 22,
    muscleMass:  r.muscleMass  != null ? r.muscleMass  : 35,
    visceralFat: r.visceralFat != null ? r.visceralFat : 7,
  };
}

/* Record/goal → per-segment composition. `base` (optional) seeds the values so a
   goal can inherit the current segments and only override what it specifies. */
function repBodySeg(r, base) {
  const d = base ? JSON.parse(JSON.stringify(base)) : {
    arms:  { musclePct: SEG_BASE.arms.m,  fatPct: SEG_BASE.arms.f  },
    legs:  { musclePct: SEG_BASE.legs.m,  fatPct: SEG_BASE.legs.f  },
    trunk: { musclePct: SEG_BASE.trunk.m, fatPct: SEG_BASE.trunk.f },
  };
  if (r.armM   != null) d.arms.musclePct  = r.armM;   if (r.armF   != null) d.arms.fatPct  = r.armF;
  if (r.legM   != null) d.legs.musclePct  = r.legM;   if (r.legF   != null) d.legs.fatPct  = r.legF;
  if (r.trunkM != null) d.trunk.musclePct = r.trunkM; if (r.trunkF != null) d.trunk.fatPct = r.trunkF;
  return d;
}

/* Compute the front-view silhouette outlines (in metres, y-up) from body data. */
function bodySilhouette(params, gender, segments) {
  const data = computeBodyData(params, gender);
  const { H, s, mS, fS, torsoRings, legR, legOffX, armSpec, armLen, armAngle } = data;
  const armMul   = segMul(segments?.arms,  SEG_BASE.arms);
  const legMul   = segMul(segments?.legs,  SEG_BASE.legs);
  const trunkMul = segMul(segments?.trunk, SEG_BASE.trunk);
  // Trunk girth multiplier, tapering to 1.0 near the neck (same as buildBodyMesh).
  torsoRings.forEach(r => {
    const ny = r.y / H;
    const tw = ny > 0.82 ? clamp((0.90 - ny) / 0.08, 0, 1) : 1;
    r.rx *= 1 + (trunkMul - 1) * tw;
  });

  const headR = 0.118 * s * clamp(0.7 + 0.3 * Math.sqrt(fS), 0.85, 1.25);
  const headY = H - headR;

  // Torso (+neck): right edge bottom→top, then left edge top→bottom.
  const torso = [];
  torsoRings.forEach(r => torso.push([r.rx, r.y]));
  for (let i = torsoRings.length - 1; i >= 0; i--) torso.push([-torsoRings[i].rx, torsoRings[i].y]);

  // Legs: each centred at ±legOffX, half-width r*legMul.
  const legs = [-1, 1].map(side => {
    const ox = side * legOffX;
    const right = [], left = [];
    legR.forEach(({ y, r }) => { const rW = r * legMul; right.push([ox + rW, y]); left.push([ox - rW, y]); });
    return right.concat(left.reverse());
  });

  // Arms: angled outward/down from the shoulder ring (same anchoring as the mesh).
  const shoulderRing = torsoRings.find(r => r.y >= 0.815 * H) || torsoRings[torsoRings.length - 4];
  const sJointX = shoulderRing.rx;
  const sJointY = shoulderRing.y - 0.018 * s;
  const armAnchor = [null, null];   // outer-edge point per side (for label leaders)
  const arms = [-1, 1].map((side, si) => {
    const ax = side * Math.sin(armAngle), ay = -Math.cos(armAngle);
    const rings = armSpec.map(([t, rB, mw, fw]) => {
      const dist = t * armLen;
      const rx = clamp(rB * (mw * mS + fw * fS) * s * armMul, 0.012, 0.10);
      return { y: sJointY + ay * dist, rx, ox: side * sJointX + ax * dist };
    });
    const a = rings[2];                                   // upper-arm mid
    armAnchor[si] = { x: a.ox + side * a.rx, y: a.y };
    const right = [], left = [];
    rings.forEach(r => { right.push([r.ox + r.rx, r.y]); left.push([r.ox - r.rx, r.y]); });
    return right.concat(left.reverse());
  });

  // Leader anchors: outer edge of each leg's thigh, and the trunk's waist edge.
  const legAnchor = [null, null];
  [-1, 1].forEach((side, si) => {
    const ox = side * legOffX, t = legR[1];              // thigh ring
    legAnchor[si] = { x: ox + side * t.r * legMul, y: t.y };
  });
  let waist = torsoRings[0], bd = Infinity;
  torsoRings.forEach(r => { const d = Math.abs(r.y - 0.62 * H); if (d < bd) { bd = d; waist = r; } });
  const trunkAnchor = [{ x: -waist.rx, y: waist.y }, { x: waist.rx, y: waist.y }];

  return { torso, legs, arms, head: { cx: 0, cy: headY, r: headR }, H,
    anchors: { arm: armAnchor, leg: legAnchor, trunk: trunkAnchor } };
}

/* Build an inline <svg> of the front-view silhouette, with optional per-segment
   labels (筋率/脂率) joined to each body part by a dotted leader line.
   opts: { side:'left'|'right' (which side the labels sit on), labels:bool }. */
function bodySVGEl(params, gender, segments, color, opts) {
  opts = opts || {};
  if (!params || params.weight == null) return null;
  let P;
  try { P = bodySilhouette(params, gender, segments); } catch (e) { console.warn('body silhouette failed', e); return null; }
  const H = P.H, sideLeft = opts.side === 'left', drawLabels = opts.labels !== false;

  // Body bounding box (silhouette + head).
  const bpts = [...P.torso, ...P.legs.flat(), ...P.arms.flat(),
    [P.head.cx - P.head.r, P.head.cy], [P.head.cx + P.head.r, P.head.cy],
    [P.head.cx, P.head.cy - P.head.r], [P.head.cx, P.head.cy + P.head.r]];
  let bMinX = Infinity, bMaxX = -Infinity, bMinY = Infinity, bMaxY = -Infinity;
  bpts.forEach(([x, y]) => { if (x < bMinX) bMinX = x; if (x > bMaxX) bMaxX = x; if (y < bMinY) bMinY = y; if (y > bMaxY) bMaxY = y; });

  // Reserve horizontal room on the label side for the callouts.
  const labelW = drawLabels ? 0.30 : 0, padIn = 0.03, padY = 0.05;
  const minX = sideLeft ? bMinX - labelW : bMinX - padIn;
  const maxX = sideLeft ? bMaxX + padIn  : bMaxX + labelW;
  const minY = bMinY - padY, maxY = bMaxY + padY;

  const PXM = 360;                               // px per metre (viewBox units)
  const W = (maxX - minX) * PXM, Hp = (maxY - minY) * PXM;
  const X = x => (x - minX) * PXM;
  const Y = y => (maxY - y) * PXM;               // invert (SVG y grows downward)

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W.toFixed(1)} ${Hp.toFixed(1)}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  const poly = ps => 'M' + ps.map(([x, y]) => `${X(x).toFixed(1)},${Y(y).toFixed(1)}`).join(' L') + 'Z';
  const addPath = d => { const p = document.createElementNS(NS, 'path'); p.setAttribute('d', d); p.setAttribute('fill', color); svg.appendChild(p); };
  // Draw order: legs & arms first, torso over the joints, head on top. Same fill ⇒ one clean silhouette.
  P.legs.forEach(l => addPath(poly(l)));
  P.arms.forEach(a => addPath(poly(a)));
  addPath(poly(P.torso));
  const head = document.createElementNS(NS, 'circle');
  head.setAttribute('cx', X(P.head.cx).toFixed(1)); head.setAttribute('cy', Y(P.head.cy).toFixed(1));
  head.setAttribute('r', (P.head.r * PXM).toFixed(1)); head.setAttribute('fill', color);
  svg.appendChild(head);

  // ── per-segment callouts (dotted leader + 筋率/脂率) ──
  if (drawLabels) {
    const ai = sideLeft ? 0 : 1;                 // pick the body parts on the label side
    const sv = segments || {};
    const items = [
      { name: '腕',   slot: 0.82, m: sv.arms  && sv.arms.musclePct,  f: sv.arms  && sv.arms.fatPct,  a: P.anchors.arm[ai]   },
      { name: '体幹', slot: 0.58, m: sv.trunk && sv.trunk.musclePct, f: sv.trunk && sv.trunk.fatPct, a: P.anchors.trunk[ai] },
      { name: '脚',   slot: 0.38, m: sv.legs  && sv.legs.musclePct,  f: sv.legs  && sv.legs.fatPct,  a: P.anchors.leg[ai]   },
    ];
    const lineEndXpx = sideLeft ? X(bMinX - 0.02) : X(bMaxX + 0.02);
    const textXpx    = lineEndXpx + (sideLeft ? -8 : 8);
    const anchorAttr = sideLeft ? 'end' : 'start';
    const pct = v => (v == null ? '—' : Math.round(v) + '%');
    items.forEach(it => {
      if (!it.a) return;
      const ax = X(it.a.x), ay = Y(it.a.y);
      const ey = Y(it.slot * H);
      // dotted leader line
      const ln = document.createElementNS(NS, 'polyline');
      ln.setAttribute('points', `${ax.toFixed(1)},${ay.toFixed(1)} ${lineEndXpx.toFixed(1)},${ey.toFixed(1)}`);
      ln.setAttribute('fill', 'none'); ln.setAttribute('stroke', '#8a93a0');
      ln.setAttribute('stroke-width', '2'); ln.setAttribute('stroke-dasharray', '5 5');
      svg.appendChild(ln);
      // anchor dot on the body
      const dot = document.createElementNS(NS, 'circle');
      dot.setAttribute('cx', ax.toFixed(1)); dot.setAttribute('cy', ay.toFixed(1));
      dot.setAttribute('r', '5'); dot.setAttribute('fill', color);
      svg.appendChild(dot);
      // 3-line text block: part name / 筋率 / 脂率
      const mk = (yy, txt, isName) => {
        const t = document.createElementNS(NS, 'text');
        t.setAttribute('x', textXpx.toFixed(1)); t.setAttribute('y', yy.toFixed(1));
        t.setAttribute('text-anchor', anchorAttr); t.setAttribute('font-family', 'sans-serif');
        t.setAttribute('font-size', isName ? '28' : '26'); t.setAttribute('font-weight', isName ? '700' : '600');
        t.setAttribute('fill', isName ? color : '#3a4250'); t.textContent = txt;
        svg.appendChild(t);
      };
      mk(ey - 30, it.name, true);
      mk(ey - 1,  `筋 ${pct(it.m)}`, false);
      mk(ey + 28, `脂 ${pct(it.f)}`, false);
    });
  }
  return svg;
}

/* One framed, labelled figure column (SVG + colour dot caption + key stats). */
function bodyFigCol(svgEl, label, color, stats) {
  const col = document.createElement('div'); col.className = 'rep-body-col';
  const box = document.createElement('div'); box.className = 'rep-body-box';
  svgEl.classList.add('rep-body-svg');
  box.appendChild(svgEl);
  col.appendChild(box);
  const cap = document.createElement('div'); cap.className = 'rep-body-cap';
  const dot = document.createElement('span'); dot.className = 'rep-body-dot'; dot.style.background = color;
  cap.appendChild(dot); cap.appendChild(document.createTextNode(' ' + label));
  col.appendChild(cap);
  if (stats) { const st = document.createElement('div'); st.className = 'rep-body-stat'; st.textContent = stats; col.appendChild(st); }
  return col;
}

const REP_BODY_CUR_COLOR = '#2f6fd0';   // current (blue)
const REP_BODY_TGT_COLOR = '#1e9e6a';   // goal (green)

/* Build the report's "体型イメージ" section: current body, and goal body if set. */
function buildBodyFigure(cust) {
  const latest = cmLatest(cust);
  if (!latest || latest.weight == null) return null;
  const gender = cust.gender || state.gender || 'male';

  const goal = cust.goal;
  const hasGoal = !!goal && ['weight', 'bodyFatPct', 'muscleMass'].some(k => goal[k] != null);
  const f1 = v => v == null ? '—' : (+v).toFixed(1);
  const statLine = p => `体重 ${f1(p.weight)}kg ・ 体脂肪 ${f1(p.bodyFatPct)}% ・ 筋率 ${f1(p.muscleMass)}%`;

  const curParams = repBodyParams(latest, latest.height);
  const curSeg    = repBodySeg(latest);
  // With a goal, the current figure's labels sit on the left and the goal's on the right.
  const curSVG    = bodySVGEl(curParams, gender, curSeg, REP_BODY_CUR_COLOR, { side: hasGoal ? 'left' : 'right' });
  if (!curSVG) return null;

  const sec = document.createElement('div'); sec.className = 'rep-body-sec';
  const h2 = document.createElement('h2'); h2.textContent = hasGoal ? '体型イメージ（現在 → 目標）' : '体型イメージ（現在）'; sec.appendChild(h2);
  const wrap = document.createElement('div'); wrap.className = 'rep-body-wrap';
  wrap.appendChild(bodyFigCol(curSVG, '現在', REP_BODY_CUR_COLOR, statLine(curParams)));

  if (hasGoal) {
    const goalParams = { ...curParams };
    ['weight', 'bodyFatPct', 'muscleMass', 'visceralFat'].forEach(k => { if (goal[k] != null) goalParams[k] = goal[k]; });
    const goalSeg = repBodySeg(goal, curSeg);    // inherit current, override with goal segments
    const goalSVG = bodySVGEl(goalParams, gender, goalSeg, REP_BODY_TGT_COLOR, { side: 'right' });
    if (goalSVG) {
      const arrow = document.createElement('div'); arrow.className = 'rep-body-arrow'; arrow.textContent = '→';
      wrap.appendChild(arrow);
      wrap.appendChild(bodyFigCol(goalSVG, '目標', REP_BODY_TGT_COLOR, statLine(goalParams)));
    }
  }
  sec.appendChild(wrap);
  const note = document.createElement('div'); note.className = 'rep-body-note';
  note.textContent = '※測定値（体重・体脂肪率・骨格筋率・部位別体組成）をもとに描いた概念図です。実際の体型とは異なります。';
  sec.appendChild(note);
  return sec;
}

function buildReport(cust, fromArg, toArg, monthsArg) {
  const root = document.getElementById('reportRoot');
  while (root.firstChild) root.removeChild(root.firstChild);

  const brand = getBrand();
  const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
  // 年月 label helper: '2026-06-01' → '2026年6月'
  const ym = d => { const p = (d || '').slice(0, 7).split('-'); return p.length === 2 ? `${p[0]}年${+p[1]}月` : (d || '—'); };

  // Resolve the report period. An explicit month list (monthsArg) selects specific
  // (possibly non-contiguous) months; otherwise fall back to the from–to span.
  const monthSet = (monthsArg && monthsArg.length) ? new Set(monthsArg.map(m => m.slice(0, 7))) : null;
  const allAsc = [...cust.records].sort((a, b) => a.date.localeCompare(b.date));
  let from, to, inRange;
  if (monthSet) {
    const sel = [...monthSet].sort();
    from = sel[0]; to = sel[sel.length - 1];
    inRange = m => monthSet.has(m);
  } else {
    from = fromArg || allAsc[0]?.date.slice(0, 7) || null;
    to   = toArg   || allAsc[allAsc.length - 1]?.date.slice(0, 7) || null;
    inRange = m => (!from || m >= from) && (!to || m <= to);
  }
  const recsAsc  = allAsc.filter(r => inRange(r.date.slice(0, 7)));   // ascending, range-limited
  const recsDesc = [...recsAsc].reverse();                            // newest-first
  const latest = recsDesc[0] || null;   // newest within range
  const prev   = recsDesc[1] || null;   // 2nd newest within range
  const first  = recsAsc[0]  || null;   // oldest within range
  // Forward-looking sections (advice / goal / scenarios) always reflect the true current state.
  const trueLatest = cmLatest(cust), trueFirst = cmFirst(cust);

  // Cover — 左にジム名＋お客様情報、右にロゴ＋達成度の2カラム（縦中央そろえで間の余白を詰める）
  const cover = el('div', 'rep-cover');
  const coverTop = el('div');
  coverTop.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8mm;flex-wrap:wrap';
  const leftCol = el('div');
  leftCol.style.cssText = 'display:flex;flex-direction:column;gap:3mm';
  if (brand.gymName) {
    const gn = el('div', null, brand.gymName);
    gn.style.cssText = 'font-size:14px;font-weight:700;color:#1a265a';
    leftCol.appendChild(gn);
  }
  // 右端に縦積み：ロゴを上、その下に総合達成度。
  const rightCol = el('div');
  rightCol.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:3mm';
  {
    // ロゴをレポートのタイトルとして配置（透過PNGを白表紙に直接）
    const brandBlk = el('div', 'rep-logo-blk');
    const logoBanner = el('div', 'rep-logo-banner');
    const logoImg = el('img', 'rep-logo-img');
    logoImg.src = 'bodyverse-logo.png';
    logoImg.alt = 'BODYVERSE';
    logoBanner.appendChild(logoImg);
    brandBlk.appendChild(logoBanner);
    brandBlk.appendChild(el('div', 'rep-logo-sub', 'BODY COMPOSITION REPORT'));
    rightCol.appendChild(brandBlk);
  }
  {
    const goal = cust.goal;
    const goalActive = goal && ['weight', 'bodyFatPct', 'muscleMass', 'visceralFat'].some(k => goal[k] != null);
    const op = goalActive ? cmOverallProgress(cust, trueFirst, trueLatest) : null;
    if (op) {
      const col = op.pct >= 100 ? '#1e8e5a' : op.pct >= 50 ? '#2563c0' : '#c08a00';
      const isFirstOnly = trueFirst && trueLatest && trueFirst.date === trueLatest.date;
      const box = el('div');
      box.style.cssText = 'display:flex;align-items:baseline;gap:3mm;white-space:nowrap';
      const lbl = el('span', null, isFirstOnly ? '達成度（初回）' : '総合達成度');
      lbl.style.cssText = 'font-size:13px;color:#778;font-weight:600';
      // 数値カラム：％（大）の真下に前回比デルタを縦積み配置。
      const numCol = el('div');
      numCol.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:1mm';
      const big = el('span', null, `${op.pct}%`);
      big.style.cssText = `font-size:52px;font-weight:800;line-height:.9;color:${col}`;
      numCol.appendChild(big);
      // 前回比デルタ（前回測定時点の達成度との差。同じ基準=初回で算出）。
      const prevRec = cust.records?.[1] || null;   // 2nd-newest = 前回測定（records は新しい順）
      const prevOp  = (!isFirstOnly && prevRec) ? cmOverallProgress(cust, trueFirst, prevRec) : null;
      if (prevOp) {
        const d = op.pct - prevOp.pct;
        const flat = d === 0, up = d > 0;
        const dCol  = flat ? '#778' : up ? '#1e8e5a' : '#c0392b';
        const arrow = flat ? '→'    : up ? '▲'        : '▼';
        const drow = el('div');
        drow.style.cssText = 'display:flex;align-items:baseline;gap:.6mm';
        const delta = el('span', null, `${arrow}${Math.abs(d)}pt`);
        delta.style.cssText = `font-size:16px;font-weight:800;color:${dCol}`;
        const dnote = el('span', null, '前回比');
        dnote.style.cssText = 'font-size:12px;color:#99a;font-weight:600';
        drow.appendChild(delta); drow.appendChild(dnote);
        numCol.appendChild(drow);
      }
      box.appendChild(lbl); box.appendChild(numCol);
      rightCol.appendChild(box);
    }
  }
  const meta = el('div');
  meta.appendChild(el('div', null, `お名前: ${cust.name || ''}　/　${cust.gender === 'male' ? '男性' : '女性'}${cmAge(cust) != null ? `　/　${cmAge(cust)}歳` : ''}`));
  const period = (from && to) ? `${ym(from + '-01')} 〜 ${ym(to + '-01')}` : '—';
  const periodLbl = monthSet ? `選択 ${monthSet.size} ヶ月（${period}）` : period;
  meta.appendChild(el('div', null, `対象期間: ${periodLbl}　/　${recsAsc.length} 件の測定`));
  if (brand.trainerName) meta.appendChild(el('div', null, `担当: ${brand.trainerName}`));
  meta.appendChild(el('div', null, `発行日: ${new Date().toLocaleDateString('ja-JP')}`));
  leftCol.appendChild(meta);
  coverTop.appendChild(leftCol);
  coverTop.appendChild(rightCol);
  cover.appendChild(coverTop);
  root.appendChild(cover);

  // Empty-range guard
  if (!recsAsc.length) {
    root.appendChild(el('p', null, '指定された期間に測定記録がありません。期間を見直してください。'));
    return;
  }

  // Before → After (初回 → 最新 と総変化量)
  if (first && latest && first.date !== latest.date) {
    root.appendChild(el('h2', null, 'Before → After'));
    const ba = el('div', 'rep-ba');
    const METS = [['体重', 'weight', 'kg', true], ['体脂肪率', 'bodyFatPct', '%', true], ['骨格筋率', 'muscleMass', '%', false]];
    const col = (title, rec) => {
      const c = el('div', 'rep-ba-col');
      c.appendChild(el('div', 'rep-ba-h', `${title}（${ym(rec.date)}）`));
      METS.forEach(([l, k, u]) => {
        const line = el('div', 'rep-ba-kv');
        line.appendChild(el('span', null, l));
        line.appendChild(el('b', null, rec[k] != null ? rec[k].toFixed(1) + u : '—'));
        c.appendChild(line);
      });
      return c;
    };
    const change = el('div', 'rep-ba-col');
    change.appendChild(el('div', 'rep-ba-h', '変化'));
    METS.forEach(([l, k, u, lowerBetter]) => {
      const line = el('div', 'rep-ba-kv');
      line.appendChild(el('span', null, l));
      let txt = '—', cls = '';
      if (first[k] != null && latest[k] != null) {
        const d = latest[k] - first[k];
        txt = (d > 0 ? '+' : '') + d.toFixed(1) + u;
        cls = Math.abs(d) < 1e-9 ? '' : ((d < 0) === lowerBetter ? 'rep-down' : 'rep-up');
      }
      line.appendChild(el('b', cls, txt));
      change.appendChild(line);
    });
    ba.appendChild(col('初回', first));
    ba.appendChild(col('最新', latest));
    ba.appendChild(change);
    root.appendChild(ba);
  }

  // 部位別（腕・脚・体幹）の前月 → 当月 比較（骨格筋率・皮下脂肪率）
  if (prev && latest) {
    const PARTS = [['両腕', 'arms'], ['両脚', 'legs'], ['体幹', 'trunk']];
    const SEG_METS = [['骨格筋率', 'M', '%', false], ['皮下脂肪率', 'F', '%', true]];   // lowerBetter
    const hasSeg = PARTS.some(([, pk]) => SEG_METS.some(([, m]) =>
      segRawVal(prev, pk, m) != null || segRawVal(latest, pk, m) != null));
    if (hasSeg) {
      root.appendChild(el('h2', null, '部位別の前月比較（腕・脚・体幹）'));
      const t = document.createElement('table'); t.className = 'rep-mtbl';
      const thead = document.createElement('thead'); const hr = document.createElement('tr');
      ['部位', '指標', `前月（${ym(prev.date)}）`, `当月（${ym(latest.date)}）`, '変化']
        .forEach(h => hr.appendChild(el('th', null, h)));
      thead.appendChild(hr); t.appendChild(thead);
      const tb = document.createElement('tbody');
      PARTS.forEach(([plabel, pk]) => {
        SEG_METS.forEach(([mlabel, m, u, lowerBetter]) => {
          const pv = segRawVal(prev, pk, m), cv = segRawVal(latest, pk, m);
          const tr = document.createElement('tr');
          tr.appendChild(el('td', null, plabel));
          tr.appendChild(el('td', null, mlabel));
          tr.appendChild(el('td', null, pv != null ? pv.toFixed(1) + u : '—'));
          tr.appendChild(el('td', null, cv != null ? cv.toFixed(1) + u : '—'));
          let txt = '—', cls = null;
          if (pv != null && cv != null) {
            const d = cv - pv;
            txt = (d > 0 ? '+' : '') + d.toFixed(1) + u;
            cls = Math.abs(d) < 1e-9 ? null : ((d < 0) === lowerBetter ? 'rep-down' : 'rep-up');
          }
          tr.appendChild(el('td', cls, txt));
          tb.appendChild(tr);
        });
      });
      t.appendChild(tb); root.appendChild(t);
    }
  }

  // Summary boxes
  root.appendChild(el('h2', null, '測定サマリー'));
  if (latest) {
    const boxes = el('div', 'rep-boxes');
    const mk = (lbl, val, base, unit, lowerBetter) => {
      const box = el('div', 'rep-box');
      box.appendChild(el('small', null, lbl));
      box.appendChild(el('b', null, val != null ? val.toFixed(1) + unit : '—'));
      const badge = cmDeltaBadge(val, base, { unit, lowerBetter, tiny:true });
      if (badge) box.appendChild(badge);
      return box;
    };
    boxes.appendChild(mk('体重', latest.weight, prev?.weight, 'kg', true));
    boxes.appendChild(mk('体脂肪率', latest.bodyFatPct, prev?.bodyFatPct, '%', true));
    boxes.appendChild(mk('骨格筋率', latest.muscleMass, prev?.muscleMass, '%', false));
    boxes.appendChild(mk('BMI', cmBMI(latest, cust), cmBMI(prev, cust), '', true));
    root.appendChild(boxes);
  }

  // ※「目標と達成度」の目標値ボックスは専用ページ（目標と見通し・4ページ目）へ移動した。

  // 体重変化の「順調／要注意」ステータス（最新記録の前月比 × 目的）。EVAオーバーレイと同じ
  // weightTrendStatus 判定を、印刷向けの静的バナーで表示。判定無し／変化なしは非表示。
  {
    const st = weightTrendStatus(cust, (cust.records || [])[0]);
    if (st) {
      const dirLbl = st.dir === 'gain' ? '増量' : st.dir === 'cut' ? '減量' : '維持';
      const sign = st.diff >= 0 ? '＋' : '−';
      const badge = st.kind === 'track' ? '順調' : st.kind === 'warn' ? '要注意' : st.kind === 'reached' ? '目標圏内' : '横ばい';
      const title =
          st.kind === 'reached' ? `目標体重の許容範囲内（±${GOAL_TOLERANCE}kg）です`
        : st.kind === 'track' ? `${dirLbl}目的に対して、目標へ前進しています`
        : st.kind === 'flat'  ? `${dirLbl}目的に対して、前月から横ばいです`
        : st.dir === 'gain'   ? `${dirLbl}目的に対して、体重が減っています（逆行）`
        : st.dir === 'cut'    ? `${dirLbl}目的に対して、体重が増えています（逆行）`
        :                       `${dirLbl}目的から外れて体重が変動しています`;
      const sec = el('div', 'rep-wstatus ' + st.kind);
      const head = el('div', 'rep-ws-head');
      head.appendChild(el('span', 'rep-ws-badge', badge));
      head.appendChild(el('span', 'rep-ws-title', title));
      sec.appendChild(head);
      sec.appendChild(el('div', 'rep-ws-delta',
        `${ym(st.prevDate)} ${st.prevW.toFixed(1)}kg → ${ym(st.curDate)} ${st.curW.toFixed(1)}kg（${sign}${Math.abs(st.diff).toFixed(1)}kg）`));
      root.appendChild(sec);
    }
  }

  // Trend charts — rebuild for the report's range, then capture the images.
  // The chart pane (#cmPaneChart) is normally display:none unless its tab is active.
  // Chart.js with responsive:true collapses to a 0×0 canvas inside a hidden parent,
  // which makes toBase64Image() return a blank image. So we temporarily render the
  // pane off-screen at a real size while we build + capture, then restore it.
  const REP_CHART_ORDER = [
    ['segRadarCur', 'バランスレーダー（現在・骨格筋率/皮下脂肪率・対標準%）'],
    ['segRadarTgt', 'バランスレーダー（目標・骨格筋率/皮下脂肪率・対標準%）'],
    ['weight',      '体重 (kg) の推移'],
    ['bodyFatPct',  '体脂肪率 (%) の推移'],
    ['muscleMass',  '骨格筋率 (%) の推移'],
    ['bmiLbm',      'BMI・除脂肪体重(LBM) の推移'],
  ];
  const chartPane = document.getElementById('cmPaneChart');
  const prevPaneStyle = chartPane ? chartPane.getAttribute('style') : null;
  const captured = {};
  cmRangeOverride = monthSet ? { months: monthSet } : { from, to };
  try {
    if (chartPane) chartPane.style.cssText = 'display:flex;position:absolute;left:-10000px;top:0;width:760px;height:auto;z-index:-1';
    cmReportMode = true;            // light palette for the printed page
    buildCharts(cust);
    // Force each chart to a definite pixel size and a synchronous redraw before capture.
    // Chart.js responsive:true reflows asynchronously (ResizeObserver/rAF), so capturing
    // right after creation can grab a blank/0-size frame. resize(w,h) draws immediately.
    REP_CHART_ORDER.forEach(([key]) => {
      const ch = cmCharts[key]; if (!ch) return;
      try {
        // 全グラフを同一アスペクト(8:5)・高解像度でキャプチャ。
        // 同一比にすることで2列グリッドの各行の高さが揃い、8枚がA4にきれいに収まる。
        ch.resize(800, 500);
        ch.draw();
        captured[key] = ch.toBase64Image('image/png', 1.0);
      } catch {}
    });
  } finally {
    cmRangeOverride = null;
    cmReportMode = false;
    if (chartPane) { if (prevPaneStyle == null) chartPane.removeAttribute('style'); else chartPane.setAttribute('style', prevPaneStyle); }
  }
  // 部位別バランス（現在 ↔ 目標）の対比ブロック：色付き見出しで一目で区別できるよう専用枠に。
  if (captured['segRadarCur'] || captured['segRadarTgt']) {
    const rsec = el('div', 'rep-radar-sec');
    rsec.appendChild(el('h2', null, '部位別バランス（現在 ↔ 目標）'));
    const rwrap = el('div', 'rep-radar-wrap');
    const mkRadarCard = (cls, label, src) => {
      const card = el('div', 'rep-radar-card ' + cls);
      card.appendChild(el('div', 'rep-radar-hd', label));
      if (src) { const im = document.createElement('img'); im.src = src; im.className = 'rep-radar-img'; card.appendChild(im); }
      else card.appendChild(el('div', 'rep-radar-empty', '部位別データなし'));
      return card;
    };
    rwrap.appendChild(mkRadarCard('cur', '現在', captured['segRadarCur']));
    if (captured['segRadarTgt']) {
      rwrap.appendChild(el('div', 'rep-radar-arrow', '→'));
      rwrap.appendChild(mkRadarCard('tgt', '目標', captured['segRadarTgt']));
    }
    rsec.appendChild(rwrap);
    rsec.appendChild(el('div', 'rep-radar-note', '緑＝骨格筋率（対標準%）／黄＝皮下脂肪率（対標準%）。各頂点が100%＝性別標準。'));
    root.appendChild(rsec);
  }

  // 図解は専用ページにまとめる（見出し＋グリッド＋注記を1セクション化して改ページ対象に）。
  const chartsSec = el('div', 'rep-charts-sec');
  chartsSec.appendChild(el('h2', null, '図解（推移グラフ）'));
  const cg = el('div', 'rep-charts');
  REP_CHART_ORDER.forEach(([key, cap]) => {
    if (key === 'segRadarCur' || key === 'segRadarTgt') return;   // 上の対比ブロックで表示済み
    const src = captured[key]; if (!src) return;
    const fig = el('figure', 'rep-fig');
    const img = document.createElement('img'); img.src = src;
    fig.appendChild(img);
    fig.appendChild(el('figcaption', null, cap));
    cg.appendChild(fig);
  });
  chartsSec.appendChild(cg);
  root.appendChild(chartsSec);

  // 月次推移テーブルは独立した最終ページ（5ページ目）に回す。組み立ては buildReport 末尾。

  // Advice (based on the latest measurement, regardless of report range)
  const adv = buildAdvice(cust);
  if (adv) {
    const kvRow = (k, v) => { const r = el('div', 'rep-kv'); r.appendChild(el('span', null, k)); r.appendChild(el('b', null, v)); root.appendChild(r); };
    const fx = (v, d = 1) => v == null ? '—' : (Number.isInteger(v) ? v : v.toFixed(d));

    // 体組成の指標
    const m = adv.metrics;
    if (m.ffmi != null || m.fmi != null || m.bodyAge != null || m.measuredBMR != null) {
      root.appendChild(el('h2', null, '体組成の指標'));
      if (m.ffmi != null)         kvRow('FFMI（筋肉の発達度・身長補正）', `${fx(m.ffmi)}`);
      if (m.fmi != null)          kvRow('FMI（脂肪量指数）', `${fx(m.fmi)}`);
      if (m.lbm != null)          kvRow('除脂肪量', `${fx(m.lbm)} kg`);
      if (m.fatMass != null)      kvRow('体脂肪量', `${fx(m.fatMass)} kg`);
      if (m.bodyAge != null)      kvRow('体年齢（測定）', `${m.bodyAge} 歳${m.age != null ? `（実年齢 ${m.age} 歳）` : ''}`);
      if (m.measuredBMR != null)  kvRow('基礎代謝量（実測）', `${m.measuredBMR} kcal`);
      // 代謝年齢（推定）はレポートには出さない（ユーザー指定）。サマリー/アドバイスペインには表示。
    }

    // 所見（レポートでは代謝年齢の推定／基礎代謝（実測）のコメントは除外。サマリー/アドバイスペインには表示）
    const repInsights = adv.insights.filter(x => !x.includes('代謝年齢') && !x.includes('基礎代謝'));
    if (repInsights.length) {
      root.appendChild(el('h2', null, '所見'));
      const ul = el('ul'); repInsights.forEach(x => ul.appendChild(el('li', null, x))); root.appendChild(ul);
    }

    root.appendChild(el('h2', null, 'アドバイス'));
    if (adv.nutrition) {
      const n = adv.nutrition;
      root.appendChild(el('div', null, `栄養・カロリー（BMR ${n.bmr}kcal${n.bmrSrc ? `・${n.bmrSrc}` : ''} / TDEE ${n.tdee}kcal）`));
      [['目標摂取カロリー', `${n.targetKcal} kcal`], ['たんぱく質', `${n.protein_g} g`],
       ['脂質', `${n.fat_g} g`], ['炭水化物', `${n.carb_g} g`],
       ['食物繊維', `${n.fiber_g} g`], ['水分', `${n.water_ml} ml`]].forEach(([k, v]) => kvRow(k, v));
      const ul = el('ul'); n.notes.forEach(x => ul.appendChild(el('li', null, x))); root.appendChild(ul);
    }
    if (adv.training.exercises.length) {
      root.appendChild(el('div', null, `推奨トレーニング${adv.training.weakPart ? `（優先: ${adv.training.weakPart} — ${adv.training.muscles}）` : ''}:`));
      if (adv.training.role) root.appendChild(el('div', null, adv.training.role));
      const ul = el('ul');
      adv.training.exercises.forEach(x => ul.appendChild(el('li', null, `${x.name}（${x.sr}） フォーム: ${x.cue}`)));
      root.appendChild(ul);
      if (adv.training.note) root.appendChild(el('div', null, adv.training.note));
    }
    if (adv.lifestyle.length) {
      root.appendChild(el('div', null, '生活習慣:'));
      const ul = el('ul'); adv.lifestyle.forEach(x => ul.appendChild(el('li', null, x))); root.appendChild(ul);
    }
  }

  // 「目標と見通し」＋体型イメージは専用ページ（4ページ目）に固める。
  // ページ先頭から始め、目標セクション本体は分割禁止でまとめ、その下に体型イメージを続ける。
  const goalPage = el('div', 'rep-goal-page');

  // Goal progress + scenarios (always based on the latest measurement)
  const goalBlock = el('div', 'rep-goal-block');
  goalBlock.appendChild(el('h2', null, '目標と見通し'));
  goalBlock.appendChild(cmGoalProgress(cust, trueFirst, trueLatest));
  // 目標値ボックス（現在＝青 → 目標＝緑・残り）。旧「目標と達成度」セクションをここへ移動。
  {
    const goal = cust.goal;
    const goalActive = goal && ['weight', 'bodyFatPct', 'muscleMass', 'visceralFat'].some(k => goal[k] != null);
    if (goalActive) {
      const lg = el('div', null, '青＝現在　／　緑＝目標');
      lg.style.cssText = 'font-size:11px;color:#778;margin:2.5mm 0 1.5mm';
      goalBlock.appendChild(lg);
      const gb = el('div', 'rep-boxes');
      [ ['体重', goal.weight, 'kg', trueLatest?.weight, 1],
        ['体脂肪率', goal.bodyFatPct, '%', trueLatest?.bodyFatPct, 1],
        ['骨格筋率', goal.muscleMass, '%', trueLatest?.muscleMass, 1],
        ['内臓脂肪Lv', goal.visceralFat, '', trueLatest?.visceralFat, 1],
      ].forEach(([lbl, g, unit, cur, dg]) => {
        if (g == null) return;
        const fmtN = v => (dg === 0 ? Math.round(v) : v.toFixed(1)) + unit;
        const box = el('div', 'rep-box rep-goalbox');
        box.appendChild(el('small', null, lbl));
        const row = el('div', 'rep-gb-row');
        row.appendChild(el('span', 'rep-gb-cur', cur != null ? fmtN(cur) : '—'));
        row.appendChild(el('span', 'rep-gb-arrow', '→'));
        row.appendChild(el('span', 'rep-gb-tgt', fmtN(g)));
        box.appendChild(row);
        if (cur != null) { const rem = g - cur; box.appendChild(el('small', 'rep-gb-rem', Math.abs(rem) < (dg === 0 ? 0.5 : 0.05) ? '✓ 達成' : `あと ${rem > 0 ? '+' : ''}${rem.toFixed(dg)}${unit}`)); }
        gb.appendChild(box);
      });
      goalBlock.appendChild(gb);
    }
  }
  if (trueLatest && trueLatest.weight != null && trueLatest.bodyFatPct != null) {
    const tbl = el('div');
    SIM_SCENARIOS.forEach(sc => {
      const proj = simProject(trueLatest, cust, sc.pace, simWeeks); if (!proj) return;
      const r = el('div', 'rep-kv');
      r.appendChild(el('span', null, `${sc.lbl}（${simWeeks}週後）`));
      r.appendChild(el('b', null, `体重 ${proj.weight.toFixed(1)}kg / 体脂肪 ${proj.bodyFatPct.toFixed(1)}%`));
      tbl.appendChild(r);
    });
    goalBlock.appendChild(tbl);
  }

  // Disclaimer
  const disc = el('div', null, '※ 本レポートは体組成データに基づく一般的な目安であり、医療診断ではありません。体調や既往症に応じて専門家にご相談ください。');
  disc.style.cssText = 'margin-top:6mm;font-size:9px;color:#778;border-top:1px solid #ddd;padding-top:2mm';
  goalBlock.appendChild(disc);
  goalPage.appendChild(goalBlock);

  // 体型イメージ（現在＝青 / 目標＝緑）— 測定値から描く2Dシルエット（SVG）。
  // 目標と見通しの直下（同じ4ページ目）に続ける。
  {
    const bodySec = buildBodyFigure(cust);
    if (bodySec) goalPage.appendChild(bodySec);
  }
  root.appendChild(goalPage);

  // 月次推移テーブル — 独立した最終ページ（5ページ目）。
  if (recsAsc.length) {
    const mtblPage = el('div', 'rep-mtbl-page');
    mtblPage.appendChild(el('h2', null, '月次推移'));
    const t = document.createElement('table'); t.className = 'rep-mtbl';
    const thead = document.createElement('thead'); const hr = document.createElement('tr');
    ['年月', '体重', '体脂肪率', '骨格筋率', 'BMI', '前月比(体重)'].forEach(h => hr.appendChild(el('th', null, h)));
    thead.appendChild(hr); t.appendChild(thead);
    const tb = document.createElement('tbody');
    recsAsc.forEach((r, i) => {
      const p = i > 0 ? recsAsc[i - 1] : null;
      const tr = document.createElement('tr');
      const bmi = cmBMI(r, cust);
      tr.appendChild(el('td', null, ym(r.date)));
      tr.appendChild(el('td', null, r.weight     != null ? r.weight.toFixed(1)     : '—'));
      tr.appendChild(el('td', null, r.bodyFatPct != null ? r.bodyFatPct.toFixed(1) : '—'));
      tr.appendChild(el('td', null, r.muscleMass != null ? r.muscleMass.toFixed(1) : '—'));
      tr.appendChild(el('td', null, bmi != null ? bmi.toFixed(1) : '—'));
      let txt = '—', cls = null;
      if (p && r.weight != null && p.weight != null) {
        const d = r.weight - p.weight;
        txt = (d > 0 ? '+' : '') + d.toFixed(1) + 'kg';
        cls = Math.abs(d) < 1e-9 ? null : (d < 0 ? 'rep-down' : 'rep-up');
      }
      tr.appendChild(el('td', cls, txt));
      tb.appendChild(tr);
    });
    t.appendChild(tb); mtblPage.appendChild(t);
    root.appendChild(mtblPage);
  }
}

/* Populate the header customer dropdown on load. */
refreshCustSelect();

/* Default the save-date picker to today's date. */
{ const _sm = document.getElementById('saveMonth'); if (_sm && !_sm.value) _sm.value = new Date().toISOString().slice(0, 10); }

/* ── Signal successful boot so the diagnostics watchdog stands down ── */
window.__appReady = true;
clearTimeout(window.__bootWatchdog);
const loadingEl = document.getElementById('loading');
if (loadingEl) loadingEl.style.display = 'none';
</script>

      <button class="cbtn cbtn-ghost cbtn-sm" onclick="closeCustomerModal()">✕ 閉じる</button>

    <div class="cm-body">

          <input type="text" id="cmCustSearch" placeholder="🔍 名前で検索" oninput="onCustSearch(this.value)" autocomplete="off">
        </div>

          <button class="cbtn cbtn-blue" style="width:100%" onclick="showNewCustomerForm()">＋ 新規顧客</button>

      <!-- Main content -->
      <div class="cm-main">

          <button class="cm-tab on" id="cmTabSummary" onclick="showCMPane('summary')">📊 サマリー</button>
          <button class="cm-tab"    id="cmTabRec"     onclick="showCMPane('rec')">📋 記録一覧</button>
          <button class="cm-tab"    id="cmTabChart"   onclick="showCMPane('chart')">📈 グラフ</button>
          <button class="cm-tab" id="cmTabSim"    onclick="showCMPane('sim')">🔮 シミュレーション</button>
          <button class="cm-tab" id="cmTabAdvice" onclick="showCMPane('advice')">💡 アドバイス</button>
          <button class="cm-tab" id="cmTabRoster" onclick="showCMPane('roster')">👥 顧客情報</button>
        </div>
        <div class="cm-pane on" id="cmPaneSummary"></div>
        <div class="cm-pane"    id="cmPaneRec"></div>
        <div class="cm-pane"    id="cmPaneChart"></div>
        <div class="cm-pane"    id="cmPaneSim"></div>
        <div class="cm-pane"    id="cmPaneAdvice"></div>
        <div class="cm-pane"    id="cmPaneRoster"></div>
      </div>
    </div>
  </div>
</div>
<div id="reportRoot"></div>
<!-- ── Mobile bottom-sheet controls (phone layout) ── -->
<script>
(function () {
  var PANE_TAB = { pCur: 0, pTgt: 1, pIb: 2 };
  window.mSheet = function (paneId, navBtn) {
    var tabs = document.querySelectorAll('.ctrl .tabs .tab');
    var tab  = tabs[PANE_TAB[paneId]];
    if (tab && window.showPane) window.showPane(paneId, tab);
    var ctrl = document.querySelector('.ctrl');
    if (ctrl) ctrl.classList.add('sheet-open');
    var bd = document.getElementById('mBackdrop');
    if (bd) bd.classList.add('show');
    document.querySelectorAll('.mnav-btn').forEach(function (b) { b.classList.remove('on'); });
    if (navBtn) navBtn.classList.add('on');
  };
  window.mSheetClose = function () {
    var ctrl = document.querySelector('.ctrl');
    if (ctrl) ctrl.classList.remove('sheet-open');
    var bd = document.getElementById('mBackdrop');
    if (bd) bd.classList.remove('show');
    document.querySelectorAll('.mnav-btn').forEach(function (b) { b.classList.remove('on'); });
  };
})();
</script>
</body>
</html>
