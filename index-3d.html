<script type="module">
import * as THREE          from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
const state = {
  gender: 'male',
  mode: 'current',
  ibDest: 'current',
  morphing: false,
  morphT: 0,
  current: { height:170, weight:72, bodyFatPct:22, muscleMass:37.5, visceralFat:9,  subcutFat:90, bmi:null, bodyAge:null, bmr:null },
  target:  { height:170, weight:65, bodyFatPct:15, muscleMass:46.2, visceralFat:5,  subcutFat:60 },
  /* per-segment body composition — both values stored as % (現在値) */
  segments: {
    arms:  { musclePct: 38.0, fatPct: 28.0 },
    legs:  { musclePct: 52.0, fatPct: 28.0 },
    trunk: { musclePct: 60.0, fatPct: 24.0 },
  },
  /* per-segment body composition for 目標値 */
  targetSegments: {
    arms:  { musclePct: 42.0, fatPct: 22.0 },
    legs:  { musclePct: 56.0, fatPct: 22.0 },
    trunk: { musclePct: 64.0, fatPct: 18.0 },
  },
};

/* These module-level lets are read by updateGoalHUD(), which runs during INIT-time
 * updateMetrics() — declare them here (before INIT) to avoid a Temporal Dead Zone error. */
let activeName = null;         // currently selected customer
let goalHudOn = true;          // show goal HUD automatically when a customer with a goal is active
let hudDisplayDate = null;     // record date currently shown (persists across live slider edits)

/* ═══════════════════════════════════════
   THREE.JS SETUP
═══════════════════════════════════════ */
const canvas = document.getElementById('c');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
} catch (err) {
  (window.__showBootError || function (_, d) { alert(d); })(
    'WebGL を初期化できませんでした',
    'お使いのブラウザ／環境で WebGL が利用できないため、3D を表示できません。\n\n'
    + '・ブラウザ設定でハードウェアアクセラレーションを有効にしてください\n'
    + '・別のブラウザ（最新の Chrome / Edge）でお試しください\n\n'
    + '詳細: ' + (err && err.message ? err.message : err));
  throw err;   // stop module init; diagnostics already shown
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping    = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);  // pure black — like reference

const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 50);
camera.position.set(0, 0.9, 3.6);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping  = true;
controls.dampingFactor  = 0.08;
controls.target.set(0, 0.9, 0);
controls.minDistance    = 0.8;
controls.maxDistance    = 7;
/* パン禁止：人体を常にターゲット中心に保ち、画面外へ逃がさない（特にスマホの2本指操作対策） */
controls.enablePan      = false;
/* 見下ろし/見上げを制限：真上・真下からの迷子ビューを防ぐ */
controls.minPolarAngle  = Math.PI * 0.12;
controls.maxPolarAngle  = Math.PI * 0.86;

/* Auto-rotation: spin the body MESH itself (turntable), not the camera.
 * The floor grid / ring stay put; only the body turns. Toggled by 自動回転 button. */
let autoSpin      = false;
let spinReturning = false;   // easing back to the front after stopping
let spinAngle     = 0;
const SPIN_INC    = 0.0125;  // radians per frame

/* Lights — minimal; Fresnel handles the glow, not lights */
scene.add(new THREE.AmbientLight(0x112244, 1.0));                     // very dark blue ambient

const rimBack = new THREE.DirectionalLight(0x6699ff, 0.8);
rimBack.position.set(0, 2, -3);
scene.add(rimBack);

const rimLeft = new THREE.DirectionalLight(0x4477cc, 0.4);
rimLeft.position.set(-2, 1.5, 1);
scene.add(rimLeft);

/* Subtle floor grid — stays dim so bloom doesn't over-glow it */
const grid = new THREE.GridHelper(4, 24, 0x0a1a40, 0x05102a);
grid.position.y = 0.001;
scene.add(grid);

/* Horizon ring (decorative) */
const ringGeo = new THREE.RingGeometry(1.4, 1.42, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x1a3a88, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.002;
scene.add(ring);

/* Body groups */
const bodyGroup = new THREE.Group();
scene.add(bodyGroup);

/* ── Post-processing: Bloom ── */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(512, 512),   // size updated on resize
  0.55,  // strength  ← 抑えめ
  0.35,  // radius
  0.25   // threshold — 明るい部分だけ bloom
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ── Holographic Fresnel + Procedural Muscle Shader ── */
// bodyH : total body height in metres (to normalise vWorldY → 0-1)
// female: true for female-specific patterns (breasts, etc.)
function makeHoloMat(hexColor, bodyH = 1.7, female = false) {
  const col = new THREE.Color(hexColor);
  return new THREE.ShaderMaterial({
    uniforms: {
      uColor:     { value: col },
      uFresnel:   { value: 3.2 },
      uBaseAlpha: { value: 0.22 },
      uEdgeAlpha: { value: 0.72 },
      uEmit:      { value: 1.1  },
      uBodyH:     { value: bodyH },
      uBump:      { value: 1.6  },   // muscle bump scale
      uFemale:    { value: female ? 1.0 : 0.0 },
    },

    /* ── Vertex Shader ──────────────────────────────────────── */
    vertexShader: `
      varying vec3  vN;
      varying vec3  vV;
      varying vec2  vUv;
      varying float vWY;          // model-space Y (0 = feet)
      void main(){
        vN  = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vV  = normalize(-mv.xyz);
        vUv = uv;
        vWY = position.y;
        gl_Position = projectionMatrix * mv;
      }`,

    /* ── Fragment Shader ────────────────────────────────────── */
    fragmentShader: `
      #define PI 3.14159265

      uniform vec3  uColor;
      uniform float uFresnel, uBaseAlpha, uEdgeAlpha, uEmit;
      uniform float uBodyH, uBump, uFemale;

      varying vec3  vN, vV;
      varying vec2  vUv;
      varying float vWY;

      /* smooth hill: peaks at centre of [lo,hi], zero at both edges */
      float hill(float lo, float hi, float x){
        float m = (lo+hi)*0.5;
        return smoothstep(lo,m,x) * smoothstep(hi,m,x);
      }

      /* Gaussian-style narrow peak */
      float gpeak(float center, float w, float x){
        float d = (x - center) / w;
        return exp(-d*d*2.0);
      }

      /*
       * Procedural muscle bump function.
       * u  : UV circumference  0-1 (loft convention: u=0 → right side,
       *      u=0.25 → FRONT (+z), u=0.5 → left, u=0.75 → BACK (-z))
       * ny : normalised body height  0=feet … 1=top of head
       */
      float muscleH(float u, float ny){
        float angle = u * 2.0 * PI;
        float sinA  = sin(angle);
        float frontW = max(0.0,  sinA);    // +1 at u=0.25 (front)
        float backW  = max(0.0, -sinA);    // +1 at u=0.75 (back)
        float sideW  = abs(cos(angle));    // +1 at u=0 and u=0.5 (sides)
        float h = 0.0;

        /* ── ABS (male) ──────────────────────────────────────── */
        float abR = hill(0.33, 0.60, ny) * (1.0 - uFemale);
        if(abR > 0.001){
          float t  = (ny - 0.33) / 0.27;
          float rows = max(0.0, sin(t * PI * 3.0 + 0.45));   // 3 row ridges
          float colL = gpeak(1.15, 0.17, angle);              // left rectus column
          float colR = gpeak(2.00, 0.17, angle);              // right rectus column
          h += abR * (colL + colR) * rows * 0.13;
          /* linea alba groove */
          h -= abR * frontW * gpeak(PI*0.5, 0.055, angle) * 0.065;
        }

        /* ── PECTORALS (male) ────────────────────────────────── */
        float pecR = hill(0.60, 0.79, ny) * (1.0 - uFemale);
        if(pecR > 0.001){
          float t = sin((ny - 0.60) / 0.19 * PI);
          h += pecR * (gpeak(1.10,0.21,angle) + gpeak(2.04,0.21,angle)) * t * 0.10;
          h -= pecR * frontW * gpeak(PI*0.5, 0.07, angle) * 0.045;  /* sternal groove */
        }

        /* ── FEMALE CHEST ────────────────────────────────────── */
        float femC = hill(0.61, 0.77, ny) * uFemale;
        if(femC > 0.001){
          float t = sin((ny - 0.61) / 0.16 * PI);
          h += femC * (gpeak(1.08,0.26,angle) + gpeak(2.06,0.26,angle)) * t * 0.09;
        }

        /* ── DELTOIDS (shoulder caps, sides) ────────────────── */
        float delR = hill(0.74, 0.89, ny);
        if(delR > 0.001){
          float t = sin((ny - 0.74) / 0.15 * PI);
          h += delR * sideW * t * 0.09;
        }

        /* ── TRAPEZIUS + SPINE GROOVE (back) ─────────────────── */
        float trapR = hill(0.62, 0.88, ny);
        if(trapR > 0.001){
          float t = (ny - 0.62) / 0.26;
          h -= trapR * backW * gpeak(PI*1.5, 0.065, angle) * t * 0.07; /* spine */
          h += trapR * backW * (gpeak(2.45,0.22,angle)+gpeak(3.84,0.22,angle))*t*0.07;
        }

        /* ── SERRATUS ANTERIOR (side ribs) ───────────────────── */
        float serR = hill(0.46, 0.65, ny);
        if(serR > 0.001){
          float t = (ny - 0.46) / 0.19;
          h += serR * sideW * max(0.0, sin(t * PI * 4.0)) * 0.045;
        }

        /* ── BICEP / TRICEP (upper arm region) ───────────────── */
        float armR = hill(0.52, 0.72, ny);
        if(armR > 0.001){
          float t = sin((ny - 0.52) / 0.20 * PI);
          h += armR * frontW * t * 0.075;                 /* bicep peak */
          h += armR * backW  * t * 0.055 * 0.6;          /* tricep (slightly less) */
        }

        /* ── QUADRICEPS (front of thigh) ─────────────────────── */
        float quadR = hill(0.26, 0.50, ny);
        if(quadR > 0.001){
          float t = (ny - 0.26) / 0.24;
          float vm = gpeak(0.82,0.19,angle) + gpeak(2.33,0.19,angle);  /* vastus med/lat */
          h += quadR * vm * sin(t * PI) * 0.08;
        }

        /* ── GASTROCNEMIUS (calves) ───────────────────────────── */
        float calfR = hill(0.11, 0.23, ny);
        if(calfR > 0.001){
          float t = sin((ny - 0.11) / 0.12 * PI);
          float bulge = gpeak(PI*0.5,0.32,angle) + gpeak(PI*1.5,0.32,angle)*0.6;
          h += calfR * bulge * t * 0.09;
        }

        return h;
      }

      void main(){
        vec3 N = normalize(vN);
        vec3 V = normalize(vV);
        if(!gl_FrontFacing) N = -N;

        float ny = clamp(vWY / uBodyH, 0.0, 1.0);

        /* ── Normal perturbation via finite differences ───────── */
        const float EPS = 0.008;
        float b0 = muscleH(vUv.x,        ny);
        float bu = muscleH(vUv.x + EPS,   ny);
        float bv = muscleH(vUv.x,         min(ny + EPS*0.55, 1.0));
        float du = (bu - b0) / EPS;
        float dv = (bv - b0) / EPS;

        /* Build orthonormal tangent frame */
        vec3 up = vec3(0.0, 1.0, 0.0);
        vec3 T  = normalize(cross(up, N));
        if(dot(T,T) < 0.001) T = normalize(cross(vec3(1.,0.,0.), N));
        vec3 B  = normalize(cross(N, T));
        N = normalize(N + uBump * (du * T + dv * B));

        /* ── Fresnel + scanline + muscle shading ──────────────── */
        float d    = abs(dot(N, V));
        float f    = pow(1.0 - d, uFresnel);
        float scan = 0.5 + 0.5 * sin(gl_FragCoord.y * 0.8);
        vec3  col  = uColor * (0.22 + f * uEmit + scan * 0.04);
        float a    = mix(uBaseAlpha, uEdgeAlpha, f);
        gl_FragColor = vec4(col, a);
      }`,

    transparent: true,
    depthWrite:  false,
    side:        THREE.DoubleSide,
  });
}

/* ═══════════════════════════════════════
   GEOMETRY HELPERS
═══════════════════════════════════════ */
function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

/** Build a loft geometry from an array of elliptical rings.
 *  rings: [{y, rx, rz, ox=0, oz=0}, ...]
 *  segs: circumferential subdivisions
 */
function loftGeometry(rings, segs = 28) {
  const positions = [];
  const uvs = [];
  const indices = [];
  const n = rings.length;

  rings.forEach((r, ri) => {
    const { y, rx, rz, ox = 0, oz = 0 } = r;
    for (let si = 0; si <= segs; si++) {
      const t = (si / segs) * Math.PI * 2;
      positions.push(ox + rx * Math.cos(t), y, oz + rz * Math.sin(t));
      uvs.push(si / segs, ri / (n - 1));
    }
  });

  for (let ri = 0; ri < n - 1; ri++) {
    for (let si = 0; si < segs; si++) {
      const a = ri * (segs + 1) + si;
      const b = a + 1;
      const c = a + segs + 1;
      const d = c + 1;
      indices.push(a, c, b, b, c, d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

/** Disk cap for closing a loft at top or bottom. */
function diskCap(ring, segs = 28) {
  const { y, rx, rz, ox = 0, oz = 0 } = ring;
  const positions = [ox, y, oz]; // center
  for (let si = 0; si <= segs; si++) {
    const t = (si / segs) * Math.PI * 2;
    positions.push(ox + rx * Math.cos(t), y, oz + rz * Math.sin(t));
  }
  const indices = [];
  for (let si = 0; si < segs; si++) {
    indices.push(0, si + 1, si + 2);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

/** Merge an array of BufferGeometry objects into one. */
function mergeGeos(geos) {
  const pos = [], nrm = [], uv = [], idx = [];
  let offset = 0;
  geos.forEach(g => {
    const p = g.attributes.position.array;
    const n = g.attributes.normal ? g.attributes.normal.array : null;
    const u = g.attributes.uv ? g.attributes.uv.array : null;
    for (let i = 0; i < p.length; i++) pos.push(p[i]);
    if (n) for (let i = 0; i < n.length; i++) nrm.push(n[i]);
    if (u) for (let i = 0; i < u.length; i++) uv.push(u[i]);
    const ix = g.index ? g.index.array : null;
    if (ix) for (let i = 0; i < ix.length; i++) idx.push(ix[i] + offset);
    offset += p.length / 3;
  });
  const mg = new THREE.BufferGeometry();
  mg.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  if (nrm.length) mg.setAttribute('normal', new THREE.Float32BufferAttribute(nrm, 3));
  if (uv.length) mg.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  if (idx.length) mg.setIndex(idx);
  mg.computeVertexNormals();
  return mg;
}

/* ═══════════════════════════════════════
   BODY MEASUREMENT CALCULATOR
═══════════════════════════════════════ */
function computeBodyData(params, gender) {
  const { height, weight, bodyFatPct, visceralFat } = params;
  const muscleMass = params.muscleMass / 100 * weight; // % → kg
  const isMale = gender === 'male';
  const H = height / 100;          // meters
  const s = H / 1.70;              // scale relative to 170 cm reference
  const fatMass = weight * bodyFatPct / 100;
  const refMuscle = isMale ? 26 : 20;
  const refFat    = isMale ? 13 : 12;

  const mS = clamp(muscleMass / refMuscle, 0.65, 1.6);
  const fS = clamp(fatMass    / refFat,    0.30, 2.8);
  const vS = clamp(visceralFat / 7.0,      0.30, 2.5);  // 7 = reference level

  // Gender shape factors
  const gSh = isMale ? 1.06 : 0.78;  // shoulder breadth
  const gHp = isMale ? 0.86 : 1.06;  // hip breadth
  const gWaist = isMale ? 1.00 : 0.90; // female waist pinch

  // Helper: scale a base measurement by weighted muscle/fat contribution
  // mw + fw = 1.0 at reference (mS=fS=1)
  const w = (base, mw, fw) => base * (mw * mS + fw * fS) * s;
  const wr = (base, mw, fw) => base * (mw * mS + fw * Math.sqrt(fS)) * s; // sqrt for rounder fat

  // Torso elliptical ring definitions
  // Each: {yf (fraction of H), rxB, mwX, fwX, rzB, mwZ, fwZ, ozB, ozVw}
  // yf = y as fraction; B = base value for reference body
  // ozVw = how strongly visceral fat affects belly protrusion (0-2)
  const torsoSpec = [
    // yf     rxB    mwX      fwX      rzB    mwZ     fwZ    ozB    ozVw
    [.500, .138*gHp, .28, .72, .115, .28, .72, .000,  0.0],  // crotch-base
    [.530, .150*gHp, .27, .73, .124, .27, .73, .008,  0.4],  // hip-low
    [.565, .160*gHp, .26, .74, .133, .26, .74, .012,  0.7],  // hip-max
    [.592, .140,     .28, .72, .118, .28, .72, .018,  1.1],  // waist-low
    [.620, .122,     .24, .76, .102, .24, .76, .025,  1.5],  // waist
    [.640, .128,     .26, .74, .108, .26, .74, .026,  1.4],  // navel
    [.663, .142,     .30, .70, .120, .30, .70, .018,  0.9],  // underbust
    [.692, .148*gSh, .46, .54, .121, .46, .54, .009,  0.4],  // lower chest
    [.722, .152*gSh, .52, .48, .124, .52, .48, .004,  0.1],  // chest
    [.772, .162*gSh, .64, .36, .127, .60, .40, .000,  0.0],  // lower shoulder
    [.820, .188*gSh, .74, .26, .130, .68, .32,-.006,  0.0],  // shoulder peak
    [.852, .158*gSh, .72, .28, .120, .66, .34,-.004,  0.0],  // neck-shoulder
    [.876, .070,     .44, .56, .064, .44, .56,-.001,  0.0],  // neck-base
    [.895, .066,     .44, .56, .061, .44, .56, .000,  0.0],  // neck-top
  ];

  const torsoRings = torsoSpec.map(d => {
    const [yf, rxB, mwX, fwX, rzB, mwZ, fwZ, ozB, ozVw] = d;
    const waistK = (yf >= 0.585 && yf <= 0.645) ? gWaist : 1;          // female waist pinch
    const chestK = (isMale && yf >= 0.688 && yf <= 0.725) ? 1.06 : 1;  // male chest plate (rz only)
    const rxScale = mwX * mS + fwX * fS;
    const rzScale = mwZ * mS + fwZ * fS;
    const oz = ozB * fS * (1 + ozVw * Math.max(vS - 1, 0)) * s;
    return {
      y:  yf  * H,
      rx: rxB * rxScale * s * waistK,
      rz: rzB * rzScale * s * waistK * chestK,
      oz: clamp(oz, -0.06, 0.14),
    };
  });

  // Leg loft rings (each leg, relative to leg center axis)
  const legSpec = [
    // yf     r_base  mwR   fwR
    [.500, .070, .32, .68],  // thigh-top
    [.470, .075, .33, .67],  // upper thigh
    [.405, .068, .36, .64],  // thigh-mid
    [.340, .054, .42, .58],  // lower thigh
    [.300, .050, .50, .50],  // knee
    [.245, .043, .52, .48],  // below knee
    [.200, .045, .55, .45],  // calf max
    [.135, .030, .50, .50],  // lower calf
    [.082, .027, .45, .55],  // ankle
    [.028, .022, .40, .60],  // foot base
  ];
  const legR = legSpec.map(d => {
    const [yf, rB, mw, fw] = d;
    return { y: yf * H, r: wr(rB, mw, fw) };
  });

  // Leg X offset (distance from body center to leg axis)
  const legOffX = clamp((.070 * gHp * (0.28 * mS + 0.72 * fS)) * s + 0.01, 0.04, 0.14);

  // Arm loft rings (along arm axis, starting from shoulder point)
  const armSpec = [
    // t (0=shoulder, 1=wrist) / relative length
    [0.00, .046, .68, .32],  // shoulder cap
    [0.15, .044, .66, .34],  // upper arm top
    [0.42, .040, .64, .36],  // upper arm mid
    [0.52, .028, .50, .50],  // elbow
    [0.62, .030, .56, .44],  // forearm top
    [0.82, .026, .54, .46],  // forearm mid
    [1.00, .020, .45, .55],  // wrist
  ];
  const armLen   = .158 * H;  // upper+lower arm total
  const armAngle = 18 * Math.PI / 180; // angle from vertical

  return { H, s, mS, fS, vS, torsoRings, legR, legOffX, armSpec, armLen, armAngle };
}

/* ═══════════════════════════════════════
   BODY MESH BUILDER
═══════════════════════════════════════ */
/* Reference segment composition → multiplier 1.0 (matches the default 現在値 segments,
 * so leaving the grid at defaults reproduces the original silhouette exactly). */
const SEG_BASE = { arms:{m:38, f:28}, legs:{m:52, f:28}, trunk:{m:60, f:24} };
/* Per-part girth multiplier: more muscle% or fat% → thicker limb. */
function segMul(seg, base) {
  if (!seg) return 1;
  const m = (seg.musclePct ?? base.m) / base.m;
  const f = (seg.fatPct    ?? base.f) / base.f;
  return clamp(1 + 0.30 * (m - 1) + 0.45 * (f - 1), 0.78, 1.40);
}

/* ─── Plexus / network overlay ───────────────────────────────────────────
 * Soft round sprite used for the glowing vertex points. */
const DOT_TEX = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const rg = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  rg.addColorStop(0,    'rgba(255,255,255,1)');
  rg.addColorStop(0.25, 'rgba(255,255,255,0.85)');
  rg.addColorStop(1,    'rgba(255,255,255,0)');
  g.fillStyle = rg; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();

/* Glowing wireframe + vertex-point overlay for a (low-poly) body geometry,
 * giving the holographic "plexus / network" look from the reference image. */
function buildPlexusOverlay(geo, colorHex) {
  const grp = new THREE.Group();
  const c   = new THREE.Color(colorHex);
  const lit = c.clone().lerp(new THREE.Color(0xffffff), 0.25);  // gently lifted nodes
  // depthTest:false so the whole network (front + back) glows through the
  // translucent surface, like the reference hologram, instead of being occluded.
  const lines = new THREE.LineSegments(new THREE.WireframeGeometry(geo),
    new THREE.LineBasicMaterial({
      color: c, transparent: true, opacity: 0.16,
      blending: THREE.AdditiveBlending, depthTest: false, depthWrite: false,
    }));
  lines.renderOrder = 3;
  grp.add(lines);
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({
    color: lit, size: 0.017, map: DOT_TEX, sizeAttenuation: true,
    transparent: true, opacity: 0.55, alphaTest: 0.01,
    blending: THREE.AdditiveBlending, depthTest: false, depthWrite: false,
  }));
  pts.renderOrder = 4;
  grp.add(pts);
  return grp;
}

/* Simple open hand (palm + four fingers + thumb) from low-poly boxes, built in
 * local space: origin at the wrist, fingers extend toward -Y, palm in the XY plane. */
function buildHandGeo(hw, side) {
  const parts = [];
  const palmW = hw * 1.8, palmH = hw * 1.25, palmD = hw * 0.6;
  const palm = new THREE.BoxGeometry(palmW, palmH, palmD);
  palm.translate(0, -palmH * 0.5, 0);
  parts.push(palm);
  // short fingers (~half a palm) so the hand stays compact, not spindly
  const fingerLens = [palmH * 0.55, palmH * 0.66, palmH * 0.60, palmH * 0.45];
  const nF = fingerLens.length, slot = palmW / nF;
  for (let i = 0; i < nF; i++) {
    const fl = fingerLens[i];
    const fg = new THREE.BoxGeometry(slot * 0.6, fl, palmD * 0.7);
    fg.translate((i - (nF - 1) / 2) * slot * 0.95, -palmH - fl * 0.5, 0);
    parts.push(fg);
  }
  // thumb on the inner side (toward body centre), shorter and splayed out
  const thumb = new THREE.BoxGeometry(slot * 0.7, palmH * 0.6, palmD * 0.7);
  thumb.rotateZ(-side * 0.6);
  thumb.translate(-side * palmW * 0.46, -palmH * 0.3, 0);
  parts.push(thumb);
  return mergeGeos(parts);
}

function buildBodyMesh(params, gender, color, segments) {
  const data = computeBodyData(params, gender);
  const { H, s, mS, fS, armSpec, legR, legOffX, torsoRings } = data;
  const mat = makeHoloMat(color, H, gender === 'female');
  const group = new THREE.Group();

  /* Per-segment girth multipliers from the 部位別体組成 inputs. */
  const armMul   = segMul(segments?.arms,  SEG_BASE.arms);
  const legMul   = segMul(segments?.legs,  SEG_BASE.legs);
  const trunkMul = segMul(segments?.trunk, SEG_BASE.trunk);
  // Geometries collected here (all baked in group space) feed the plexus overlay.
  const wireGeos = [];
  // Apply trunk multiplier to the torso rings, tapering to ~1.0 near the neck/top
  // so only the trunk thickens (used below for neck, torso and shoulder-joint width).
  torsoRings.forEach(r => {
    const ny = r.y / H;
    const tw = ny > 0.82 ? clamp((0.90 - ny) / 0.08, 0, 1) : 1;
    const m  = 1 + (trunkMul - 1) * tw;
    r.rx *= m; r.rz *= m;
  });

  // ── HEAD ──
  // Egg-shaped skull with a jaw/chin taper (lathe profile) instead of a plain ball,
  // so it reads as a human head rather than a sphere.
  const headR  = 0.118 * s * clamp(0.7 + 0.3 * Math.sqrt(fS), 0.85, 1.25);
  const headH  = headR * 2.05;        // a touch taller than wide → head-like
  const crownY = H;                   // crown = top of the body
  const chinY  = crownY - headH;
  const headProfile = [
    // [radiusFraction, heightFraction]   height 0 = chin … 1 = crown
    [0.00, 0.000], [0.36, 0.05], [0.60, 0.14], [0.82, 0.27],
    [0.94, 0.41],  [1.00, 0.55], [1.00, 0.69], [0.92, 0.81],
    [0.72, 0.91],  [0.40, 0.975], [0.00, 1.000],
  ];
  const headPts = headProfile.map(([rf, hf]) =>
    new THREE.Vector2(Math.max(rf * headR, 1e-4), chinY + hf * headH));
  const headGeo  = new THREE.LatheGeometry(headPts, 24);
  headGeo.scale(1, 1, 1.12);           // bake a little front-to-back depth
  const headMesh = new THREE.Mesh(headGeo, mat);
  headMesh.castShadow = true;
  group.add(headMesh);
  wireGeos.push(headGeo);

  // ── NECK ──
  // Loft the last two torso rings up into the jaw for a smooth neck→head blend.
  const neckRings = torsoRings.slice(-2).concat([
    { y: torsoRings.at(-1).y + headR * 0.55,
      rx: torsoRings.at(-1).rx * 0.92, rz: torsoRings.at(-1).rz * 0.92 }
  ]);
  const neckGeo  = loftGeometry(neckRings, 16);
  const neckMesh = new THREE.Mesh(neckGeo, mat);
  neckMesh.castShadow = true;
  group.add(neckMesh);
  wireGeos.push(neckGeo);

  // ── TORSO ──
  const torsoFull = mergeGeos([loftGeometry(torsoRings, 30), diskCap(torsoRings[0], 30)]);
  const torsoMesh = new THREE.Mesh(torsoFull, mat);
  torsoMesh.castShadow = true;
  group.add(torsoMesh);
  wireGeos.push(torsoFull);

  // ── BUST (female only) ── two domes on the chest, scaled by fat
  if (gender === 'female') {
    const chestRing = torsoRings.find(r => r.y >= 0.715 * H) || torsoRings.at(-6);
    const cupR = clamp(0.052 * s * (0.6 + 0.5 * fS), 0.030, 0.085);
    const cupX = chestRing.rx * 0.46;
    const cupY = 0.700 * H;
    const cupZ = chestRing.rz * 0.78;
    [-1, 1].forEach(sd => {
      const bustGeo = new THREE.SphereGeometry(1, 14, 12);
      bustGeo.scale(cupR, cupR * 0.9, cupR * 1.05);
      bustGeo.translate(sd * cupX, cupY, cupZ);
      const bustMesh = new THREE.Mesh(bustGeo, mat);
      bustMesh.castShadow = true;
      group.add(bustMesh);
      wireGeos.push(bustGeo);
    });
  }

  // ── LEGS ──
  [-1, 1].forEach(side => {
    const xOff = side * legOffX;
    const rings = legR.map(({ y, r }) => ({ y, rx: r * legMul, rz: r * 0.9 * legMul, ox: xOff }));
    const legFull = mergeGeos([
      loftGeometry(rings, 22),
      diskCap({ ...rings.at(-1), rx: rings.at(-1).rx * 0.6, rz: rings.at(-1).rz * 0.6 }, 22),
    ]);
    const legMesh = new THREE.Mesh(legFull, mat);
    legMesh.castShadow = true;
    group.add(legMesh);
    wireGeos.push(legFull);

    // Foot — a shoe-like loft: flat sole with the toes leading forward (+Z),
    // narrowing up to the ankle, rather than a hard rectangular box.
    const fW = 0.050 * s * clamp(fS * 0.3 + 0.7, 0.85, 1.3);
    const fL = 0.108 * s;            // sole half-length (Z)
    const fH = 0.058 * s;            // foot height (up to ankle)
    const ozToe = fL * 0.40;         // push the sole forward so toes lead
    const footRings = [
      { y: 0.005 * s, rx: fW,        rz: fL,        ox: xOff, oz: ozToe },
      { y: fH * 0.45, rx: fW * 0.82, rz: fL * 0.72, ox: xOff, oz: ozToe * 0.7 },
      { y: fH,        rx: fW * 0.46, rz: fW * 0.5,  ox: xOff, oz: ozToe * 0.18 },
    ];
    const footGeo = mergeGeos([
      loftGeometry(footRings, 16),
      diskCap(footRings[0], 16),
    ]);
    const footMesh = new THREE.Mesh(footGeo, mat);
    footMesh.castShadow = true;
    group.add(footMesh);
    wireGeos.push(footGeo);
  });

  // ── ARMS ──
  // Shoulder joint position: at shoulder ring, outer edge
  const shoulderRing = torsoRings.find(r => r.y >= 0.815 * H) || torsoRings.at(-4);
  const sJointX = shoulderRing.rx;
  const sJointY = shoulderRing.y - 0.018 * s;

  // Arms hang close to the sides (small outward angle) and reach to the upper
  // thigh, like the reference figure. 3D-only — the report SVG keeps its own pose.
  const armAngle3D = 9 * Math.PI / 180;
  const armLen3D   = 0.36 * H;

  [-1, 1].forEach(side => {
    const ax = side * Math.sin(armAngle3D);
    const ay = -Math.cos(armAngle3D);

    const armRings = armSpec.map(d => {
      const [t, rB, mw, fw] = d;
      const dist = t * armLen3D;
      return {
        y:  sJointY + ay * dist,
        rx: clamp(rB * (mw * mS + fw * fS) * s * armMul, 0.012, 0.10),
        rz: clamp(rB * (mw * mS + fw * fS) * s * 0.93 * armMul, 0.010, 0.09),
        ox: side * sJointX + ax * dist,
      };
    });

    const armFull = mergeGeos([loftGeometry(armRings, 16), diskCap(armRings[0], 16)]);
    const armMesh = new THREE.Mesh(armFull, mat);
    armMesh.castShadow = true;
    group.add(armMesh);
    wireGeos.push(armFull);

    // ── HAND ── open hand (palm + fingers) at the wrist, baked into group space.
    const wrist   = armRings.at(-1);
    const hw      = clamp(wrist.rx * 1.5, 0.016, 0.05);
    const handGeo = buildHandGeo(hw, side);
    handGeo.rotateZ(side * armAngle3D);                  // align with the forearm
    handGeo.translate(wrist.ox + ax * hw * 0.4, wrist.y + ay * hw * 0.4, 0);
    const handMesh = new THREE.Mesh(handGeo, mat);
    handMesh.castShadow = true;
    group.add(handMesh);
    wireGeos.push(handGeo);
  });

  group.traverse(o => { if (o.isMesh) o.castShadow = true; });

  // ── PLEXUS OVERLAY ──
  // Glowing wireframe + vertex points over the whole body for the network look.
  group.add(buildPlexusOverlay(mergeGeos(wireGeos), color));

  // ── FRONT MARKER ──
  // A small arrow on the floor at the body's front (+Z). It is a child of the group,
  // so it rotates together with the body and always shows which way is "正面".
  const frontMat = new THREE.MeshBasicMaterial({ color: 0xffd060, transparent: true, opacity: 0.9 });
  const arrowGeo = new THREE.ConeGeometry(0.05 * s, 0.12 * s, 3);
  const arrow = new THREE.Mesh(arrowGeo, frontMat);
  arrow.rotation.x = Math.PI / 2;        // point the cone toward +Z (forward)
  arrow.position.set(0, 0.012, 0.34 * s);
  arrow.renderOrder = 2;
  group.add(arrow);

  return group;
}

/* ═══════════════════════════════════════
   SCENE MANAGEMENT
═══════════════════════════════════════ */
let curGroup = null;
let tgtGroup = null;

function rebuildBodies() {
  const disposeGroup = g => { bodyGroup.remove(g); g.traverse(o => { if (o.geometry) o.geometry.dispose(); }); };
  if (curGroup) disposeGroup(curGroup);
  if (tgtGroup) disposeGroup(tgtGroup);

  const mode = state.mode;

  if (mode === 'current' || mode === 'both') {
    curGroup = buildBodyMesh(state.current, state.gender, 0x4f9fff, state.segments);
    curGroup.position.x = mode === 'both' ? -0.55 : 0;
    curGroup.rotation.y = spinAngle;   // preserve turntable angle across rebuilds
    bodyGroup.add(curGroup);
  }

  if (mode === 'target' || mode === 'both') {
    tgtGroup = buildBodyMesh(state.target, state.gender, 0x00e5a0, state.targetSegments);
    tgtGroup.position.x = mode === 'both' ?  0.55 : 0;
    tgtGroup.rotation.y = spinAngle;
    bodyGroup.add(tgtGroup);
  }
}

/* ═══════════════════════════════════════
   CAMERA PRESETS
═══════════════════════════════════════ */
const VIEW_PRESETS = {
  front: { pos: [0, 0.9, 3.6], target: [0, 0.9, 0] },
  side:  { pos: [3.6, 0.9, 0], target: [0, 0.9, 0] },
  back:  { pos: [0, 0.9,-3.6], target: [0, 0.9, 0] },
  top:   { pos: [0, 4.5, 0.1], target: [0, 0.9, 0] },
};

function setView(name) {
  document.querySelectorAll('.ob').forEach(b => b.classList.remove('on'));
  document.getElementById('v' + name.charAt(0).toUpperCase() + name.slice(1))?.classList.add('on');
  const v = VIEW_PRESETS[name];
  if (!v) return;
  // Smooth lerp to preset
  const startPos = camera.position.clone();
  const startTgt = controls.target.clone();
  const endPos = new THREE.Vector3(...v.pos);
  const endTgt = new THREE.Vector3(...v.target);
  let t = 0;
  function step() {
    t += 0.04;
    if (t >= 1) { camera.position.copy(endPos); controls.target.copy(endTgt); controls.update(); return; }
    const k = 1 - Math.pow(1 - t, 3); // ease-out cubic
    camera.position.lerpVectors(startPos, endPos, k);
    controls.target.lerpVectors(startTgt, endTgt, k);
    controls.update();
    requestAnimationFrame(step);
  }
  step();
}

/* ═══════════════════════════════════════
   MORPH ANIMATION (current ↔ target)
═══════════════════════════════════════ */
let morphInterval = null;
let morphActive   = false;   // morph mode engaged (playing OR paused) — read by updateAnnotations
let morphPaused   = false;
let morphT        = 0;       // current morph progress 0(現在)…1(目標)
let morphDir      = 1;

/* Build the single blended body at the current morphT (used live and when paused). */
function renderMorphFrame() {
  const c = state.current, tg = state.target, t = morphT;
  const blend = {
    height:      c.height,
    weight:      c.weight      + (tg.weight      - c.weight)      * t,
    bodyFatPct:  c.bodyFatPct  + (tg.bodyFatPct  - c.bodyFatPct)  * t,
    muscleMass:  c.muscleMass  + (tg.muscleMass  - c.muscleMass)  * t,
    visceralFat: c.visceralFat + (tg.visceralFat - c.visceralFat) * t,
    subcutFat:   c.subcutFat   + (tg.subcutFat   - c.subcutFat)   * t,
  };
  const blendSeg = {};
  SEG_DEFS.forEach(d => {
    const a = state.segments[d.key], b = state.targetSegments[d.key];
    blendSeg[d.key] = {
      musclePct: a.musclePct + (b.musclePct - a.musclePct) * t,
      fatPct:    a.fatPct    + (b.fatPct    - a.fatPct)    * t,
    };
  });
  if (curGroup) { bodyGroup.remove(curGroup); curGroup.traverse(o => o.isMesh && o.geometry.dispose()); }
  if (tgtGroup) { bodyGroup.remove(tgtGroup); tgtGroup.traverse(o => o.isMesh && o.geometry.dispose()); tgtGroup = null; }
  const col = new THREE.Color(0x4f9fff).lerp(new THREE.Color(0x00e5a0), t);
  curGroup = buildBodyMesh(blend, state.gender, col.getHex(), blendSeg);
  curGroup.position.x = 0;
  curGroup.rotation.y = spinAngle;
  bodyGroup.add(curGroup);
}

function startMorphLoop() {
  morphInterval = setInterval(() => {
    morphT += morphDir * 0.012;
    if (morphT >= 1) { morphT = 1; morphDir = -1; }
    if (morphT <= 0) { morphT = 0; morphDir = 1; }
    renderMorphFrame();
  }, 30);
}

/* Morph button = play / pause / resume.
   Stopping no longer resets — it freezes so the numbers can be read.
   To leave morph mode entirely, use 現在のみ / 目標のみ / 並列比較. */
window.toggleMorph = function() {
  const btn = document.getElementById('btnMorph');

  if (morphInterval) {                 // playing → 一時停止（その場で固定）
    clearInterval(morphInterval);
    morphInterval = null;
    morphPaused = true;
    btn.textContent = `▶ 再開 (${Math.round(morphT * 100)}%)`;
    return;
  }
  if (morphActive && morphPaused) {     // paused → 再開
    morphPaused = false;
    btn.textContent = '⏸ 一時停止';
    startMorphLoop();
    return;
  }

  // off → start
  morphActive = true; morphPaused = false; morphT = 0; morphDir = 1;
  state.mode = 'both';
  document.getElementById('btnBoth').classList.add('on');
  ['btnCur','btnTgt'].forEach(id => document.getElementById(id).classList.remove('on'));
  btn.textContent = '⏸ 一時停止';
  renderMorphFrame();
  startMorphLoop();
};

/* ═══════════════════════════════════════
   VIEW SHIFT (3D body slides right when the
   segment panel opens, so it isn't hidden)
═══════════════════════════════════════ */
let viewShiftPx     = 0;   // currently applied horizontal lens shift (canvas px)
let viewShiftTarget = 0;   // desired shift — set by toggleSegPanel()
// スマホ幅では人体を横にずらさない（狭い画面で人体が見切れるのを防ぐ）
const isPhoneVP = () => window.matchMedia('(max-width:680px)').matches;

/* Re-apply the camera lens shift for the current canvas size.
 * setViewOffset shifts only the projection (the orbit target stays on the body and
 * annoProject() follows automatically because it reads the projection matrix). */
function applyViewOffset() {
  const vp = canvas.parentElement;
  const W  = vp.clientWidth, H = vp.clientHeight;
  if (Math.abs(viewShiftPx) < 0.5) {
    camera.clearViewOffset();
  } else {
    // negative offsetX pushes the rendered content to the right
    camera.setViewOffset(W, H, -viewShiftPx, 0, W, H);
  }
}

/* ═══════════════════════════════════════
   RESIZE
═══════════════════════════════════════ */
function resize() {
  const vp = canvas.parentElement;
  const W  = vp.clientWidth, H = vp.clientHeight;
  renderer.setSize(W, H, false);
  composer.setSize(W, H);
  bloom.resolution.set(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  if (isPhoneVP()) { viewShiftTarget = 0; viewShiftPx = 0; }  // スマホは常に中央
  applyViewOffset();   // keep the shift correct for the new dimensions
}
new ResizeObserver(resize).observe(canvas.parentElement);
resize();

/* ═══════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════ */
function animate() {
  requestAnimationFrame(animate);
  // Turntable spin: rotate the body groups about their own vertical axis.
  if (autoSpin) {
    spinAngle += SPIN_INC;
    if (curGroup) curGroup.rotation.y = spinAngle;
    if (tgtGroup) tgtGroup.rotation.y = spinAngle;
  } else if (spinReturning) {
    // Ease back to the front (0 rad) by the shortest path.
    let a = spinAngle % (Math.PI * 2);
    if (a >  Math.PI) a -= Math.PI * 2;
    if (a < -Math.PI) a += Math.PI * 2;
    a *= 0.85;
    if (Math.abs(a) < 0.002) { a = 0; spinReturning = false; }
    spinAngle = a;
    if (curGroup) curGroup.rotation.y = spinAngle;
    if (tgtGroup) tgtGroup.rotation.y = spinAngle;
  }
  // Ease the body's horizontal shift toward its target (matches the panel's slide).
  if (Math.abs(viewShiftPx - viewShiftTarget) > 0.4) {
    viewShiftPx += (viewShiftTarget - viewShiftPx) * 0.18;
    if (Math.abs(viewShiftPx - viewShiftTarget) <= 0.4) viewShiftPx = viewShiftTarget;
    applyViewOffset();
  }
  controls.update();
  composer.render();
  // annotation overlay (annoVisible / SEG_DEFS / ANNO_DEF) is declared later in the
  // module. Because the first frame is scheduled via requestAnimationFrame (not called
  // synchronously here), it only runs after the whole module has finished initialising.
  if (typeof updateAnnotations === 'function') updateAnnotations();
}
// Schedule the first frame for the next tick — NOT a synchronous call — so the loop body
// never touches let/const declared further down before they are initialised (TDZ).
requestAnimationFrame(animate);

document.getElementById('loading').style.display = 'none';

/* ═══════════════════════════════════════
   SLIDER DEFINITIONS
═══════════════════════════════════════ */
const SLIDERS_CUR = [
  { id:'height',     label:'身長 (cm)',        min:140, max:200, step:1 },
  { id:'weight',     label:'体重 (kg)',        min:35,  max:150, step:0.5 },
  { id:'bodyFatPct', label:'体脂肪率 (%)',     min:3,   max:50,  step:0.5 },
  { id:'muscleMass', label:'骨格筋率 (%)',     min:15,  max:60,  step:0.1 },
  { id:'visceralFat',label:'内臓脂肪レベル',  min:1,   max:30,  step:0.1 },
];
const SLIDERS_TGT = SLIDERS_CUR.filter(s => s.id !== 'height');

function fmt(id, v) {
  v = parseFloat(v);
  if (id === 'height')      return v.toFixed(0) + ' cm';
  if (id === 'weight')      return v.toFixed(1) + ' kg';
  if (id === 'bodyFatPct')  return v.toFixed(1) + ' %';
  if (id === 'muscleMass')  return v.toFixed(1) + ' %';
  if (id === 'visceralFat') return v.toFixed(1);
  return String(v);
}

function buildSliders(container, defs, dataKey) {
  while (container.firstChild) container.removeChild(container.firstChild);
  defs.forEach(s => {
    const val    = state[dataKey][s.id] ?? state.current[s.id];
    const isTgt  = dataKey === 'target';
    const digits = s.step < 1 ? 1 : 0;

    const wrap = document.createElement('div');
    wrap.className = 'sg' + (isTgt ? ' tgt' : '');

    /* Header: label + editable number input */
    const hdr = document.createElement('div');
    hdr.className = 'sh';

    const lbl = document.createElement('span');
    lbl.textContent = s.label;                                    // textContent — safe

    const numInp = document.createElement('input');
    numInp.type      = 'number';
    numInp.id        = `lbl_${dataKey}_${s.id}`;
    numInp.className = 'sg-num';
    numInp.min  = s.min; numInp.max  = s.max; numInp.step = s.step;
    numInp.value = parseFloat(val).toFixed(digits);

    hdr.appendChild(lbl);
    hdr.appendChild(numInp);

    /* Range slider */
    const range = document.createElement('input');
    range.type = 'range';
    range.min = s.min; range.max = s.max; range.step = s.step; range.value = val;

    /* Bidirectional sync */
    range.addEventListener('input', function () {
      const v = parseFloat(this.value);
      state[dataKey][s.id] = v;
      if (s.id === 'height') state.target.height = v;
      numInp.value = v.toFixed(digits);
      scheduleRebuild(); updateMetrics(); updateSegPanel();
    });

    numInp.addEventListener('change', function () {
      const v = Math.min(s.max, Math.max(s.min, parseFloat(this.value) || s.min));
      this.value = v.toFixed(digits);
      state[dataKey][s.id] = v;
      if (s.id === 'height') state.target.height = v;
      range.value = v;
      scheduleRebuild(); updateMetrics(); updateSegPanel();
    });

    wrap.appendChild(hdr);
    wrap.appendChild(range);
    container.appendChild(wrap);
  });
}

/* 現在値パネルの「測定値（任意）」＝3Dスライダーに無い手入力値（BMI・体年齢・基礎代謝量）。
   state.current.bmi / state.current.bodyAge / state.current.bmr に保存し、💾保存→記録→レポートへ流す。
   基礎代謝量(kcal)は InBody 等の測定機が表示するカロリー値。栄養アドバイスの基礎代謝に実測優先で使う。 */
const CUR_EXTRA = [
  { id:'bmi',     label:'BMI',             min:10,  max:60,   step:0.01, digits:1, ph:'例: 22.4' },
  { id:'bodyAge', label:'体年齢 (歳)',     min:5,   max:120,  step:1,    digits:0, ph:'例: 32'   },
  { id:'bmr',     label:'基礎代謝量 (kcal)', min:500, max:5000, step:1,    digits:0, ph:'例: 1640' },
];
function buildCurExtra() {
  const container = document.getElementById('curExtra');
  if (!container) return;
  while (container.firstChild) container.removeChild(container.firstChild);
  CUR_EXTRA.forEach(s => {
    const wrap = document.createElement('div'); wrap.className = 'sg';
    const hdr  = document.createElement('div'); hdr.className = 'sh';
    const lbl  = document.createElement('span'); lbl.textContent = s.label;   // textContent — safe
    const inp  = document.createElement('input');
    inp.type = 'number'; inp.className = 'sg-num'; inp.id = `cur_extra_${s.id}`;
    inp.min = s.min; inp.max = s.max; inp.step = s.step; inp.placeholder = s.ph;
    const cur = state.current[s.id];
    inp.value = (cur == null ? '' : cur);
    inp.addEventListener('change', function () {
      const raw = this.value.trim();
      if (raw === '') { state.current[s.id] = null; return; }
      let v = parseFloat(raw);
      if (isNaN(v)) { this.value = ''; state.current[s.id] = null; return; }
      v = Math.min(s.max, Math.max(s.min, v));
      v = s.digits ? +v.toFixed(s.digits) : Math.round(v);
      this.value = v;
      state.current[s.id] = v;
    });
    hdr.appendChild(lbl); hdr.appendChild(inp);
    wrap.appendChild(hdr);
    container.appendChild(wrap);
  });
}

/* Debounce body rebuild while dragging sliders */
let rebuildTimer = null;
function scheduleRebuild() {
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(rebuildBodies, 80);
}

═══════════════════════════════════════ */
function bmiCls(v) { return v < 18.5 ? 'y' : v < 25 ? 'g' : v < 30 ? 'y' : 'r'; }
function fatCls(v, g) {
  const [lo, hi] = g === 'male' ? [10, 20] : [18, 28];
  return v < lo ? 'y' : v <= hi ? 'g' : v <= hi + 5 ? 'y' : 'r';
}

function makeCard(lbl, val, cls, sub, bc) {
  const card = document.createElement('div');
  card.className = 'mc';
  if (bc) card.style.borderColor = bc;
  const l = document.createElement('div'); l.className = 'ml'; l.textContent = lbl;
  const v = document.createElement('div'); v.className = 'mv ' + (cls || ''); v.textContent = val;
  card.appendChild(l); card.appendChild(v);
  if (sub) { const s = document.createElement('div'); s.style.cssText='font-size:.6rem;color:var(--muted)'; s.textContent = sub; card.appendChild(s); }
  return card;
}

function updateMetrics() {
  const c = state.current;
  const t = state.target;
  const g = state.gender;
  const bmi = c.weight / (c.height / 100) ** 2;
  const fat = c.weight * c.bodyFatPct / 100;
  const lbm = c.weight - fat;
  const dW = (t.weight - c.weight).toFixed(1);
  const dF = (t.bodyFatPct - c.bodyFatPct).toFixed(1);
  const dM = (t.muscleMass - c.muscleMass).toFixed(1);
  const sg = v => parseFloat(v) > 0 ? '+' + v : String(v);
  const box = document.getElementById('metrics');
  while (box.firstChild) box.removeChild(box.firstChild);
  const cards = [
    makeCard('BMI', bmi.toFixed(1), bmiCls(bmi)),
    makeCard('体脂肪率', c.bodyFatPct.toFixed(1) + '%', fatCls(c.bodyFatPct, g), '目標 ' + t.bodyFatPct.toFixed(1) + '%'),
    makeCard('骨格筋率', c.muscleMass.toFixed(1) + '%',  'g', '目標 ' + t.muscleMass.toFixed(1) + '%'),
    makeCard('体重差', sg(dW) + ' kg', '', '', '#2a4060'),
    makeCard('脂肪差', sg(dF) + '%',  '', '', '#2a4060'),
    makeCard('筋肉差', sg(dM) + ' kg','', '', '#2a4060'),
  ];
  const dColors = [
    parseFloat(dW) < 0 ? 'var(--green)' : 'var(--gold)',
    parseFloat(dF) < 0 ? 'var(--green)' : 'var(--red)',
    parseFloat(dM) > 0 ? 'var(--green)' : 'var(--gold)',
  ];
  [3,4,5].forEach((i,j) => { cards[i].querySelector('.mv').style.color = dColors[j]; });
  cards.forEach(c => box.appendChild(c));
  if (typeof updateGoalHUD === 'function') updateGoalHUD();   // keep goal HUD live with edits
}

// Build the InBody form using DOM APIs
function buildIbForm() {
  const form = document.getElementById('ibForm');
  while (form.firstChild) form.removeChild(form.firstChild);

  IB_FIELDS.forEach(f => {
    // Section separator
    if (f.sep) {
      const sep = document.createElement('div');
      sep.className = 'ib-sep';
      sep.textContent = f.sep;
      form.appendChild(sep);
      return;
    }

    const row = document.createElement('div');
    row.className = 'ib-row' + (f.infoOnly ? ' info-only' : '');

    const label = document.createElement('label');
    label.htmlFor = 'ibf_' + f.id;
    label.textContent = f.label;         // textContent — safe

    const input = document.createElement('input');
    input.type = 'number';
    input.id   = 'ibf_' + f.id;

    input.max  = f.max;

    input.placeholder = f.ph;
    if (f.autoField) input.className = 'auto';
    input.setAttribute('aria-label', f.label);

    // Auto-calculation listeners
    input.addEventListener('input', () => recalcAutoFields());

    const unit = document.createElement('span');
    unit.className = 'unit';
    unit.textContent = f.unit;           // textContent — safe

    row.appendChild(label);
    row.appendChild(input);
    row.appendChild(unit);

// Auto-calculate BMI and 体脂肪量 from other fields
function recalcAutoFields() {
  const get = id => {
    const el = document.getElementById('ibf_' + id);
    const v  = el ? parseFloat(el.value) : NaN;
    return isNaN(v) ? null : v;
  };
  const set = (id, val, digits = 1) => {
    const el = document.getElementById('ibf_' + id);
    if (!el) return;
    if (val === null) { el.value = ''; return; }
    el.value    = val.toFixed(digits);
    el.className = 'auto';             // italicise to show it was auto-calculated
  };

  const h = get('height');
  const w = get('weight');
  const fp = get('bodyFatPct');
  const fm = get('fatMass');

  // BMI from height + weight
  if (h && w) set('bmi', w / (h / 100) ** 2, 2);

  // 体脂肪量 from weight × fat%  (only if fatMass field is empty or was auto)
  const fmEl = document.getElementById('ibf_fatMass');
  if (fmEl && (fmEl.className === 'auto' || fmEl.value === '') && w && fp) {
    set('fatMass', w * fp / 100);
  }

  // 体脂肪率 from weight + fat mass (only if bodyFatPct field is empty or was auto)
  const fpEl = document.getElementById('ibf_bodyFatPct');
  if (fpEl && (fpEl.className === 'auto' || fpEl.value === '') && w && fm) {
    set('bodyFatPct', fm / w * 100);
  }

  // Update note
  const note = document.getElementById('ibCalcNote');
  if (note) {
    note.textContent = (h && w)
      ? `BMI ${(w / (h / 100) ** 2).toFixed(1)} で自動計算されました`
      : '';
  }
}

// Apply form values to state and rebuild 3D
window.applyInBody = function () {
  const get = id => {
    const el = document.getElementById('ibf_' + id);
    return el ? parseFloat(el.value) : NaN;
  };

  const dest = state.ibDest;
  const applied = [];
  const msg = document.getElementById('parseMsg');

  IB_FIELDS.forEach(f => {
    if (f.sep || !f.key || f.infoOnly) return;   // skip separators, info-only, derived
    const v = get(f.id);
    if (!isNaN(v) && v > 0) {
      state[dest][f.key] = v;
      applied.push(f.label);
    }
  });

  if (!applied.length) {
    msg.style.color = 'var(--red)';
    msg.textContent = '⚠ 入力値がありません';
    return;
  }

  // Sync height to target if changed in current
  if (dest === 'current') {
    state.target.height = state.current.height;
    // InBodyのBMI欄（自動計算/手入力）を現在値の測定値としても取り込む
    const ibBmi = get('bmi');
    if (!isNaN(ibBmi) && ibBmi > 0) state.current.bmi = +ibBmi.toFixed(1);
    // InBodyの基礎代謝量(kcal)も現在値の測定値として取り込む（参考情報欄＝infoOnlyだが保存対象）
    const ibBmr = get('bmr');
    if (!isNaN(ibBmr) && ibBmr > 0) state.current.bmr = Math.round(ibBmr);
  }

  trunk: { getAnchor: H => new THREE.Vector3( 0.00, H * 0.61, 0.14), side:'right', xOff: 28 },

/* ── Build DOM for annotation cards + SVG lines ── */
function buildAnnoLayer() {
  const layer = document.getElementById('annoLayer');

    path.setAttribute('stroke-dasharray', '5,3.5');
    path.setAttribute('fill', 'none');
    svg.appendChild(path);

    /* SVG anchor dot with glow ring */
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.id = 'ad_' + def.key;
    circle.setAttribute('r', '4');
    circle.setAttribute('fill', '#4f9fff');
    circle.setAttribute('stroke', 'rgba(79,159,255,0.35)');

    /* Data card */

    card.appendChild(head);

    /* Muscle row */

function buildAnnoRow(id, labelText, color, valCls) {
  const row  = document.createElement('div'); row.className = 'ac-row';
  const lbl  = document.createElement('div'); lbl.className = 'ac-lbl';

/* ── Project a THREE.Vector3 to canvas 2-D coordinates ── */
function annoProject(v3) {
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  const v = v3.clone().project(camera);
  return {
    x: (v.x + 1) / 2 * W,
    y: (1 - v.y) / 2 * H,
    // z > 1 means behind the camera
    visible: v.z < 1,
  };
}

/* ── Called every frame from animate() ── */
function updateAnnotations() {
  if (!annoVisible) return;

  const W      = canvas.clientWidth;
  const H_px   = canvas.clientHeight;
  const bodyH  = state.current.height / 100;
  /* When side-by-side, annotate the left (current) body.
     During morph the single blended body is centred, so no shift. */
  const xShift = (state.mode === 'both' && !morphActive) ? -0.55 : 0;

  /* Body's on-screen horizontal extent: sample shoulder half-width in world space
     and project it, so cards can sit just OUTSIDE the silhouette (left/right). */
  const halfWorld  = 0.26 * (bodyH / 1.70);
  const pCenter    = annoProject(new THREE.Vector3(xShift, bodyH * 0.55, 0));
  const pEdge      = annoProject(new THREE.Vector3(xShift + halfWorld, bodyH * 0.55, 0));
  const bodyHalfPx = Math.max(36, Math.abs(pEdge.x - pCenter.x));
  const leftCol    = pCenter.x - bodyHalfPx;   // screen x of body's left edge
  const rightCol   = pCenter.x + bodyHalfPx;   // screen x of body's right edge

  SEG_DEFS.forEach(def => {
    const ad   = ANNO_DEF[def.key];
    const raw  = ad.getAnchor(bodyH);
    // Follow the turntable spin: rotate the anchor about the body's vertical axis,
    // then shift to the body's position (left body when side-by-side).
    if (spinAngle) {
      const ca = Math.cos(spinAngle), sa = Math.sin(spinAngle);
      const rx = raw.x * ca - raw.z * sa;
      const rz = raw.x * sa + raw.z * ca;
      raw.x = rx; raw.z = rz;
    }
    raw.x += xShift;

    const pt   = annoProject(raw);
    const card = document.getElementById('ac_' + def.key);
    if (!card) return;

    /* Hide when anchor is behind camera or view is from top */
    const hide = !pt.visible;
    card.classList.toggle('hidden', hide);
    const svgPath = document.getElementById('al_' + def.key);
    const svgDot  = document.getElementById('ad_' + def.key);
    if (svgPath) svgPath.style.display = hide ? 'none' : '';
    if (svgDot)  svgDot.style.display  = hide ? 'none' : '';
    if (hide) return;

    const cW = card.offsetWidth  || 150;
    const cH = card.offsetHeight || 78;
    const side   = ad.side;
    const gap    = 18;   // gap between the body silhouette and the card

    /* Place the card just OUTSIDE the body silhouette (left/right edge),
       a moderate distance away. Clamp to viewport / segment panel. */
    const panelW = document.getElementById('segPanel')?.classList.contains('open') ? 300 : 0;
    let cardX = side === 'left' ? leftCol - gap - cW : rightCol + gap;
    cardX = Math.max(panelW + 6, Math.min(W - cW - 6, cardX));
    const cardY = Math.max(6, Math.min(H_px - cH - 6, pt.y - cH / 2));
    card.style.left = cardX + 'px';
    card.style.top  = cardY + 'px';

    /* Short leader line: anchor → nearest card edge. */
    const edgeX = side === 'left' ? cardX + cW : cardX;
    const edgeY = cardY + cH / 2;
    if (svgPath) {
      svgPath.setAttribute('d',
        `M ${pt.x.toFixed(1)} ${pt.y.toFixed(1)} ` +
        `L ${edgeX.toFixed(1)} ${edgeY.toFixed(1)}`
      );
    }
    if (svgDot) {
      svgDot.setAttribute('cx', pt.x.toFixed(1));
      svgDot.setAttribute('cy', pt.y.toFixed(1));
    }

    /* Update bar + value display. During morph, flow current→target by morphT. */
    const segC = state.segments[def.key];
    const segT = state.targetSegments[def.key];
    let mPct = segC?.musclePct ?? 0;
    let fPct = segC?.fatPct    ?? 0;
    if (morphActive && segT) {
      mPct += ((segT.musclePct ?? 0) - mPct) * morphT;
      fPct += ((segT.fatPct    ?? 0) - fPct) * morphT;
    }

    const mBar = document.getElementById('acm_' + def.key + '_b');
    const fBar = document.getElementById('acf_' + def.key + '_b');
    const mVal = document.getElementById('acm_' + def.key + '_v');
    const fVal = document.getElementById('acf_' + def.key + '_v');

    if (mBar) mBar.style.width = Math.min(mPct / 85 * 100, 100) + '%';
    if (fBar) fBar.style.width = Math.min(fPct / 65 * 100, 100) + '%';
    if (mVal) mVal.textContent = mPct.toFixed(1) + '%';   // numeric safe
    if (fVal) fVal.textContent = fPct.toFixed(1) + '%';   // numeric safe
  });
}

/* Fullscreen helpers. We fullscreen the whole page (document root) so header,
   3-D viewport, right detail panel AND body-level overlays (customer modal, toasts)
   all stay visible. The ResizeObserver on the canvas parent re-sizes the renderer. */
function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}
function enterFullscreen() {
  const tgt = document.documentElement;
  const req = tgt.requestFullscreen || tgt.webkitRequestFullscreen;
  return req ? Promise.resolve(req.call(tgt)).catch(() => {}) : Promise.resolve();
}
function exitFullscreen() {
  const exit = document.exitFullscreen || document.webkitExitFullscreen;
  return exit ? Promise.resolve(exit.call(document)).catch(() => {}) : Promise.resolve();
}
window.toggleFullscreen = function () {
  if (!isFullscreen()) enterFullscreen(); else exitFullscreen();
};

/* When a report is printed from fullscreen, browsers force-exit fullscreen (the print
   preview can't render over a fullscreen element). We exit cleanly before printing and
   try to restore it after (best-effort — some browsers block re-entry without a fresh
   user gesture). */
let restoreFsAfterPrint = false;
let prevDocTitle = null;   // printReportRoot が差し替えたタブタイトルを afterprint で復元
window.addEventListener('afterprint', () => {
  if (prevDocTitle != null) { document.title = prevDocTitle; prevDocTitle = null; }
  if (restoreFsAfterPrint) {
    restoreFsAfterPrint = false;
    if (!isFullscreen()) enterFullscreen();
  }
});

/* Reflect fullscreen state on the button label. */
function onFullscreenChange() {
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  const on = !!fsEl;
  const btn = document.getElementById('btnFullscreen');
  if (btn) {
    btn.classList.toggle('on', on);
    btn.textContent = on ? '⛶ 全画面解除' : '⛶ 全画面';
  }
}
document.addEventListener('fullscreenchange', onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

/* Reference values (per gender) for radar normalisation */
/* Reference: 100% = standard value for each segment/gender */
const SEG_REF = {
  male:   { arms:{musclePct:40,fatPct:28}, legs:{musclePct:54,fatPct:28}, trunk:{musclePct:62,fatPct:23} },
  female: { arms:{musclePct:33,fatPct:32}, legs:{musclePct:47,fatPct:32}, trunk:{musclePct:55,fatPct:28} },
};

/* 3 segments — 両腕 / 両脚 / 体幹 */
const SEG_DEFS = [
  { key:'arms',  label:'両腕', mMax:75, fMax:55 },
  { key:'legs',  label:'両脚', mMax:80, fMax:55 },
  { key:'trunk', label:'体幹', mMax:85, fMax:50 },
];

/* ── 部位別バランスレーダー共通（初回/現在/目標の3時点を重ねる） ──
   rec: 記録の平坦キー(armM/armF/legM/…) か state.segments形式({arms:{musclePct,fatPct},…}) のどちらも可。
   metric: 'M'(骨格筋率) | 'F'(皮下脂肪率)。戻り値=[両腕,両脚,体幹] の対標準%（欠損は null）。 */
function segFlatKey(partKey, metric) { return (partKey === 'arms' ? 'arm' : partKey === 'legs' ? 'leg' : 'trunk') + metric; }
function segNormArr(rec, gender, metric) {
  const ref = SEG_REF[gender] || SEG_REF.male;
  return SEG_DEFS.map(d => {
    if (!rec) return null;
    let v = null;
    const flat = segFlatKey(d.key, metric);
    if (rec[flat] != null) v = rec[flat];                                  // flat record shape
    else if (rec[d.key]) v = metric === 'M' ? rec[d.key].musclePct : rec[d.key].fatPct; // state.segments shape
    const std = metric === 'M' ? ref[d.key].musclePct : ref[d.key].fatPct;
    return (v == null || !std) ? null : Math.round(v / std * 100);
  });
}
/* 部位の生値(%) を取り出す（カードの初回→現在→目標 併記用）。 */
function segRawVal(rec, partKey, metric) {
  if (!rec) return null;
  const flat = segFlatKey(partKey, metric);
  if (rec[flat] != null) return rec[flat];
  if (rec[partKey]) return metric === 'M' ? rec[partKey].musclePct : rec[partKey].fatPct;
  return null;
}

const SEG_RADAR_MUSCLE = { color:'#00e5a0', fill:'rgba(0,229,160,.16)' };
const SEG_RADAR_FAT    = { color:'#ffd060', fill:'rgba(255,208,96,.13)' };

/* 1時点ぶんのデータセット：骨格筋率(緑・実線+塗り)＋皮下脂肪率(金・実線+塗り)を重ねる。
   「現在」と「目標」は別レーダー（別枠）に分けるので、両枠とも同じ指標色で描き、
   どちらの枠かはレーダーのタイトルで区別する。pointBorder で点の縁色（テーマ別）を上書き可。 */
function segRadarMetricsDS(muscleArr, fatArr, pointBorder) {
  const mk = (label, arr, st) => ({ label, data:arr, borderColor:st.color, backgroundColor:st.fill,
    borderWidth:2.4, pointRadius:2.8, pointHoverRadius:5, pointStyle:'circle',
    pointBackgroundColor:st.color, pointBorderColor:pointBorder || st.color, pointBorderWidth:0 });
  return [ mk('骨格筋率 (対標準%)',  muscleArr, SEG_RADAR_MUSCLE),
           mk('皮下脂肪率 (対標準%)', fatArr,    SEG_RADAR_FAT) ];
}

      const mv  = Math.min(85, Math.max(0, parseFloat(mEl.value) || 0));
      const fv  = Math.min(65, Math.max(0, parseFloat(fEl.value) || 0));
      state.segments[def.key].musclePct = mv;
      state.segments[def.key].fatPct    = fv;
      mEl.value = mv.toFixed(1); fEl.value = fv.toFixed(1);
      card.classList.remove('editing');
      syncSgiFromSegments();
      updateSegPanel();
      scheduleRebuild();          // 部位別の変更を3Dの太さに反映
    });
    editDiv.appendChild(saveBtn);
    card.appendChild(editDiv);
    container.appendChild(card);
  });
}

/* Update bar widths / values / radar */
function updateSegPanel() {
  if (!spPanelOpen) return;
  const ref = SEG_REF[state.gender] || SEG_REF.male;
  const g = state.gender;
  // 初回（基準）= 表示中顧客の最古の記録。顧客未選択/記録なしのときは null。
  const custForFirst = activeName ? CDB.get(activeName) : null;
  const firstRec = (custForFirst && custForFirst.records && custForFirst.records.length)
    ? custForFirst.records[custForFirst.records.length - 1] : null;   // records は新しい順 → 末尾が最古
  const fmtPct = v => v == null ? '—' : v.toFixed(1) + '%';

  SEG_DEFS.forEach(def => {
    const seg  = state.segments[def.key];
    const mPct = Math.min(seg.musclePct / def.mMax * 100, 100);
    const fPct = Math.min(seg.fatPct    / def.fMax * 100, 100);

    const mFill = document.getElementById('mfill_' + def.key);
    const fFill = document.getElementById('ffill_' + def.key);
    const mVal  = document.getElementById('mval_'  + def.key);
    const fVal  = document.getElementById('fval_'  + def.key);
    const ratio = document.getElementById('ratio_' + def.key);

    if (mFill) mFill.style.width = mPct + '%';
    if (fFill) fFill.style.width = fPct + '%';
    if (mVal)  mVal.textContent  = seg.musclePct.toFixed(1) + '%'; // numeric safe
    if (fVal)  fVal.textContent  = seg.fatPct.toFixed(1)    + '%'; // numeric safe
    if (ratio) {
      while (ratio.firstChild) ratio.removeChild(ratio.firstChild);
      const ms  = document.createElement('span'); ms.className = 'rm';
      ms.textContent = '筋' + seg.musclePct.toFixed(1) + '%';
      const sep = document.createTextNode('  /  ');
      const fs  = document.createElement('span'); fs.className = 'rf';
      fs.textContent = '脂' + seg.fatPct.toFixed(1) + '%';
      ratio.appendChild(ms); ratio.appendChild(sep); ratio.appendChild(fs);
    }

    /* Sync card edit inputs */
    const mInp = document.getElementById(`sc_inp_${def.key}_musclePct`);
    const fInp = document.getElementById(`sc_inp_${def.key}_fatPct`);
    if (mInp) mInp.value = seg.musclePct.toFixed(1);
    if (fInp) fInp.value = seg.fatPct.toFixed(1);

    /* 初回 → 現在 （目標） を併記 */
    const cmpRow = (elId, lbl, color, metric) => {
      const row = document.getElementById(elId);
      if (!row) return;
      while (row.firstChild) row.removeChild(row.firstChild);
      const first = segRawVal(firstRec, def.key, metric);
      const cur   = metric === 'M' ? seg.musclePct : seg.fatPct;
      const goal  = segRawVal(state.targetSegments, def.key, metric);
      const tag = document.createElement('span'); tag.className = 'sc-cmp-tag';
      tag.style.color = color; tag.textContent = lbl;
      const body = document.createElement('span'); body.className = 'sc-cmp-body';
      let txt = '';
      if (first != null) txt += '初回 ' + fmtPct(first) + ' → ';
      txt += '現在 ' + fmtPct(cur);
      if (goal != null) txt += '（目標 ' + fmtPct(goal) + '）';
      body.textContent = txt;                    // textContent — safe
      row.appendChild(tag); row.appendChild(body);
    };
    cmpRow('cmp_m_' + def.key, '筋', 'var(--green)', 'M');
    cmpRow('cmp_f_' + def.key, '脂', 'var(--gold)',  'F');
  });

  /* Subtitle */
  const avgM = SEG_DEFS.reduce((s, d) => s + state.segments[d.key].musclePct, 0) / SEG_DEFS.length;
  const avgF = SEG_DEFS.reduce((s, d) => s + state.segments[d.key].fatPct,    0) / SEG_DEFS.length;
  const sub  = document.getElementById('spSubtitle');
  if (sub) sub.textContent = `平均 骨格筋率 ${avgM.toFixed(1)}%  /  皮下脂肪率 ${avgF.toFixed(1)}%`; // numeric safe

  /* Radar: 初回 / 現在 / 目標 を対標準%で2枚（骨格筋率・皮下脂肪率）に重ねる */
  const labels   = SEG_DEFS.map(d => d.label);
  const SP_FONT  = "'Segoe UI', system-ui, sans-serif";
  const spRadarOpts = {
    responsive: true, maintainAspectRatio: false,
    // 月切替でデータが変わったとき各頂点が滑らかに動く（グローバルの animation=false を上書き）
    animation: { duration: 650, easing: 'easeInOutQuart' },
    layout: { padding: 6 },
    plugins: {
      legend: { position: 'bottom',
        labels: { color:'#9aa0aa', font:{size:11, family:SP_FONT}, boxWidth:8, boxHeight:8, usePointStyle:true, pointStyle:'circle', padding:9 } },
      tooltip: { usePointStyle:true, padding:10, cornerRadius:8, backgroundColor:'#2a2d33',
        titleColor:'#e6e8ec', bodyColor:'#e6e8ec', borderColor:'rgba(255,255,255,.08)', borderWidth:1 },
    },
    scales: { r: {
      min:0, max:150,
      ticks: { stepSize:50, color:'#9aa0aa', font:{size:10, family:SP_FONT}, backdropColor:'transparent' },
      grid:  { color:'rgba(120,135,160,.16)' },
      angleLines: { color:'rgba(120,135,160,.16)' },
      pointLabels: { color:'#e6e8ec', font:{size:13, weight:'700', family:SP_FONT} },
    }},
  };
  const upsertSpRadar = (canvasId, datasets, chart) => {
    if (!chart) {
      const cv = document.getElementById(canvasId);
      if (!cv) return null;
      try { Chart.defaults.animation = false; } catch {}
      return new Chart(cv, { type:'radar', data:{ labels, datasets }, options: spRadarOpts });
    }
    chart.data.labels = labels;
    chart.data.datasets = datasets;
    chart.update();   // アニメーション付きで再描画（月切替で頂点が滑らかに変化）
    return chart;
  };
  // 現在＝state.segments、目標＝state.targetSegments を、それぞれ別枠で「筋率＋脂率」重ね表示
  spRadarCurChart = upsertSpRadar('spRadarCur',
    segRadarMetricsDS(segNormArr(state.segments, g, 'M'),       segNormArr(state.segments, g, 'F')),       spRadarCurChart);
  spRadarTgtChart = upsertSpRadar('spRadarTgt',
    segRadarMetricsDS(segNormArr(state.targetSegments, g, 'M'), segNormArr(state.targetSegments, g, 'F')), spRadarTgtChart);
}

/* Reusable segment grid. cfg = { containerId, segObj, idPrefix, sumId, isTarget } */
function buildSegInputGrid(cfg) {
  const container = document.getElementById(cfg.containerId);
  if (!container) return;
  while (container.firstChild) container.removeChild(container.firstChild);

  const wrap = document.createElement('div');
  wrap.className = 'sgi-wrap';

  /* Header */
  const head = document.createElement('div');
  head.className = 'sgi-head';
  ['部位', '骨格筋率 (%)', '皮下脂肪率 (%)'].forEach((t, i) => {
    const th = document.createElement('span');
    th.textContent = t;                          // textContent — safe (static label)
    if (i > 0) th.style.textAlign = 'center';
    head.appendChild(th);
  });
  wrap.appendChild(head);

  SEG_DEFS.forEach(def => {
    const seg = cfg.segObj[def.key];

    const row = document.createElement('div');
    row.className = 'sgi-row';

    /* Name */
    const nameEl = document.createElement('div');
    nameEl.className = 'sgi-name';
    nameEl.textContent = def.label;              // textContent — safe

    /* Muscle input */
    const mCell = document.createElement('div');
    mCell.className = 'sgi-cell';
    const mInp = document.createElement('input');
    mInp.type = 'number'; mInp.step = 0.1; mInp.min = 0; mInp.max = 85;
    mInp.value = (seg.musclePct ?? 0).toFixed(1);
    mInp.id = `${cfg.idPrefix}_${def.key}_m`;
    mInp.setAttribute('aria-label', def.label + ' 骨格筋率');
    const mUnit = document.createElement('span');
    mUnit.className = 'sgi-unit'; mUnit.textContent = '%';

    mInp.addEventListener('change', function () {
      const v = Math.min(85, Math.max(0, parseFloat(this.value) || 0));
      this.value = v.toFixed(1);
      cfg.segObj[def.key].musclePct = v;
      refreshSgiSum(cfg.segObj, cfg.sumId);
      scheduleRebuild();                                  // 3Dの太さに反映
      if (!cfg.isTarget && spPanelOpen) updateSegPanel();
    });

    mCell.appendChild(mInp); mCell.appendChild(mUnit);

    /* Fat-% input */
    const fCell = document.createElement('div');
    fCell.className = 'sgi-cell';
    const fInp = document.createElement('input');
    fInp.type = 'number'; fInp.step = 0.1; fInp.min = 0; fInp.max = 65;
    fInp.value = (seg.fatPct ?? 0).toFixed(1);
    fInp.id = `${cfg.idPrefix}_${def.key}_fp`;
    fInp.setAttribute('aria-label', def.label + ' 皮下脂肪率');
    const fUnit = document.createElement('span');
    fUnit.className = 'sgi-unit'; fUnit.textContent = '%';

    fInp.addEventListener('change', function () {
      const v = Math.min(65, Math.max(0, parseFloat(this.value) || 0));
      this.value = v.toFixed(1);
      cfg.segObj[def.key].fatPct = v;
      refreshSgiSum(cfg.segObj, cfg.sumId);
      scheduleRebuild();                                  // 3Dの太さに反映
      if (!cfg.isTarget && spPanelOpen) updateSegPanel();
    });

    fCell.appendChild(fInp); fCell.appendChild(fUnit);

    row.appendChild(nameEl); row.appendChild(mCell); row.appendChild(fCell);
    wrap.appendChild(row);
  });

  /* Derived summary row */
  const sumRow = document.createElement('div');
  sumRow.className = 'sgi-derived';
  sumRow.id = cfg.sumId;
  wrap.appendChild(sumRow);

  container.appendChild(wrap);
  refreshSgiSum(cfg.segObj, cfg.sumId);
}

function refreshSgiSum(segObj, elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  const avgM = SEG_DEFS.reduce((s, d) => s + segObj[d.key].musclePct, 0) / SEG_DEFS.length;
  const avgF = SEG_DEFS.reduce((s, d) => s + segObj[d.key].fatPct,    0) / SEG_DEFS.length;
  el.textContent = `平均  骨格筋率 ${avgM.toFixed(1)}%  /  皮下脂肪率 ${avgF.toFixed(1)}%`;
}

/** Build (or rebuild) both 現在/目標 segment grids. */
function buildAllSegGrids() {
  buildSegInputGrid({ containerId:'segInputGrid',    segObj:state.segments,       idPrefix:'sgi',  sumId:'sgiSum',  isTarget:false });
  buildSegInputGrid({ containerId:'segInputGridTgt', segObj:state.targetSegments, idPrefix:'sgiT', sumId:'sgiTSum', isTarget:true  });
}

/** Called from segment panel card saves to keep the 現在 sgi inputs in sync. */
function syncSgiFromSegments() {
  SEG_DEFS.forEach(def => {
    const seg = state.segments[def.key];
    const mEl = document.getElementById(`sgi_${def.key}_m`);
    const fEl = document.getElementById(`sgi_${def.key}_fp`);
    if (mEl) mEl.value = (seg.musclePct ?? 0).toFixed(1);
    if (fEl) fEl.value = (seg.fatPct    ?? 0).toFixed(1);
  });
  refreshSgiSum(state.segments, 'sgiSum');
}

const DB_KEY = 'bodyvis_customers_v1';
let cmCharts   = {};        // Chart.js instances  { key: Chart }
let cmReportMode = false;   // true while charts are built for the print report (light palette)

/* ── localStorage abstraction ── */
const CDB = {
  load()  { try { return JSON.parse(localStorage.getItem(DB_KEY) || '{}'); } catch { return {}; } },
  save(d) { localStorage.setItem(DB_KEY, JSON.stringify(d)); },
  all()   { return this.load(); },
  get(n)  { return this.load()[n] || null; },
  set(c)  { const d = this.load(); d[c.name] = c; this.save(d); },
  del(n)  { const d = this.load(); delete d[n]; this.save(d); },
  rename(oldName, newName) {                 // returns true on success
    const d = this.load();
    if (!d[oldName] || d[newName]) return false;   // missing source / name already taken
    const c = d[oldName]; c.name = newName;
    d[newName] = c; delete d[oldName];
    this.save(d);
    return true;
  },
  addRec(name, rec) {
    const d = this.load();
    if (!d[name]) return;
    d[name].records = [rec, ...d[name].records.filter(r => r.date.slice(0, 7) !== rec.date.slice(0, 7))]
                       .sort((a, b) => b.date.localeCompare(a.date));
    this.save(d);
  },
  delRec(name, date) {
    const d = this.load();
    if (!d[name]) return;
    d[name].records = d[name].records.filter(r => r.date !== date);
    this.save(d);
  },
  setGoal(name, goal) {
    const d = this.load();
    if (!d[name]) return;
    d[name].goal = goal;
    this.save(d);
  },
};

/* ── 新規契約率（成約率）store ── ジム全体の月次営業データ（顧客個別ではない）。
   month 'YYYY-MM' → { counsel, counselC, trial, trialC }
   counsel/counselC = カウンセリングのみ の実施数・成約数、trial/trialC = 体験込み の実施数・成約数。 */
const SALES_KEY = 'bodyvis_sales_v1';
const SDB = {
  all()  { try { return JSON.parse(localStorage.getItem(SALES_KEY) || '{}'); } catch { return {}; } },
  save(d){ localStorage.setItem(SALES_KEY, JSON.stringify(d)); },
  get(m) { return this.all()[m] || null; },
  set(m, rec) { const d = this.all(); d[m] = rec; this.save(d); },
  del(m) { const d = this.all(); delete d[m]; this.save(d); },
};

/* ── 年代別 新規契約率（成約率）store ── 月で区切らない通算データ。
   bucket '20代' 等 → { lead, contract }（実施数・成約数）。日付/月では記録しない＝数だけ保持。 */

/* ── Brand (gym/trainer) helpers ── */
const APP_NAME = 'BODYVERSE';   // レポート出力(PDF/HTML)のファイル名 = `${APP_NAME}_顧客名`
const BRAND_KEY = 'bodyvis_brand_v1';
function getBrand() {
  try { return JSON.parse(localStorage.getItem(BRAND_KEY)) || {}; } catch { return {}; }
}
function setBrand(b) { try { localStorage.setItem(BRAND_KEY, JSON.stringify(b)); } catch {} }

function renderBrandInputs(container) {

  const b = getBrand();

  };
  container.appendChild(mk('gymName', 'ジム名'));

/* Shift a 'YYYY-MM' string back by n months. */
function monthMinus(ymStr, n) {
  const [y, m] = ymStr.split('-').map(Number);
  return new Date(y, m - 1 - n, 1).toISOString().slice(0, 7);
}

/* Report period controls: 開始月・終了月 month pickers + quick presets. */
function renderReportRange(container) {
  if (!container) return;
  while (container.firstChild) container.removeChild(container.firstChild);
  // Row 1: ラベル
  const lbl = document.createElement('span'); lbl.className = 'rep-range-lbl'; lbl.textContent = 'レポート期間';
  // Row 2: 開始月 〜 終了月
  const from = document.createElement('input'); from.type = 'month'; from.id = 'repFrom'; from.className = 'rep-range-inp';
  const tld  = document.createElement('span'); tld.className = 'rep-range-tld'; tld.textContent = '〜';
  const to   = document.createElement('input'); to.type = 'month'; to.id = 'repTo'; to.className = 'rep-range-inp';
  const dateRow = document.createElement('div'); dateRow.className = 'rep-range-row';
  dateRow.appendChild(from); dateRow.appendChild(tld); dateRow.appendChild(to);
  // Row 3: プリセットボタン
  const presetRow = document.createElement('div'); presetRow.className = 'rep-range-row';
  [['all', '全期間'], ['6m', '直近6ヶ月'], ['year', '今年']].forEach(([k, t]) => {
    const b = document.createElement('button'); b.className = 'cbtn cbtn-ghost cbtn-sm'; b.textContent = t;
    b.addEventListener('click', () => applyReportPreset(k));
    presetRow.appendChild(b);
  });
  container.appendChild(lbl); container.appendChild(dateRow); container.appendChild(presetRow);
  applyReportPreset('all');
}

/* Fill the report period inputs from a preset, based on the active customer's data span. */
function applyReportPreset(k) {
  const from = document.getElementById('repFrom'), to = document.getElementById('repTo');
  if (!from || !to) return;
  const cust = activeName ? CDB.get(activeName) : null;
  const asc  = cust ? [...cust.records].sort((a, b) => a.date.localeCompare(b.date)) : [];
  const firstM = asc[0]?.date.slice(0, 7) || '';
  const lastM  = asc[asc.length - 1]?.date.slice(0, 7) || new Date().toISOString().slice(0, 7);
  if (k === '6m')        { to.value = lastM; from.value = monthMinus(lastM, 5); }
  else if (k === 'year') { to.value = lastM; from.value = lastM.slice(0, 4) + '-01'; }
  else                   { to.value = lastM; from.value = firstM; }   // 'all'
}
