/* ── Sidebar ── */
let custFilter = '';   // name-search filter for the customer list
window.onCustSearch = function (val) { custFilter = val || ''; buildCMSidebar(); };

/* 今月（YYYY-MM）の記録があるか＝今月測定済みか。測定忘れチェックの単一基準。 */
function isMeasuredThisMonth(cust) {
  const m = cmToday().slice(0, 7);
  return (cust && cust.records || []).some(r => r && r.date && r.date.slice(0, 7) === m);
}

/* 休会中か。cust.status === 'paused' で休会。未設定＝在籍中（後方互換）。 */
function isPaused(cust) {
  return !!(cust && cust.status === 'paused');
}

function buildCMSidebar() {
  refreshCustSelect();   // keep the header dropdown in sync
  const list = document.getElementById('cmCustList');
  while (list.firstChild) list.removeChild(list.firstChild);

  const all      = CDB.all();
  const allNames = Object.keys(all).sort((a, b) => a.localeCompare(b, 'ja'));

  if (!allNames.length) {
    const empty = document.createElement('div');
    empty.className = 'cm-empty';
    empty.style.padding = '1.2rem .75rem';
    const ico = document.createElement('div');
    ico.textContent = '👤'; ico.style.fontSize = '2rem';
    const txt = document.createElement('div');
    txt.textContent = '顧客がいません';
    empty.appendChild(ico); empty.appendChild(txt);
    list.appendChild(empty);
    return;
  }

  // Apply name search filter (case-insensitive substring)
  const q = custFilter.trim().toLowerCase();
  const names = q ? allNames.filter(n => n.toLowerCase().includes(q)) : allNames;

  if (!names.length) {
    const empty = document.createElement('div');
    empty.className = 'cm-empty';
    empty.style.padding = '1.2rem .75rem';
    const txt = document.createElement('div');
    txt.textContent = `「${custFilter.trim()}」に一致する顧客がいません`;
    empty.appendChild(txt);
    list.appendChild(empty);
    return;
  }

  names.forEach(name => {
    const cust   = all[name];
    const latest = cust.records?.[0];

    const item = document.createElement('div');
    item.className = 'cm-ci' + (name === activeName ? ' sel' : '');

    const nameRow = document.createElement('div');
    nameRow.className = 'cm-ci-namerow';
    const nameEl = document.createElement('div');
    nameEl.className = 'cm-ci-name';
    nameEl.textContent = name;                                   // textContent — safe

    // 休会中なら休会バッジ、在籍中なら今月の測定状況バッジ（測定忘れ防止）
    const badge = document.createElement('span');
    if (isPaused(cust)) {
      item.classList.add('paused');
      badge.className = 'cm-ci-badge paused';
      badge.textContent = '💤 休会中';
      badge.title = '休会中';
    } else {
      const measured = isMeasuredThisMonth(cust);
      badge.className = 'cm-ci-badge ' + (measured ? 'ok' : 'pending');
      badge.textContent = measured ? '✓ 今月' : '⚠ 未測定';
      badge.title = measured ? '今月測定済み' : '今月まだ測定していません';
    }
    nameRow.appendChild(nameEl); nameRow.appendChild(badge);

    const sub = document.createElement('div');
    sub.className = 'cm-ci-sub';
    sub.textContent = latest
      ? `${cust.records.length}件  最終: ${latest.date}`
      : '記録なし';                                              // textContent — safe (date strings)

    item.appendChild(nameRow); item.appendChild(sub);
    item.addEventListener('click', () => selectCustomer(name));
    list.appendChild(item);
  });
}

/* ── Select customer ── */
function selectCustomer(name) {
  activeName = name;
  buildCMSidebar();
  refreshCustSelect();          // keep header name dropdown in sync with modal selection

  const cust = CDB.get(name);
  if (!cust) return;

  // 顧客名を選んだ時点で、その人の記録（現在値＋部位別）を 3D 人体へ即反映し、
  // ヘッダーの 📅 日付ピッカーに各月を出す（モーダルを閉じればすぐ表示できる状態にする）。
  // 既に同じ顧客のある月を表示中なら、その月を保ったまま読み込む（最新へ勝手に戻さない）。
  const keepDate = (cust.records || []).some(r => r.date === hudDisplayDate) ? hudDisplayDate : undefined;
  loadCustomerToView(name, keepDate);

  // Build header
  const hdr = document.getElementById('cmCustHdr');
  while (hdr.firstChild) hdr.removeChild(hdr.firstChild);

  const left = document.createElement('div');
  left.style.cssText = 'display:flex;align-items:center;gap:.5rem;flex:1;min-width:0';

  const nameEl = document.createElement('span');
  nameEl.style.cssText = 'font-size:.95rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
  nameEl.textContent = cust.name;                               // textContent — safe

  const gBadge = document.createElement('span');
  gBadge.style.cssText = 'font-size:.68rem;color:var(--muted);background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:.1rem .38rem;flex-shrink:0';
  gBadge.textContent = cust.gender === 'male' ? '♂ 男性' : '♀ 女性';

  const cntBadge = gBadge.cloneNode();
  cntBadge.textContent = `${cust.records.length}件`;

  const ageBadge = gBadge.cloneNode();
  const ageVal = cmAge(cust);
  ageBadge.textContent = ageVal != null ? `🎂 ${ageVal}歳` : '🎂 年齢未設定';
  ageBadge.style.cursor = 'pointer';
  ageBadge.title = '年齢を編集';
  ageBadge.addEventListener('click', () => editAge(cust.name));

  const editBtn = document.createElement('button');
  editBtn.className = 'cbtn cbtn-ghost cbtn-sm';
  editBtn.textContent = '✏️ 名前';
  editBtn.title = '名前を修正';
  editBtn.addEventListener('click', () => renameCustomer(cust.name));

  // 休会中ステータス：在籍/休会の切替ボタン＋休会中バッジ
  const paused = isPaused(cust);
  const pauseBtn = document.createElement('button');
  pauseBtn.className = 'cbtn cbtn-sm ' + (paused ? 'cbtn-green' : 'cbtn-ghost');
  pauseBtn.textContent = paused ? '▶ 復帰' : '💤 休会';
  pauseBtn.title = paused ? '在籍中に戻す' : '休会中にする';
  pauseBtn.addEventListener('click', () => togglePause(cust.name));

  left.appendChild(nameEl); left.appendChild(gBadge); left.appendChild(ageBadge); left.appendChild(cntBadge);
  if (paused) {
    const pBadge = gBadge.cloneNode();
    pBadge.textContent = cust.pausedSince ? `💤 休会中（${cust.pausedSince}〜）` : '💤 休会中';
    pBadge.style.color = '#cbd2db';
    pBadge.style.background = 'rgba(154,160,170,.18)';
    pBadge.style.borderColor = 'rgba(154,160,170,.5)';
    left.appendChild(pBadge);
  }
  left.appendChild(editBtn); left.appendChild(pauseBtn);
  hdr.appendChild(left);

  const delBtn = document.createElement('button');
  delBtn.className = 'cbtn cbtn-red cbtn-sm';
  delBtn.textContent = '🗑 削除';
  delBtn.addEventListener('click', () => {
    if (!confirm(`「${cust.name}」と全記録を削除しますか？`)) return;
    CDB.del(name);
    activeName = null;
    buildCMSidebar();
    clearCMMain('顧客を選択するか新規登録してください');
  });
  hdr.appendChild(delBtn);

  // Enable PDF / CSV buttons only when customer is active
  document.getElementById('cmPdfBtn').disabled = false;
  document.getElementById('cmCsvBtn').disabled = false;
  applyReportPreset('all');   // reset report period to this customer's full span

  // Open on the summary tab (renderSummary is invoked by showCMPane)
  showCMPane('summary');
}

/* Rename a customer (keeps all records & goal). */
function renameCustomer(oldName) {
  if (!CDB.get(oldName)) return;
  const input = prompt(`「${oldName}」さんの新しい名前を入力してください。`, oldName);
  if (input == null) return;                       // cancelled
  const newName = input.trim();
  if (!newName || newName === oldName) return;     // empty or unchanged
  if (CDB.get(newName)) { alert(`「${newName}」は既に登録されています。別の名前にしてください。`); return; }
  if (!CDB.rename(oldName, newName)) { alert('名前を変更できませんでした。'); return; }

  if (activeName === oldName) activeName = newName;
  refreshCustSelect();
  buildCMSidebar();
  selectCustomer(newName);                          // rebuild modal header + panes for new name
  refreshDateUI(CDB.get(newName), hudDisplayDate);  // header date picker reflects new name
  updateGoalHUD();
  cmToast(`✓ 名前を「${newName}」に変更しました`);
}

/* Edit a customer's (optional) age. Empty input clears it. */
function editAge(name) {
  const cust = CDB.get(name);
  if (!cust) return;
  const cur = cmAge(cust);
  const input = prompt(`「${name}」さんの年齢を入力してください（空欄で未設定にできます）。\n年齢があると Mifflin式BMR・年齢補正の体脂肪率ゾーン・代謝年齢推定が使えます。`, cur != null ? String(cur) : '');
  if (input === null) return;                       // cancelled
  const trimmed = input.trim();
  if (trimmed === '') { cust.age = undefined; }
  else {
    const n = Math.round(Number(trimmed));
    if (!isFinite(n) || n < 5 || n > 120) { alert('5〜120 の数値で入力してください。'); return; }
    cust.age = n;
  }
  CDB.set(cust);
  selectCustomer(name);                             // rebuild header + summary with new age
  cmToast(cust.age != null ? `✓ 年齢を ${cust.age} 歳に設定しました` : '✓ 年齢を未設定にしました');
}

/* 休会中（hiatus）ステータスの切替。休会中の会員は今月未測定リマインドから除外される。 */
function togglePause(name) {
  const cust = CDB.get(name);
  if (!cust) return;
  const nowPaused = !isPaused(cust);
  if (nowPaused) {
    cust.status = 'paused';
    cust.pausedSince = cmToday();   // 休会開始日（参考表示用）
  } else {
    cust.status = 'active';
    delete cust.pausedSince;
  }
  CDB.set(cust);
  selectCustomer(name);             // ヘッダー＋サイドバーに新ステータスを反映
  cmToast(nowPaused ? `💤 「${name}」を休会中にしました` : `▶ 「${name}」を在籍中に戻しました`);
}

/* ── Clear main area ── */
function clearCMMain(msg) {
  const hdr = document.getElementById('cmCustHdr');
  while (hdr.firstChild) hdr.removeChild(hdr.firstChild);

  ['cmPaneSummary', 'cmPaneRec', 'cmPaneChart', 'cmPaneSim', 'cmPaneAdvice', 'cmPaneRoster'].forEach(id => {
    const p = document.getElementById(id);
    while (p.firstChild) p.removeChild(p.firstChild);
  });

  showCMPane('summary');
  const pane = document.getElementById('cmPaneSummary');
  const empty = document.createElement('div');
  empty.className = 'cm-empty';
  const txt = document.createElement('span');
  txt.textContent = msg || '';
  empty.appendChild(txt);
  pane.appendChild(empty);

  document.getElementById('cmPdfBtn').disabled = true;
  document.getElementById('cmCsvBtn').disabled = true;
}

/* ── Tab switching ── */
const CM_TABS = { summary: 'Summary', rec: 'Rec', chart: 'Chart', sim: 'Sim', advice: 'Advice', roster: 'Roster' };
window.showCMPane = function (which) {
  Object.keys(CM_TABS).forEach(k => {
    document.getElementById('cmTab'  + CM_TABS[k])?.classList.toggle('on', k === which);
    document.getElementById('cmPane' + CM_TABS[k])?.classList.toggle('on', k === which);
  });
  // 顧客情報（会員名簿の年代別分析）は全顧客の集計なので、顧客未選択でも表示する。
  if (which === 'roster') { buildRosterPane(); return; }
  if (!activeName) return;
  const cust = CDB.get(activeName);
  if (which === 'summary') renderSummary(cust);
  if (which === 'rec')     renderRecords(cust);
  if (which === 'chart')   buildCharts(cust);
  if (which === 'sim')     buildSimPane(cust);
  if (which === 'advice')  buildAdvicePane(cust);
};

/* ── 顧客情報（会員名簿の年代別分析・全顧客集計） ──
   選択中の顧客に依存せず、CDB.all() の全会員を年代別に集計して表示する。

const rosterCharts = {};
function buildRosterPane() {

  const custs = Object.values(CDB.all());
  if (!custs.length) {
    const e = document.createElement('div'); e.className = 'cm-empty';

  }

  // 各会員の最新記録（records は新しい順だが、念のため最大日付を採用）
  const latestRec = c => {
    const rs = (c.records || []).filter(r => r && r.date);
    return rs.length ? rs.reduce((a, b) => (b.date > a.date ? b : a)) : null;
  };

  // ── 年代バケットへ振り分け ──
  const BUCKETS = [

    { label:'20代',   test:a => a >= 20 && a < 30,   members:[] },
    { label:'30代',   test:a => a >= 30 && a < 40,   members:[] },

  ];
  custs.forEach(c => {
    const a = cmAge(c);
    (BUCKETS.find(b => b.test(a)) || BUCKETS[BUCKETS.length - 1]).members.push(c);
  });
  const active = BUCKETS.filter(b => b.members.length);   // 0人の年代は出さない

  // 在籍中／休会中で分ける（測定リマインドは在籍中のみ対象）
  const activeMembers = custs.filter(c => !isPaused(c));
  const pausedMembers = custs.filter(c => isPaused(c));

  // ── ① 会員サマリー数値 ──
  const ages = custs.map(cmAge).filter(a => a != null);

  const goalKeys = ['weight', 'bodyFatPct', 'muscleMass', 'visceralFat'];
  const goalCnt = custs.filter(c => c.goal && goalKeys.some(k => c.goal[k] != null)).length;
  const thisMonth = cmToday().slice(0, 7);
  const measuredCnt = activeMembers.filter(c => (c.records || []).some(r => r && r.date && r.date.slice(0, 7) === thisMonth)).length;

  scroll.appendChild(cmSecTitle('👥 会員サマリー'));
  const sgrid = document.createElement('div'); sgrid.className = 'cm-sum-grid';
  sgrid.appendChild(cmSumCard('総会員数', String(custs.length), '', null, pausedMembers.length ? `在籍 ${activeMembers.length}・休会 ${pausedMembers.length}` : null));
  sgrid.appendChild(cmSumCard('休会中', `${pausedMembers.length} 名`, '', null, `在籍 ${activeMembers.length}名`));
  sgrid.appendChild(cmSumCard('平均年齢', avgAge != null ? `${avgAge} 歳` : '—', '', null, ages.length < custs.length ? `年齢設定 ${ages.length}名` : null));
  sgrid.appendChild(cmSumCard('目標設定済み', `${goalCnt} 名`, '', null, `全${custs.length}名中`));
  sgrid.appendChild(cmSumCard('今月測定済み', `${measuredCnt} 名`, '', null, `在籍 ${activeMembers.length}名中`));
  scroll.appendChild(sgrid);

  // ── 今月未測定の会員リスト（測定忘れ防止・在籍中のみ。休会中は除外） ──
  const unmeasured = activeMembers.filter(c => !isMeasuredThisMonth(c)).sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ja'));
  scroll.appendChild(cmSecTitle(`⚠ 今月未測定の会員（${unmeasured.length}名）`));

  const tooltipOpt = () => ({ padding:10, cornerRadius:8, backgroundColor:'#2a2d33', titleColor:'#e6e8ec', bodyColor:'#e6e8ec', borderColor:'rgba(255,255,255,.08)', borderWidth:1 });
  const labels = active.map(b => b.label);
  const newChartBox = (titleText, h = 160) => {

  {
    const sAll = SDB.all();
    const rate = (c, n) => (n > 0 ? Math.round((c / n) * 100) : null);
    const rtxt = (c, n) => { const r = rate(c, n); return r == null ? '—' : r + '%'; };

      months.forEach(m => {
        const y = m.slice(0, 4), r = sAll[m];
        const a = years[y] || (years[y] = { counsel: 0, counselC: 0, trial: 0, trialC: 0 });
        a.counsel += r.counsel || 0; a.counselC += r.counselC || 0; a.trial += r.trial || 0; a.trialC += r.trialC || 0;
      });
      const yKeys = Object.keys(years).sort((a, b) => b.localeCompare(a));
      scroll.appendChild(cmSecTitle('📅 年毎の総合'));
      const ywrap = document.createElement('div'); ywrap.className = 'sales-tbl-wrap';
      const ytbl = document.createElement('table'); ytbl.className = 'sales-tbl';
      const yth = document.createElement('thead'); const ythr = document.createElement('tr');
      [['年',''],['実施計',''],['成約計',''],['CS率','sgrp-c'],['体験率','sgrp-t'],['総成約率','']].forEach(([h, cls]) => {
        const th = document.createElement('th'); th.textContent = h; if (cls) th.className = cls; ythr.appendChild(th);
      });
      yth.appendChild(ythr); ytbl.appendChild(yth);
      const ytb = document.createElement('tbody');
      yKeys.forEach(y => {
        const a = years[y]; const totN = a.counsel + a.trial, totC = a.counselC + a.trialC;
        const tr = document.createElement('tr');
        const cells = [
          [`${y}年`, null], [String(totN), null], [String(totC), null],
          [rtxt(a.counselC, a.counsel), rcol(a.counselC, a.counsel)],
          [rtxt(a.trialC, a.trial), rcol(a.trialC, a.trial)],
          [rtxt(totC, totN), rcol(totC, totN)],
        ];
        cells.forEach(([txt, col]) => { const td = document.createElement('td'); td.textContent = txt; if (col) { td.style.color = col; td.classList.add('sales-rate'); } tr.appendChild(td); });
        ytb.appendChild(tr);
      });
      ytbl.appendChild(ytb); ywrap.appendChild(ytbl); scroll.appendChild(ywrap);

      // ── 月次 総成約率の推移グラフ ──
      const ascMonths = [...months].reverse();
      const overallRates = ascMonths.map(m => { const r = sAll[m]; return rate((r.counselC || 0) + (r.trialC || 0), (r.counsel || 0) + (r.trial || 0)); });
      if (overallRates.some(v => v != null)) {
        scroll.appendChild(cmSecTitle('📈 新規契約率の推移（月次）'));
        const { box, cv } = newChartBox('総成約率 (%)');
        scroll.appendChild(box);
        rosterCharts.sales = new Chart(cv, {
          type: 'line',
          data: { labels: ascMonths.map(m => (+m.slice(5, 7)) + '月'), datasets: [{ label: '総成約率(%)', data: overallRates, borderColor: '#ffd060', backgroundColor: 'rgba(255,208,96,.15)', borderWidth: 2, tension: .3, fill: true, pointRadius: 3, spanGaps: true }] },
          options: { responsive: true, plugins: { legend: legendOpt(false), tooltip: { ...tooltipOpt(), callbacks: { label: c => ` ${c.parsed.y}%` } } },
            scales: { x: xScale(), y: yScale({ max: 100, ticks: { color: TX, font: { size: 9, ...FONT }, padding: 6, callback: v => v + '%' } }) } }
        });
      }
    } else {
      const e = document.createElement('div'); e.className = 'sales-note';
      e.textContent = 'まだ新規契約率のデータがありません。上のフォームに月別の実施数・成約数を入力して保存してください。';
      scroll.appendChild(e);
    }

    const sn = document.createElement('div'); sn.className = 'sales-note';
    sn.textContent = '※ CS＝カウンセリングのみ／体験＝体験込み。成約率＝成約数÷実施数。総成約率＝両チャネル合計。このデータは端末に保存され、顧客のJSON書出には含まれません。';
    scroll.appendChild(sn);
  }

  // ── 🎂 年代別 新規契約率（成約率）── 月では区切らない通算データ（年代ごとの実施数・成約数のみ）──
  {
    const aAll = SAGE.all();
    const rate = (c, n) => (n > 0 ? Math.round((c / n) * 100) : null);
    const rtxt = (c, n) => { const r = rate(c, n); return r == null ? '—' : r + '%'; };
    const rcol = (c, n) => { const r = rate(c, n); return r == null ? '' : (r >= 60 ? 'var(--green)' : r >= 35 ? 'var(--gold)' : 'var(--red)'); };

    scroll.appendChild(cmSecTitle('🎂 年代別 新規契約率（成約率）'));

    // 入力フォーム（年代ごとの実施数・成約数。月を持たない通算値）
    const form = document.createElement('div'); form.className = 'sales-form';
    const inputs = {};   // bucket → { lead, contract }
    const mkNum = (v) => { const i = document.createElement('input'); i.type = 'number'; i.min = '0'; i.step = '1'; i.className = 'sales-num'; i.placeholder = '0'; if (v != null) i.value = v; return i; };
    SALES_AGE_BUCKETS.forEach(b => {
      const rec = aAll[b] || {};
      const lead = mkNum(rec.lead != null ? rec.lead : ''), contract = mkNum(rec.contract != null ? rec.contract : '');
      inputs[b] = { lead, contract };
      const row = document.createElement('div'); row.className = 'sales-frow';
      const lbl = document.createElement('span'); lbl.className = 'sales-flbl'; lbl.textContent = b;
      const l1 = document.createElement('span'); l1.className = 'sales-numlbl'; l1.textContent = '実施';
      const l2 = document.createElement('span'); l2.className = 'sales-numlbl'; l2.textContent = '→ 成約';
      row.appendChild(lbl); row.appendChild(l1); row.appendChild(lead); row.appendChild(l2); row.appendChild(contract);
      form.appendChild(row);
    });

    const r3 = document.createElement('div'); r3.className = 'sales-frow';
    const saveBtn = document.createElement('button'); saveBtn.className = 'cbtn cbtn-green cbtn-sm'; saveBtn.textContent = '保存';
    saveBtn.addEventListener('click', () => {
      const nn = el => { const v = parseInt(el.value, 10); return isNaN(v) || v < 0 ? 0 : v; };
      const d = {};
      SALES_AGE_BUCKETS.forEach(b => {
        const lead = nn(inputs[b].lead), contract = Math.min(nn(inputs[b].contract), lead);
        if (lead || contract) d[b] = { lead, contract };   // 全0の年代は保存しない
      });
      SAGE.save(d);
      buildRosterPane();
    });
    r3.appendChild(saveBtn);
    const hint = document.createElement('span'); hint.className = 'sales-note'; hint.style.margin = '0'; hint.textContent = '成約数は実施数を上限に保存します。月別ではなく年代ごとの通算値です。';
    r3.appendChild(hint);
    form.appendChild(r3);
    scroll.appendChild(form);

    // ── 年代別 集計テーブル ──
    const filled = SALES_AGE_BUCKETS.filter(b => aAll[b] && (aAll[b].lead || aAll[b].contract));
    if (filled.length) {
      const wrap = document.createElement('div'); wrap.className = 'sales-tbl-wrap';
      const tbl = document.createElement('table'); tbl.className = 'sales-tbl';
      const thead = document.createElement('thead'); const htr = document.createElement('tr');
      [['年代', ''], ['実施', ''], ['成約', ''], ['成約率', '']].forEach(([h, cls]) => {
        const th = document.createElement('th'); th.textContent = h; if (cls) th.className = cls; htr.appendChild(th);
      });
      thead.appendChild(htr); tbl.appendChild(thead);
      const tb = document.createElement('tbody');
      let totLead = 0, totC = 0;
      filled.forEach(b => {
        const r = aAll[b]; const lead = r.lead || 0, contract = r.contract || 0;
        totLead += lead; totC += contract;
        const tr = document.createElement('tr');
        const cells = [[b, null], [String(lead), null], [String(contract), null], [rtxt(contract, lead), rcol(contract, lead)]];
        cells.forEach(([txt, col]) => { const td = document.createElement('td'); td.textContent = txt; if (col) { td.style.color = col; td.classList.add('sales-rate'); } tr.appendChild(td); });
        tb.appendChild(tr);
      });
      // 合計行
      const trT = document.createElement('tr');
      const tcells = [['合計', null], [String(totLead), null], [String(totC), null], [rtxt(totC, totLead), rcol(totC, totLead)]];
      tcells.forEach(([txt, col]) => { const td = document.createElement('td'); td.textContent = txt; td.style.fontWeight = '800'; if (col) td.style.color = col; trT.appendChild(td); });
      trT.style.borderTop = '2px solid var(--border)';
      tb.appendChild(trT);
      tbl.appendChild(tb); wrap.appendChild(tbl); scroll.appendChild(wrap);

      // ── 年代別 成約率 棒グラフ ──
      const rates = filled.map(b => rate(aAll[b].contract || 0, aAll[b].lead || 0));
      if (rates.some(v => v != null)) {
        const { box, cv } = newChartBox('年代別 成約率 (%)');
        scroll.appendChild(box);
        rosterCharts.salesAge = new Chart(cv, {
          type: 'bar',
          data: { labels: filled, datasets: [{ label: '成約率(%)', data: rates, backgroundColor: 'rgba(255,208,96,.55)', borderColor: '#ffd060', borderWidth: 1, borderRadius: 5 }] },
          options: { responsive: true, plugins: { legend: legendOpt(false), tooltip: { ...tooltipOpt(), callbacks: { label: c => ` ${c.parsed.y}%` } } },
            scales: { x: xScale(), y: yScale({ max: 100, ticks: { color: TX, font: { size: 9, ...FONT }, padding: 6, callback: v => v + '%' } }) } }
        });
      }
    } else {
      const e = document.createElement('div'); e.className = 'sales-note';
      e.textContent = 'まだ年代別のデータがありません。上のフォームに年代ごとの実施数・成約数を入力して保存してください。';
      scroll.appendChild(e);
    }

    const sn2 = document.createElement('div'); sn2.className = 'sales-note';
    sn2.textContent = '※ 年代別は月をまたいだ通算の実施数・成約数です（日付・月では記録しません）。このデータは端末に保存され、顧客のJSON書出には含まれません。';
    scroll.appendChild(sn2);
  }

  // ── ② 年代別の会員数分布 ──
  scroll.appendChild(cmSecTitle('📊 年代別の会員数'));
  const grid2 = document.createElement('div'); grid2.className = 'cm-charts-grid';
  scroll.appendChild(grid2);
  {
    const { box, cv } = newChartBox('会員数（人）');
    grid2.appendChild(box);
    // 年代ごとの色（不明は最後の灰系）。順番固定で見分けやすく。
    const AGE_COLORS = ['#4f9fff', '#00e5a0', '#ffd060', '#ff6b6b', '#b58cff', '#ff9f5a', '#9aa0aa'];
    const counts = active.map(b => b.members.length);
    rosterCharts.count = new Chart(cv, {
      type: 'pie',
      data: { labels, datasets: [{ label:'会員数', data: counts,
        backgroundColor: active.map((_, i) => AGE_COLORS[i % AGE_COLORS.length]),
        borderColor: '#2a2d33', borderWidth: 2 }] },
      options: { responsive:true, plugins:{
        legend: legendOpt(true),
        tooltip: { ...tooltipOpt(), callbacks: { label: (c) => {
          const total = counts.reduce((s, v) => s + v, 0) || 1;
          return ` ${c.label}: ${c.parsed}名 (${Math.round(c.parsed / total * 100)}%)`;
        } } },
      } }
    });
  }

  // ── ③ 年代別の平均体組成（体脂肪率% / 骨格筋率% / BMI） ──
  const avg = arr => { const v = arr.filter(x => x != null); return v.length ? +(v.reduce((s, x) => s + x, 0) / v.length).toFixed(1) : null; };
  const bfArr  = active.map(b => avg(b.members.map(c => { const r = latestRec(c); return r ? (r.bodyFatPct ?? null) : null; })));
  const mmArr  = active.map(b => avg(b.members.map(c => { const r = latestRec(c); return r ? (r.muscleMass ?? null) : null; })));
  const bmiArr = active.map(b => avg(b.members.map(c => { const r = latestRec(c); const v = r ? cmBMI(r, c) : null; return v != null ? +v.toFixed(1) : null; })));
  const hasComp = [bfArr, mmArr, bmiArr].some(a => a.some(v => v != null));
  {
    const { box, cv } = newChartBox('平均体組成（最新測定）');
    grid2.appendChild(box);
    if (!hasComp) {
      box.removeChild(cv);
      const note = document.createElement('div'); note.style.cssText = 'font-size:.7rem;color:var(--muted);padding:.4rem .1rem';
      note.textContent = '体組成データのある記録がまだありません。';
      box.appendChild(note);
    } else {
      rosterCharts.comp = new Chart(cv, {
        type: 'bar',
        data: { labels, datasets: [
          { label:'体脂肪率 (%)', data: bfArr,  backgroundColor:'rgba(255,107,107,.6)', borderColor:'#ff6b6b', borderWidth:1, borderRadius:4 },
          { label:'骨格筋率 (%)', data: mmArr,  backgroundColor:'rgba(0,229,160,.6)',   borderColor:'#00e5a0', borderWidth:1, borderRadius:4 },
          { label:'BMI',         data: bmiArr, backgroundColor:'rgba(79,159,255,.6)',  borderColor:'#4f9fff', borderWidth:1, borderRadius:4 },
        ] },
        options: { responsive:true, plugins:{ legend: legendOpt(true), tooltip: tooltipOpt() },
          scales:{ x: xScale(), y: yScale() } }
      });
    }
  }

  // 各会員の初回記録（最も古い日付）。在籍期間・達成度の起点に使う。
  const firstRec = c => {
    const rs = (c.records || []).filter(r => r && r.date);
    return rs.length ? rs.reduce((a, b) => (b.date < a.date ? b : a)) : null;
  };
  // 人数軸（整数）の y スケール。
  const cntYScale = () => yScale({ ticks:{ color:TX, font:{ size:9, ...FONT }, padding:6, precision:0, stepSize:1 } });
  const cntTooltip = () => ({ ...tooltipOpt(), callbacks:{ label:(c) => ` ${c.parsed.y ?? c.parsed} 名` } });

  // ── ④ 目標達成度・在籍期間の分布 ──
  scroll.appendChild(cmSecTitle('📈 達成度・在籍状況'));
  const grid3 = document.createElement('div'); grid3.className = 'cm-charts-grid';
  scroll.appendChild(grid3);

  // 目標達成度の分布（目標設定済み会員のみ）
  {
    const GOAL_BANDS = [
      { label:'0–25%',  test:p => p < 25 },
      { label:'25–50%', test:p => p >= 25 && p < 50 },
      { label:'50–75%', test:p => p >= 50 && p < 75 },
      { label:'75–100%',test:p => p >= 75 },
    ];
    const goalCusts = custs.filter(c => c.goal && goalKeys.some(k => c.goal[k] != null));
    const goalCounts = GOAL_BANDS.map(() => 0);
    let goalEval = 0;
    goalCusts.forEach(c => {
      const op = cmOverallProgress(c, firstRec(c), latestRec(c));
      if (!op) return;
      goalEval++;
      const bi = GOAL_BANDS.findIndex(b => b.test(op.pct));
      if (bi >= 0) goalCounts[bi]++;
    });
    const { box, cv } = newChartBox(`目標達成度の分布（${goalEval}名）`);
    grid3.appendChild(box);
    if (!goalEval) {
      box.removeChild(cv);
      const n = document.createElement('div'); n.style.cssText = 'font-size:.7rem;color:var(--muted);padding:.4rem .1rem';
      n.textContent = '目標設定済みで達成度を算出できる会員がまだいません。';
      box.appendChild(n);
    } else {
      rosterCharts.goal = new Chart(cv, {
        type: 'bar',
        data: { labels: GOAL_BANDS.map(b => b.label), datasets: [{ label:'会員数', data: goalCounts,
          backgroundColor:'rgba(0,229,160,.6)', borderColor:'#00e5a0', borderWidth:1, borderRadius:5 }] },
        options: { responsive:true, plugins:{ legend: legendOpt(false), tooltip: cntTooltip() },
          scales:{ x: xScale(), y: cntYScale() } }
      });
    }
  }

  // 在籍期間（初回記録〜現在の継続月数）の分布
  {
    const TENURE_BANDS = [
      { label:'〜3ヶ月',  test:m => m < 3 },
      { label:'3〜6ヶ月', test:m => m >= 3 && m < 6 },
      { label:'6〜12ヶ月',test:m => m >= 6 && m < 12 },
      { label:'1年以上',  test:m => m >= 12 },
    ];
    const now = new Date();
    const tenureCounts = TENURE_BANDS.map(() => 0);
    let tenureEval = 0;
    custs.forEach(c => {
      const f = firstRec(c); if (!f) return;
      const d = new Date(f.date + 'T00:00:00');
      let m = (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth());
      if (m < 0) m = 0;
      tenureEval++;
      const bi = TENURE_BANDS.findIndex(b => b.test(m));
      if (bi >= 0) tenureCounts[bi]++;
    });
    const { box, cv } = newChartBox(`在籍期間の分布（${tenureEval}名）`);
    grid3.appendChild(box);
    if (!tenureEval) {
      box.removeChild(cv);
      const n = document.createElement('div'); n.style.cssText = 'font-size:.7rem;color:var(--muted);padding:.4rem .1rem';
      n.textContent = '記録のある会員がまだいません。';
      box.appendChild(n);
    } else {
      rosterCharts.tenure = new Chart(cv, {
        type: 'bar',
        data: { labels: TENURE_BANDS.map(b => b.label), datasets: [{ label:'会員数', data: tenureCounts,
          backgroundColor:'rgba(79,159,255,.6)', borderColor:'#4f9fff', borderWidth:1, borderRadius:5 }] },
        options: { responsive:true, plugins:{ legend: legendOpt(false), tooltip: cntTooltip() },
          scales:{ x: xScale(), y: cntYScale() } }
      });
    }
  }

  const note = document.createElement('div');
  note.style.cssText = 'font-size:.66rem;color:var(--muted);margin-top:.6rem;line-height:1.5';
  note.textContent = '※ 平均体組成は各会員の最新測定から算出（値の無い会員はその項目の平均から除外）。達成度は目標設定済み会員のみ・初回→最新の総合達成率。在籍期間は初回記録から現在までの月数。年齢未設定の会員は「不明」に集計されます。';
  scroll.appendChild(note);
}

/* ── Records table ── */
/* Month strings (YYYY-MM) currently checked in the records table for batch reporting. */
let recSelMonths = new Set();

function renderRecords(cust) {
  const pane = document.getElementById('cmPaneRec');
  while (pane.firstChild) pane.removeChild(pane.firstChild);
  recSelMonths = new Set();   // reset selection whenever the table is (re)built

  // Selection toolbar (batch report of checked months)
  let selBar = null, selCountEl = null, repBtn = null;
  if (cust.records.length) {
    selBar = document.createElement('div');
    selBar.className = 'cm-rec-bar';
    selCountEl = document.createElement('span');
    selCountEl.className = 'cm-rec-bar-cnt';
    repBtn = document.createElement('button');
    repBtn.className = 'cbtn cbtn-green cbtn-sm';
    repBtn.textContent = '📄 選択した月をレポート';
    repBtn.addEventListener('click', () => exportSelectedReport(cust.name));
    const clrBtn = document.createElement('button');
    clrBtn.className = 'cbtn cbtn-ghost cbtn-sm';
    clrBtn.textContent = '選択解除';
    clrBtn.addEventListener('click', () => {
      recSelMonths.clear();
      pane.querySelectorAll('.cm-rec-chk').forEach(c => { c.checked = false; });
      const head = pane.querySelector('.cm-rec-chk-all'); if (head) head.checked = false;
      updateSelBar();
    });
    selBar.appendChild(selCountEl);
    selBar.appendChild(repBtn);
    selBar.appendChild(clrBtn);
    pane.appendChild(selBar);
  }
  const updateSelBar = () => {
    if (!selBar) return;
    const n = recSelMonths.size;
    selCountEl.textContent = n ? `☑ ${n}件 選択中` : '記録にチェックを入れて選択した月だけをレポートできます';
    repBtn.disabled = n === 0;
  };

  // Scrollable table area
  const scroll = document.createElement('div');
  scroll.className = 'cm-rec-scroll';

  if (!cust.records.length) {
    const empty = document.createElement('div');
    empty.className = 'cm-empty';
    const txt = document.createElement('span');
    txt.textContent = '記録がありません。下の「＋ 記録を追加」から登録してください。';
    empty.appendChild(txt);
    scroll.appendChild(empty);
  } else {
    const tbl  = document.createElement('table');
    tbl.className = 'cm-tbl';

    const COLS = ['','測定日','体重','体脂肪率','骨格筋率','内臓脂肪Lv','皮下脂肪','メモ','操作'];
    const thead = document.createElement('thead');
    const hrow  = document.createElement('tr');
    COLS.forEach((c, i) => {
      const th = document.createElement('th');
      if (i === 1 || i >= 7) th.style.textAlign = 'left';
      if (i === 0) {
        th.style.textAlign = 'center';
        const allChk = document.createElement('input');
        allChk.type = 'checkbox';
        allChk.className = 'cm-rec-chk-all';
        allChk.title = 'すべて選択';
        allChk.addEventListener('change', () => {
          recSelMonths = new Set();
          if (allChk.checked) cust.records.forEach(r => recSelMonths.add(r.date.slice(0, 7)));
          pane.querySelectorAll('.cm-rec-chk').forEach(c => { c.checked = allChk.checked; });
          updateSelBar();
        });
        th.appendChild(allChk);
      } else {
        th.textContent = c;                                     // textContent — safe (static label)
      }
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    cust.records.forEach((r, idx) => {
      const older = cust.records[idx + 1] || null;   // records are newest-first → next is chronologically previous
      const row = document.createElement('tr');

      // Selection checkbox cell
      const chkTd = document.createElement('td');
      chkTd.style.textAlign = 'center';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.className = 'cm-rec-chk';
      const mKey = r.date.slice(0, 7);
      chk.addEventListener('change', () => {
        if (chk.checked) recSelMonths.add(mKey); else recSelMonths.delete(mKey);
        const head = pane.querySelector('.cm-rec-chk-all');
        if (head) head.checked = recSelMonths.size === cust.records.length;
        updateSelBar();
      });
      chkTd.appendChild(chk);
      row.appendChild(chkTd);

      const addCell = (text, align, deltaEl) => {
        const td = document.createElement('td');
        if (align) td.style.textAlign = align;
        const sp = document.createElement('span'); sp.textContent = text;   // textContent — safe
        td.appendChild(sp);
        if (deltaEl) { td.appendChild(document.createElement('br')); td.appendChild(deltaEl); }
        row.appendChild(td);
      };

      addCell(r.date.replace(/-/g, '/'), 'left');   // 実際の測定日を 'YYYY/MM/DD' で表示
      addCell(r.weight     != null ? r.weight.toFixed(1)     + ' kg' : '—', 'right',
              older ? cmDeltaBadge(r.weight,     older.weight,     { lowerBetter:true,  neutral:true, unit:'kg', tiny:true }) : null);
      addCell(r.bodyFatPct != null ? r.bodyFatPct.toFixed(1) + ' %'  : '—', 'right',
              older ? cmDeltaBadge(r.bodyFatPct, older.bodyFatPct, { lowerBetter:true,  unit:'%', tiny:true }) : null);
      addCell(r.muscleMass != null ? r.muscleMass.toFixed(1) + ' %'  : '—', 'right',
              older ? cmDeltaBadge(r.muscleMass, older.muscleMass, { lowerBetter:false, unit:'%', tiny:true }) : null);
      addCell(r.visceralFat != null ? String(r.visceralFat) : '—', 'right');
      addCell(r.subcutFat   != null ? String(r.subcutFat)   : '—', 'right');
      addCell(r.note || '', 'left');

      // Action cell
      const actTd = document.createElement('td');
      actTd.style.cssText = 'text-align:right;display:flex;gap:.3rem;justify-content:flex-end;padding:.35rem .45rem';

      const loadBtn = document.createElement('button');
      loadBtn.className = 'cbtn cbtn-ghost cbtn-sm';
      loadBtn.textContent = '3D確認';
      loadBtn.addEventListener('click', () => {
        loadCustomerToView(cust.name, r.date);   // loads record + segments + goal, updates date picker & HUD
        window.closeCustomerModal();
      });

      const editBtn = document.createElement('button');
      editBtn.className = 'cbtn cbtn-ghost cbtn-sm';
      editBtn.textContent = '✏️';
      editBtn.title = 'この記録を編集';
      editBtn.addEventListener('click', () => { if (afEditorAPI) afEditorAPI(r.date); });

      const delBtn2 = document.createElement('button');
      delBtn2.className = 'cbtn cbtn-red cbtn-sm';
      delBtn2.textContent = '✕';
      delBtn2.title = '記録を削除';
      delBtn2.addEventListener('click', () => {
        if (!confirm(`${r.date} の記録を削除しますか？`)) return;
        CDB.delRec(cust.name, r.date);
        renderRecords(CDB.get(cust.name));
        buildCMSidebar();
      });

      actTd.appendChild(loadBtn); actTd.appendChild(editBtn); actTd.appendChild(delBtn2);
      row.appendChild(actTd);
      tbody.appendChild(row);
    });
    tbl.appendChild(tbody);
    scroll.appendChild(tbl);
  }
  pane.appendChild(scroll);
  updateSelBar();   // initialize toolbar text/disabled state

  // Add-record form
  buildAddForm(pane, cust.name);
}

/* Set by buildAddForm so the records table's ✏️ button can open the editor for a given month. */
let afEditorAPI = null;

/* ── Add-record form (collapsible) ── */
function buildAddForm(parent, custName) {

  // Form (hidden by default)
  const formDiv = document.createElement('div');
  formDiv.style.display = 'none';

  const h4 = document.createElement('h4');
  h4.textContent = '測定値を入力して保存';
  formDiv.appendChild(h4);

  // Mode indicator (new month vs update existing month)
  const afStatus = document.createElement('div');
  afStatus.className = 'af-status';
  formDiv.appendChild(afStatus);

  const grid = document.createElement('div');
  grid.className = 'cm-fgrid';

  const seg = state.segments;
  const FIELDS = [
    { id:'af_date',       label:'測定日',        type:'date',   def:new Date().toISOString().slice(0,10) },
    { id:'af_height',     label:'身長 (cm)',     type:'number', def:state.current.height,      step:0.1 },
    { id:'af_weight',     label:'体重 (kg)',     type:'number', def:state.current.weight,      step:0.1 },
    { id:'af_bodyFatPct', label:'体脂肪率 (%)', type:'number', def:state.current.bodyFatPct,  step:0.1 },
    { id:'af_muscleMass', label:'骨格筋率 (%)', type:'number', def:state.current.muscleMass,  step:0.1 },
    { id:'af_bmi',        label:'BMI（任意）',  type:'number', def:'', step:0.01 },
    { id:'af_visceralFat',label:'内臓脂肪Lv',   type:'number', def:state.current.visceralFat, step:0.1 },
    { id:'af_subcutFat',  label:'皮下脂肪(cm²)',type:'number', def:state.current.subcutFat,   step:1   },
    { id:'af_bodyAge',    label:'体年齢 (歳・任意)', type:'number', def:'', step:1 },
    { id:'af_bmr',        label:'基礎代謝量 (kcal・任意)', type:'number', def:'', step:1 },
    { sep:'部位別 筋率・脂率 (任意・推移グラフに使用)' },
    { id:'af_armM',   label:'腕 筋率(%)',   type:'number', def:seg.arms.musclePct,  step:0.1 },
    { id:'af_armF',   label:'腕 脂率(%)',   type:'number', def:seg.arms.fatPct,     step:0.1 },
    { id:'af_legM',   label:'脚 筋率(%)',   type:'number', def:seg.legs.musclePct,  step:0.1 },
    { id:'af_legF',   label:'脚 脂率(%)',   type:'number', def:seg.legs.fatPct,     step:0.1 },
    { id:'af_trunkM', label:'体幹 筋率(%)', type:'number', def:seg.trunk.musclePct, step:0.1 },
    { id:'af_trunkF', label:'体幹 脂率(%)', type:'number', def:seg.trunk.fatPct,    step:0.1 },

  FIELDS.forEach(f => {

    inp.type  = f.type; inp.id = f.id; inp.value = f.def;

    wrap.appendChild(lbl); wrap.appendChild(inp);
    grid.appendChild(wrap);

  formDiv.appendChild(grid);

  // Buttons
  const actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:.45rem;align-items:center';

  saveBtn.className = 'cbtn cbtn-green';
  saveBtn.textContent = '保存';
  saveBtn.addEventListener('click', () => {
    const gv = id => { const el = document.getElementById(id); return el?.value || null; };
    const pf = id => { const v = parseFloat(gv(id)); return isNaN(v) ? null : v; };
    const rec = {
      date:        gv('af_date') || new Date().toISOString().slice(0,10),   // 実際の測定日（1ヶ月1件・同月は addRec が上書き）
      height:      pf('af_height'),
      weight:      pf('af_weight'),
      bodyFatPct:  pf('af_bodyFatPct'),
      muscleMass:  pf('af_muscleMass'),
      bmi:         pf('af_bmi'),
      visceralFat: pf('af_visceralFat'),
      subcutFat:   pf('af_subcutFat'),
      bodyAge:     pf('af_bodyAge'),
      bmr:         pf('af_bmr'),
      armM:   pf('af_armM'),   armF:   pf('af_armF'),
      legM:   pf('af_legM'),   legF:   pf('af_legF'),
      trunkM: pf('af_trunkM'), trunkF: pf('af_trunkF'),
      note:        gv('af_note') || '',
    };
    CDB.addRec(custName, rec);
    buildCMSidebar();
    renderRecords(CDB.get(custName));
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cbtn cbtn-ghost';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.addEventListener('click', () => {
    formDiv.style.display = 'none'; toggleBtn.style.display = '';
  });

  actions.appendChild(saveBtn); actions.appendChild(cancelBtn);
  formDiv.appendChild(actions);
  section.appendChild(formDiv);

  // Carry over a stable height from existing records (records are newest-first).
  function afHeightCarry() {
    const recs = CDB.get(custName)?.records || [];
    for (const r of recs) if (r.height != null) return r.height;
    return state.current.height;
  }

  const AF_FIELDS = ['height','weight','bodyFatPct','muscleMass','bmi','visceralFat','subcutFat','bodyAge','bmr',
                     'armM','armF','legM','legF','trunkM','trunkF','note'];

  /* Load the record for the chosen date's month into the form (1 record per month):
     existing month → fill all; new month → carry height, blank the rest.
     `val` is a full date 'YYYY-MM-DD' from the <input type=date>. */
  function afLoadMonth(val) {
    const mo  = (val || '').slice(0, 7);                         // dedup is still month-based (1/month)
    const rec = CDB.get(custName)?.records?.find(r => r.date.slice(0, 7) === mo);
    const setV = (id, v) => { const el = document.getElementById(id); if (el) el.value = (v == null ? '' : v); };
    if (rec) {
      AF_FIELDS.forEach(k => setV('af_' + k, rec[k]));
      afStatus.textContent = `📝 この月（${mo}）の記録を更新します（既存の測定日 ${rec.date}）`;
      afStatus.className = 'af-status update';
    } else {
      AF_FIELDS.forEach(k => setV('af_' + k, k === 'height' ? afHeightCarry() : ''));
      afStatus.textContent = `🆕 新規入力（${val || mo}）— 身長は引き継ぎ済み`;
      afStatus.className = 'af-status new';
    }
  }

  toggleBtn.addEventListener('click', () => {
    formDiv.style.display = ''; toggleBtn.style.display = 'none';
    const d = new Date().toISOString().slice(0, 10);
    const el = document.getElementById('af_date');
    if (el) el.value = d;
    afLoadMonth(d);
  });

  // Expose an editor opener for the records table ✏️ button (receives the record's full date).
  afEditorAPI = (date) => {
    formDiv.style.display = ''; toggleBtn.style.display = 'none';
    const el = document.getElementById('af_date');
    if (el && date) el.value = date;
    afLoadMonth(date || (el && el.value));
    formDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  parent.appendChild(section);

  // Re-load values whenever the selected month changes (registered after the form is in the DOM).
  document.getElementById('af_date')?.addEventListener('change', e => afLoadMonth(e.target.value));
}

/* Chart period filter state: '3m' | '6m' | '1y' | 'all' */
let cmChartRange = 'all';
/* When set to {from:'YYYY-MM', to:'YYYY-MM'} it overrides the preset (used by the report's custom range). */
let cmRangeOverride = null;
const CM_RANGE_DEFS = [
  { k:'3m', lbl:'3ヶ月', months:3 },
  { k:'6m', lbl:'6ヶ月', months:6 },
  { k:'1y', lbl:'1年',   months:12 },
  { k:'all', lbl:'全期間', months:null },
];
/* Filter records (newest-first array) down to the active range, returns ascending-sorted array. */
function cmRangedRecords(records) {
  const asc = [...records].sort((a, b) => a.date.localeCompare(b.date));
  if (cmRangeOverride) {
    const { from, to, months } = cmRangeOverride;
    if (months) return asc.filter(r => months.has(r.date.slice(0, 7)));   // explicit month selection
    return asc.filter(r => { const m = r.date.slice(0, 7); return (!from || m >= from) && (!to || m <= to); });
  }
  const def = CM_RANGE_DEFS.find(d => d.k === cmChartRange);
  if (!def || def.months == null || !asc.length) return asc;
  const latest = new Date(asc[asc.length - 1].date);
  const cutoff = new Date(latest); cutoff.setMonth(cutoff.getMonth() - def.months);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  return asc.filter(r => r.date >= cutoffStr);
}

/* ── Charts ── */
function buildCharts(cust) {
  // Disable Chart.js animation so charts render synchronously on creation.
  // This guarantees toBase64Image() captures the finished chart for the print report
  // (otherwise the animated first frame may still be blank). Harmless to set each call.
  try { Chart.defaults.animation = false; } catch {}

  // Destroy previous Chart.js instances to avoid memory leak
  Object.values(cmCharts).forEach(c => { try { c.destroy(); } catch {} });
  cmCharts = {};

  const pane = document.getElementById('cmPaneChart');
  while (pane.firstChild) pane.removeChild(pane.firstChild);

  if (!cust?.records?.length) {
    const empty = document.createElement('div');
    empty.className = 'cm-empty';
    const txt = document.createElement('span');
    txt.textContent = '記録がないためグラフを表示できません';
    empty.appendChild(txt); pane.appendChild(empty);
    return;
  }

  // Period filter bar
  const bar = document.createElement('div');
  bar.className = 'cm-range-bar';
  CM_RANGE_DEFS.forEach(def => {
    const b = document.createElement('button');
    b.className = 'cm-range-btn' + (def.k === cmChartRange ? ' on' : '');
    b.textContent = def.lbl;
    b.addEventListener('click', () => { cmChartRange = def.k; buildCharts(cust); });
    bar.appendChild(b);
  });
  pane.appendChild(bar);

  // Sort ascending + apply range
  const sorted = cmRangedRecords(cust.records);
  // X軸は基本「月のみ」（例: 6月）。年が変わる地点だけ月の下に「YYYY年」を添えて
  // 昨年分と今年分の境目が分かるようにする（複数年を遡って見返すため）。西暦の全体範囲は右上にも出す。
  const labels = sorted.map((r, i) => {
    const mo = (+r.date.slice(5, 7)) + '月';
    return (i > 0 && r.date.slice(0, 4) !== sorted[i - 1].date.slice(0, 4))
      ? [mo, r.date.slice(0, 4) + '年']   // 年の変わり目（1月など）は2行表示
      : mo;
  });
  const years  = [...new Set(sorted.map(r => r.date.slice(0, 4)))];   // データに含まれる年（昇順）
  const yearLabel = years.length === 0 ? '' : years.length === 1 ? years[0] : `${years[0]}–${years[years.length - 1]}`;
  if (!sorted.length) {
    const e = document.createElement('div'); e.className = 'cm-empty';
    const t = document.createElement('span'); t.textContent = 'この期間に記録がありません';
    e.appendChild(t); pane.appendChild(e); return;
  }

  const grid = document.createElement('div');
  grid.className = 'cm-charts-grid';
  pane.appendChild(grid);

  /* ── Modern-minimal chart theme (light for the print report, dark for the modal) ── */
  const RPT = cmReportMode;
  const T = RPT
    ? { text:'#5b6470', grid:'rgba(120,135,160,.20)', pointBorder:'#ffffff', donutBorder:'#ffffff',
        legend:'#465061', tooltipBg:'rgba(26,38,90,.95)', tooltipTx:'#ffffff',
        radarLabel:'#33405e', centerMain:'#1a265a', centerSub:'#7a8499', fillTop:0.26, fillBot:0.015 }
    : { text:'#9aa0aa', grid:'rgba(120,135,160,.14)', pointBorder:'#2a2d33', donutBorder:'#2a2d33',
        legend:'#9aa0aa', tooltipBg:'#2a2d33', tooltipTx:'#e6e8ec',
        radarLabel:'#e6e8ec', centerMain:'#e6e8ec', centerSub:'#9aa0aa', fillTop:0.32, fillBot:0.00 };
  const FONT = { family:"'Segoe UI', system-ui, sans-serif" };
  const MUTED = '#9aa6b5';
  const hex = (c, a) => c + Math.round(a * 255).toString(16).padStart(2, '0');   // #rrggbb + alpha
  // Vertical gradient under a line: color@fillTop → transparent (scriptable backgroundColor).
  const grad = (color) => (sc) => {
    const ch = sc.chart, area = ch.chartArea;
    if (!area) return hex(color, T.fillBot);
    const g = ch.ctx.createLinearGradient(0, area.top, 0, area.bottom);
    g.addColorStop(0, hex(color, T.fillTop)); g.addColorStop(1, hex(color, T.fillBot));
    return g;
  };
  const ptR = sorted.length === 1 ? 4.5 : 2.6;     // show a lone data point clearly
  const lineDS = (color, extra = {}) => ({
    borderColor: color, backgroundColor: grad(color), borderWidth: 2.5,
    pointRadius: ptR, pointHoverRadius: 6, pointBackgroundColor: color,
    pointBorderColor: T.pointBorder, pointBorderWidth: 1.5,
    tension: 0.4, cubicInterpolationMode: 'monotone', fill: true, spanGaps: true, ...extra,
  });
  const legendOpt = (display, position = 'bottom') => ({ display, position,
    labels:{ color:T.legend, font:{ size:10, ...FONT }, boxWidth:8, boxHeight:8, usePointStyle:true, pointStyle:'circle', padding:10 } });
  const tooltipOpt = (extra = {}) => ({ mode:'index', intersect:false, usePointStyle:true, padding:10, cornerRadius:8,
    backgroundColor:T.tooltipBg, titleColor:T.tooltipTx, bodyColor:T.tooltipTx, borderColor:'rgba(255,255,255,.08)', borderWidth:1, ...extra });
  // X軸：月ラベルは回転せず横並び・左詰め（align:'start'）。
  const xScale = (extra = {}) => ({ ticks:{ color:T.text, font:{ size:10, ...FONT }, maxRotation:0, minRotation:0, align:'start', autoSkip:false }, grid:{ display:false }, border:{ display:false }, ...extra });
  const yScale = (extra = {}) => ({ ticks:{ color:T.text, font:{ size:9, ...FONT }, padding:6 }, grid:{ color:T.grid, drawTicks:false }, border:{ display:false }, ...extra });
  // 右上に西暦を出す余白を確保（top を広めに）。
  const baseOpts = { responsive:true, interaction:{ mode:'index', intersect:false }, layout:{ padding:{ top:18, right:10, left:2, bottom:0 } } };
  // 時系列グラフの右上に西暦（yearLabel）を描くプラグイン。月のみのX軸を補う。
  const yearCorner = {
    id: 'yearCorner',
    afterDraw(chart) {
      if (!yearLabel) return;
      const { ctx, chartArea } = chart;
      ctx.save();
      ctx.font = `700 12px ${FONT.family}`;
      ctx.fillStyle = T.text;
      ctx.globalAlpha = 0.92;
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText(yearLabel, chartArea.right, Math.max(2, chartArea.top - 15));
      ctx.restore();
    },
  };

  const CHART_DEFS = [
    { key:'weight',      label:'体重 (kg)',      color:'#4f9fff' },
    { key:'bodyFatPct',  label:'体脂肪率 (%)',   color:'#ff6b6b' },
    { key:'muscleMass',  label:'骨格筋率 (%)',   color:'#00e5a0' },
    { key:'visceralFat', label:'内臓脂肪レベル', color:'#ffd060' },
    { key:'subcutFat',   label:'皮下脂肪面積 (cm²)', color:'#ff9f5a' },
    { key:'bmr',         label:'基礎代謝量 (kcal)', color:'#c08bff' },
  ];

  CHART_DEFS.forEach(def => {
    const box = document.createElement('div'); box.className = 'cm-chart-box';
    const title = document.createElement('h4'); title.textContent = def.label;  // textContent — safe
    const canvas = document.createElement('canvas'); canvas.height = 130;

    box.appendChild(title); box.appendChild(canvas);
    grid.appendChild(box);

    const data = sorted.map(r => r[def.key] ?? null);
    const hasData = data.some(v => v !== null);
    if (!hasData) { title.style.color = 'var(--muted)'; return; }

    cmCharts[def.key] = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: (() => {
          const ds = [{ label: def.label, data, ...lineDS(def.color) }];
          const gv = cust.goal && cust.goal[def.key];
          if (gv != null) ds.push({
            label: '目標', data: labels.map(() => gv),
            borderColor: MUTED, borderWidth: 1.5, borderDash: [5, 4], pointRadius: 0, fill: false,
          });
          return ds;
        })()
      },
      options: { ...baseOpts,
        plugins: { legend: legendOpt(!!(cust.goal && cust.goal[def.key] != null)), tooltip: tooltipOpt() },
        scales: { x: xScale(), y: yScale() }
      },
      plugins: [yearCorner]
    });
  });

  /* ── 部位別バランス（現在/目標を別枠・各に骨格筋率＋皮下脂肪率 + 月次推移） ── */
  const hasSeg = sorted.some(r => SEG_FIELDS.some(s => r[s.k] != null));
  if (hasSeg) {
    const curRec  = sorted[sorted.length - 1];     // 現在＝表示期間内の最新
    const goalSeg = cust.goal || null;             // 目標＝goal（部位別が無ければ目標レーダーは省略）
    const goalHasSeg = !!(goalSeg && ['armM','armF','legM','legF','trunkM','trunkF'].some(k => goalSeg[k] != null));
    const radarOpts = { ...baseOpts, plugins:{ legend: legendOpt(true), tooltip: tooltipOpt() },
      scales:{ r:{ min:0, max:150, ticks:{ color:T.text, font:{size:8,...FONT}, backdropColor:'transparent', stepSize:50 },
        grid:{ color:T.grid }, angleLines:{ color:T.grid }, pointLabels:{ color:T.radarLabel, font:{size:11, weight:'700', ...FONT} } } } };
    const radarDefs = [ { key:'segRadarCur', title:'現在（骨格筋率・皮下脂肪率／対標準%）', rec:curRec } ];
    if (goalHasSeg) radarDefs.push({ key:'segRadarTgt', title:'目標（骨格筋率・皮下脂肪率／対標準%）', rec:goalSeg });
    radarDefs.forEach(rc => {
      const box = document.createElement('div'); box.className = 'cm-chart-box';
      const ttl = document.createElement('h4'); ttl.textContent = rc.title;
      const cv  = document.createElement('canvas'); cv.height = 150;
      box.appendChild(ttl); box.appendChild(cv); grid.appendChild(box);
      cmCharts[rc.key] = new Chart(cv, {
        type: 'radar',
        data: { labels: ['両腕', '両脚', '体幹'], datasets: segRadarMetricsDS(
          segNormArr(rc.rec, cust.gender, 'M'),
          segNormArr(rc.rec, cust.gender, 'F'), T.pointBorder) },
        options: radarOpts,
      });
    });

    [ { suffix:'M', label:'部位別 筋率の推移 (%)' },
      { suffix:'F', label:'部位別 脂率の推移 (%)' } ].forEach(tr => {
      const box = document.createElement('div'); box.className = 'cm-chart-box';
      const title = document.createElement('h4'); title.textContent = tr.label;
      const cv = document.createElement('canvas'); cv.height = 150;
      box.appendChild(title); box.appendChild(cv); grid.appendChild(box);
      const parts = [ {k:'arm'+tr.suffix, lbl:'腕', c:'#4f9fff'},
                      {k:'leg'+tr.suffix, lbl:'脚', c:'#00e5a0'},
                      {k:'trunk'+tr.suffix, lbl:'体幹', c:'#ff8fb0'} ];
      cmCharts['seg' + tr.suffix] = new Chart(cv, {
        type: 'line',
        data: { labels, datasets: parts.map(p => ({ label:p.lbl, data:sorted.map(r => r[p.k] ?? null), ...lineDS(p.c, { fill:false, borderWidth:2.5 }) })) },
        options: { ...baseOpts, plugins:{ legend: legendOpt(true), tooltip: tooltipOpt() },
          scales:{ x: xScale(), y: yScale() } }
      });
    });
  }

  /* ── 体組成の構成（脂肪 / 骨格筋 / その他, kg） ── */
  const compHas = sorted.some(r => r.weight != null && r.bodyFatPct != null && r.muscleMass != null);
  if (compHas) {
    const fatKg   = sorted.map(r => (r.weight != null && r.bodyFatPct != null) ? +(r.weight * r.bodyFatPct / 100).toFixed(1) : null);
    const muscleKg= sorted.map(r => (r.weight != null && r.muscleMass != null) ? +(r.weight * r.muscleMass / 100).toFixed(1) : null);
    const otherKg = sorted.map((r, i) => (r.weight != null && fatKg[i] != null && muscleKg[i] != null)

    const box = document.createElement('div'); box.className = 'cm-chart-box';

    cmCharts.composition = new Chart(cv, {

        { label:'骨格筋', data:muscleKg, backgroundColor:'#00d196', borderRadius:5, borderSkipped:false, maxBarThickness:44 },

    });

    // 体組成の構成比（最新）— ドーナツ
    let di = -1;

    if (di >= 0) {

      const donutCenter = {
        id: 'donutCenter',
        afterDraw(chart) {
          const el0 = chart.getDatasetMeta(0)?.data?.[0]; if (!el0) return;
          const c = chart.ctx;
          c.save(); c.textAlign = 'center'; c.textBaseline = 'middle';
          c.fillStyle = T.centerMain; c.font = `700 16px ${FONT.family}`;
          c.fillText(`${total.toFixed(1)}kg`, el0.x, el0.y - 7);

  }

  /* ── BMI・除脂肪体重(LBM) 2軸推移 ── */
  const bmiArr = sorted.map(r => { const v = cmBMI(r, cust); return v != null ? +v.toFixed(1) : null; });
  const lbmArr = sorted.map(r => { const v = cmLBM(r);       return v != null ? +v.toFixed(1) : null; });
  if (bmiArr.some(v => v != null) || lbmArr.some(v => v != null)) {

    cmCharts.bmiLbm = new Chart(cv, {

          yL:{ position:'right', ticks:{ color:'#00c2e5', font:{size:9,...FONT}, padding:6 }, grid:{ drawOnChartArea:false }, border:{ display:false } },
        } },
      plugins: [yearCorner]
    });
  }
}

/* Scenario projection: fraction of weight change taken from fat vs lean mass. */
const SIM_FAT_FRACTION = 0.78;   // 78% of weight change is fat
const SIM_SCENARIOS = [
  { k:'maintain',   lbl:'現状維持', pace: 0,    color:'#9aa0aa' },
  { k:'standard',   lbl:'標準減量', pace:-0.5,  color:'#00e5a0' },
  { k:'aggressive', lbl:'積極減量', pace:-1.0,  color:'#ff8fb0' },
];
let simWeeks = 12;

/* Project metrics from latest record over `weeks` at `pace` kg/week. */
function simProject(latest, cust, pace, weeks) {
  const w0 = latest.weight, bf0 = latest.bodyFatPct, h = cmHeight(cust);
  if (w0 == null || bf0 == null) return null;
  const dW = pace * weeks;
  const fat0 = w0 * bf0 / 100, lbm0 = w0 - fat0;
  const fat1 = Math.max(fat0 + SIM_FAT_FRACTION * dW, 0);
  const lbm1 = Math.max(lbm0 + (1 - SIM_FAT_FRACTION) * dW, 0);
  const w1 = fat1 + lbm1;
  const bf1 = w1 > 0 ? fat1 / w1 * 100 : 0;
  const bmi1 = h ? w1 / ((h / 100) ** 2) : null;
  return { weight:w1, bodyFatPct:bf1, lbm:lbm1, bmi:bmi1, muscleMass: latest.muscleMass };
}

      vw.appendChild(b);

/* Load a projected scenario into the target body and show it on the 3D scene. */
function applySimTo3D(cust, proj) {
  state.target.height = state.current.height;
  if (proj.weight != null)     state.target.weight = Math.round(proj.weight * 10) / 10;
  if (proj.bodyFatPct != null) state.target.bodyFatPct = Math.round(proj.bodyFatPct * 10) / 10;
  if (proj.muscleMass != null) state.target.muscleMass = proj.muscleMass;
  buildSliders(document.getElementById('tgtSliders'), SLIDERS_TGT, 'target');
  rebuildBodies();
  updateMetrics();
  window.closeCustomerModal();

}
/* ═══════════════════════════════════════
   DOMAIN KNOWLEDGE LAYER
   指標計算・基準テーブル・解剖学/栄養学マップ。
   advice / report / summary がすべてここを参照する（単一の真実）。
   ※ cmBMI / cmLBM / cmHeight は下方で関数宣言（hoist 済み・実行時参照のため順序問題なし）。
═══════════════════════════════════════ */

/* ── 派生指標の計算 ── */
function cmFatMass(r)        { return (r && r.weight != null && r.bodyFatPct != null) ? r.weight * r.bodyFatPct / 100 : null; }
function cmHeightM(r, cust)  { const h = (r && r.height) || cmHeight(cust); return h ? h / 100 : null; }
function cmFFMI(r, cust)     { const lbm = cmLBM(r), hm = cmHeightM(r, cust); return (lbm != null && hm) ? lbm / (hm * hm) : null; }
/* 身長補正FFMI（身長1.8mに正規化＝身長差を打ち消し比較しやすく） */
function cmFFMInorm(r, cust) { const f = cmFFMI(r, cust), hm = cmHeightM(r, cust); return (f != null && hm) ? f + 6.1 * (1.8 - hm) : null; }
function cmFMI(r, cust)      { const fm = cmFatMass(r), hm = cmHeightM(r, cust); return (fm != null && hm) ? fm / (hm * hm) : null; }

/* 年齢（任意・顧客レベル）。未設定なら null。 */
function cmAge(cust) { const a = cust && cust.age; return (a != null && a !== '' && isFinite(Number(a))) ? Math.round(Number(a)) : null; }

/* 基礎代謝(BMR) ── Katch-McArdle（除脂肪量ベース・体脂肪率があれば最も妥当） */
function cmKatchBMR(r) { const lbm = cmLBM(r); return lbm != null ? 370 + 21.6 * lbm : null; }
/* 基礎代謝(BMR) ── Mifflin-St Jeor（年齢が必要・クロスチェック用） */
function cmMifflinBMR(r, cust) {
  const age = cmAge(cust); const h = (r && r.height) || cmHeight(cust);
  if (age == null || h == null || !r || r.weight == null) return null;
  return 10 * r.weight + 6.25 * h - 5 * age + (cust.gender === 'male' ? 5 : -161);
}
/* 代謝年齢（推定）：同身長・同性別の標準体型(BMI22)の人がこのBMRになる年齢を逆算。
   筋肉が多いほどBMRが高く＝代謝年齢が若く出る。あくまで推定値。要 体脂肪率(LBM)＋身長。 */
function cmMetabolicAge(r, cust) {
  const bmr = cmKatchBMR(r); const h = (r && r.height) || cmHeight(cust);
  if (bmr == null || h == null) return null;
  const hm = h / 100, refW = 22 * hm * hm, k = (cust.gender === 'male' ? 5 : -161);
  const age = (10 * refW + 6.25 * h + k - bmr) / 5;          // Mifflin を age について解く
  return isFinite(age) ? Math.max(18, Math.min(90, Math.round(age))) : null;
}

/* ── 基準帯テーブル（cmRiskBand 形式：zones は to 昇順・最後が残り全部） ── */
/* 体脂肪率ゾーン（年齢補正：加齢で適正上限が上がる） */
function cmBodyFatZones(gender, age) {
  const male = gender === 'male';
  let lowTo, okTo, highTo, dispMin, dispMax;
  if (male) { lowTo = 10; okTo = 20; highTo = 25; dispMin = 5;  dispMax = 35; }
  else      { lowTo = 18; okTo = 28; highTo = 33; dispMin = 10; dispMax = 45; }
  if (age != null) {
    const bump = age >= 60 ? 4 : age >= 50 ? 3 : age >= 40 ? 2 : age >= 30 ? 1 : 0;
    okTo += bump; highTo += bump;
  }
  return { zones:[{to:lowTo,c:'y',label:'低い'},{to:okTo,c:'g',label:'標準'},{to:highTo,c:'y',label:'やや高'},{to:dispMax,c:'r',label:'高い'}], min:dispMin, max:dispMax };
}
/* FFMI（除脂肪量指数・身長補正値）ゾーン＝筋肉の発達度 */
function cmFFMIZones(gender) {
  return gender === 'female'
    ? { zones:[{to:14,c:'y',label:'筋量少なめ'},{to:16,c:'g',label:'標準'},{to:18,c:'g',label:'良好'},{to:21,c:'y',label:'高い'},{to:30,c:'r',label:'非常に高い'}], min:11, max:24 }
    : { zones:[{to:18,c:'y',label:'筋量少なめ'},{to:20,c:'g',label:'標準'},{to:22,c:'g',label:'良好'},{to:25,c:'y',label:'高い'},{to:35,c:'r',label:'非常に高い'}], min:15, max:28 };
}
/* FMI（脂肪量指数）ゾーン＝体脂肪の絶対量 */
function cmFMIZones(gender) {
  return gender === 'female'
    ? { zones:[{to:5,c:'y',label:'低い'},{to:9,c:'g',label:'標準'},{to:13,c:'y',label:'やや高'},{to:20,c:'r',label:'高い'}], min:2, max:20 }
    : { zones:[{to:3,c:'y',label:'低い'},{to:6,c:'g',label:'標準'},{to:9,c:'y',label:'やや高'},{to:15,c:'r',label:'高い'}], min:1, max:15 };
}
/* 内臓脂肪レベル（InBody指標）ゾーン */
function cmVisceralZones() {
  return { zones:[{to:9.5,c:'g',label:'標準'},{to:14.5,c:'y',label:'やや高'},{to:30,c:'r',label:'高い'}], min:1, max:20 };
}
/* 値→ゾーン {label,c} を返す共通ヘルパー */
function cmZoneOf(value, zoneDef) {
  if (value == null || !zoneDef) return null;
  const z = zoneDef.zones.find(z => value <= z.to) || zoneDef.zones[zoneDef.zones.length - 1];
  return { label: z.label, c: z.c };
}

/* ── 解剖学に基づくトレーニングマップ（主要筋／機能的役割／種目＋セットレップ＋フォーム） ── */
const TRAIN_MAP = {
  arm:   { lbl:'腕', muscles:'上腕二頭筋・上腕三頭筋・前腕筋群',
           role:'押す/引く動作の出力源。日常動作の安定にも関与。',
           ex:[ {name:'ダンベルカール',   sr:'10〜12回 × 3セット', cue:'肘を固定し反動を使わない'},
                {name:'ディップス',       sr:'8〜12回 × 3セット',  cue:'肩を下げ胸を軽く張る'},
                {name:'プッシュアップ',   sr:'10〜15回 × 3セット', cue:'頭から踵まで一直線を保つ'} ] },
  leg:   { lbl:'脚', muscles:'大腿四頭筋・ハムストリングス・大殿筋・下腿三頭筋',
           role:'全身で最大の筋群。鍛えると基礎代謝の底上げ効果が高い。',
           ex:[ {name:'スクワット',       sr:'10〜12回 × 3セット', cue:'膝とつま先を同方向に、股関節から沈む'},
                {name:'ランジ',           sr:'左右10回 × 3セット', cue:'前膝がつま先より前に出すぎない'},
                {name:'ヒップヒンジ',     sr:'8〜10回 × 3セット',  cue:'背中を丸めず股関節を後ろへ引く'} ] },
  trunk: { lbl:'体幹', muscles:'腹直筋・腹横筋・脊柱起立筋・広背筋',
           role:'姿勢の維持と体幹の安定。腰部を守り全種目の土台になる。',
           ex:[ {name:'プランク',         sr:'30〜60秒 × 3セット', cue:'腰を反らさず一直線'},
                {name:'デッドリフト',     sr:'8〜10回 × 3セット',  cue:'背骨をニュートラルに保つ'},
                {name:'バックエクステンション', sr:'12〜15回 × 3セット', cue:'反らしすぎず背中で起こす'} ] },
};

/* ── 活動レベル係数（TDEE = BMR × 係数） ── */
const ADV_ACTIVITY = { low:1.3, mid:1.5, high:1.7 };
let advActivity = 'mid';

function buildAdvice(cust) {
  const L = cmLatest(cust);
  if (!L || L.weight == null) return null;
  const male = cust.gender === 'male';
  const age = cmAge(cust);
  const lbm = cmLBM(L);                 // kg, may be null if bodyFatPct missing
  const fatMass = cmFatMass(L);
  const bmi = cmBMI(L, cust);
  const ffmi = cmFFMInorm(L, cust);
  const fmi  = cmFMI(L, cust);

  /* ── 指標サマリー（表示用） ── */
  const metrics = {
    age, bmi, lbm, fatMass, ffmi, fmi,
    katchBMR: cmKatchBMR(L), mifflinBMR: cmMifflinBMR(L, cust),
    metabolicAge: cmMetabolicAge(L, cust),
    bodyAge: cmBodyAge(L),                // 体年齢（実測・InBody等）
    measuredBMR: cmBMR(L),               // 基礎代謝量（実測・kcal）
  };

  /* ── 各指標のゾーン判定 ── */
  const zBodyFat  = cmZoneOf(L.bodyFatPct,  cmBodyFatZones(cust.gender, age));
  const zVisceral = cmZoneOf(L.visceralFat, cmVisceralZones());
  const zFFMI     = cmZoneOf(ffmi,          cmFFMIZones(cust.gender));
  const zFMI      = cmZoneOf(fmi,           cmFMIZones(cust.gender));
  const zones = { bodyFat:zBodyFat, visceral:zVisceral, ffmi:zFFMI, fmi:zFMI };

  /* ── 目標の方向（減量 / 増量 / 維持） ── */
  const goalW = cust.goal && cust.goal.weight != null ? cust.goal.weight : null;
  const dir = goalW == null ? 'maintain' : (goalW < L.weight - 0.3 ? 'cut' : goalW > L.weight + 0.3 ? 'gain' : 'maintain');

  /* ── 指標を突き合わせた所見（人間科学） ── */
  const insights = [];
  if (bmi != null && bmi >= 25 && zFFMI && (zFFMI.label === '良好' || zFFMI.label === '高い' || zFFMI.label === '非常に高い'))
    insights.push('BMIは高めですが筋肉量（FFMI）も多く、体重の多くが筋肉由来と考えられます。BMI単独で肥満と判断しないことが大切です。');
  if (zBodyFat && (zBodyFat.label === '高い' || zBodyFat.label === 'やや高') && zFFMI && zFFMI.label === '筋量少なめ')
    insights.push('体脂肪が多く筋肉量は控えめな状態です。減量と並行して筋量を守ること（十分なたんぱく質＋筋トレ）が要になります。');
  if (zVisceral && (zVisceral.label === '高い' || zVisceral.label === 'やや高'))
    insights.push('内臓脂肪が高めです。皮下脂肪より血糖・血圧・脂質などの代謝リスクと関わりやすく、優先的に減らしたい指標です。');
  if (metrics.metabolicAge != null && age != null) {
    if (metrics.metabolicAge < age - 1)      insights.push(`代謝年齢の推定は ${metrics.metabolicAge} 歳で実年齢より若め。筋肉量が代謝を支えています。`);
    else if (metrics.metabolicAge > age + 1) insights.push(`代謝年齢の推定は ${metrics.metabolicAge} 歳で実年齢を上回ります。筋量を増やすと改善の余地があります。`);
  }
  /* ── 基礎代謝量（実測）に基づく所見 ── */
  {
    const mBMR = cmBMR(L);                                  // 実測 kcal
    const estBMR = cmKatchBMR(L);                           // 除脂肪量からの推定（筋肉量と連動）
    if (mBMR != null && estBMR != null) {
      const ratio = mBMR / estBMR;
      if (ratio < 0.92)      insights.push(`実測の基礎代謝（${mBMR}kcal）は、筋肉量から見込まれる水準（約${Math.round(estBMR)}kcal）より低めです。代謝が落ち気味のサインで、筋量を増やす・日常の活動量（NEAT）を上げると底上げできます。`);
      else if (ratio > 1.08) insights.push(`実測の基礎代謝（${mBMR}kcal）は、筋肉量からの見込み（約${Math.round(estBMR)}kcal）を上回り良好です。代謝の高い体づくりができています。`);
      else                   insights.push(`実測の基礎代謝（${mBMR}kcal）は筋肉量からの見込みとほぼ一致しており、代謝は標準的です。`);
    } else if (mBMR != null) {
      insights.push(`実測の基礎代謝は ${mBMR}kcal。1日の最低限の消費量で、摂取カロリーがこれを下回らないよう配分します。`);
    }
    /* 基礎代謝の推移（初回→最新の実測値で代謝が上下したか） */
    const bmrAsc = [...cust.records].filter(r => r.bmr != null && r.weight != null).sort((a, b) => a.date.localeCompare(b.date));
    if (bmrAsc.length >= 2) {
      const b0 = bmrAsc[0], b1 = bmrAsc[bmrAsc.length - 1];
      const dB = b1.bmr - b0.bmr;
      if (dB >= 30)       insights.push(`基礎代謝は初回の ${b0.bmr}kcal から ${b1.bmr}kcal へ +${dB}kcal 向上しています。筋量の増加が代謝アップにつながっています。`);
      else if (dB <= -30) insights.push(`基礎代謝は初回の ${b0.bmr}kcal から ${b1.bmr}kcal へ ${dB}kcal 低下しています。極端な食事制限による筋量減が疑われるため、たんぱく質と筋トレで代謝の維持を優先しましょう。`);
    }
  }

  /* ── 直近の推移ペースに応じた所見（時系列：減りが速い／停滞／逆行 など） ── */
  {
    const asc = [...cust.records].filter(r => r.weight != null).sort((a, b) => a.date.localeCompare(b.date));
    const mb = (d0, d1) => { const p0 = d0.slice(0, 7).split('-').map(Number), p1 = d1.slice(0, 7).split('-').map(Number); return (p1[0] - p0[0]) * 12 + (p1[1] - p0[1]); };
    if (asc.length >= 2) {
      const recent = asc.slice(-3);                          // 直近最大3記録
      const a0 = recent[0], a1 = recent[recent.length - 1];
      const months = mb(a0.date, a1.date);
      if (months >= 1) {
        const perMonth = (a1.weight - a0.weight) / months;   // kg/月（+増 / −減）
        const safeMo   = 0.0217 * a1.weight;                 // 体重の約0.5%/週 ≈ 月あたり安全減量量
        const absPm    = Math.abs(perMonth);
        const spanLbl  = `直近${months}ヶ月で月${perMonth > 0 ? '+' : '−'}${absPm.toFixed(1)}kg`;
        if (dir === 'cut') {
          if (perMonth >= 0.3)            insights.push(`${spanLbl}と、目標（減量）とは逆に体重が増えています。食事量と間食・飲酒を一度見直しましょう。`);
          else if (absPm < 0.2)           insights.push(`${spanLbl}とほぼ横ばいで、減量が停滞気味です。活動量やたんぱく質量の見直し、週1回のリフィードが打開策になります。`);
          else if (absPm > safeMo * 1.6)  insights.push(`${spanLbl}と減量ペースが速めです。筋肉量と代謝を守るため、もう少し緩やかなペース（体重の約0.5%/週）に抑えるのが安全です。`);
          else                            insights.push(`${spanLbl}と、健康的な範囲で順調に減量できています。この調子を維持しましょう。`);
        } else if (dir === 'gain') {
          if (perMonth <= -0.3)           insights.push(`${spanLbl}と、目標（増量）とは逆に体重が減っています。摂取カロリーを少し増やす必要があります。`);
          else if (absPm < 0.2)           insights.push(`${spanLbl}と体重が横ばいです。増量にはカロリー収支をやや増やす（+250kcal前後）必要があります。`);
          else if (perMonth > 1.5)        insights.push(`${spanLbl}と増量ペースが速めで、脂肪が増えやすい状態です。余剰は+250kcal前後に抑えると除脂肪での増量に近づきます。`);
          else                            insights.push(`${spanLbl}と、ゆるやかに増量できています。脂肪を抑えた理想的なペースです。`);
        } else {
          if (absPm > 0.7)                insights.push(`維持目標ですが${spanLbl}と体重が動いています。狙いどおりか、食事・活動量を確認しましょう。`);
          else                            insights.push(`${spanLbl}と体重は安定しています。維持できています。`);
        }
        // 減量中の筋量変化（骨格筋率の推移で筋肉が落ちていないか）
        if (perMonth <= -0.3 && a0.muscleMass != null && a1.muscleMass != null) {
          const dMus = a1.muscleMass - a0.muscleMass;
          if (dMus < -0.5)      insights.push('減量中に骨格筋率が低下しています。たんぱく質摂取と筋トレで筋量の維持を最優先にしましょう。');
          else if (dMus > 0.3)  insights.push('減量しながら骨格筋率を維持・向上できています。脂肪を狙って落とせている理想的な経過です。');
        }
      }
    }
  }

  /* ── 栄養・カロリー（栄養学） ──
     基礎代謝は「実測値（InBody等の測定機が表示するカロリー）」を最優先で使う。
     実測が無い顧客のみ Katch-McArdle（除脂肪量ベース）→ Mifflin-St Jeor（年齢ベース）で推定する。 */
  let nutrition = null;
  const measuredBMR = cmBMR(L);
  const bmr = measuredBMR ?? cmKatchBMR(L) ?? cmMifflinBMR(L, cust);
  const bmrSrc = measuredBMR != null ? '実測（測定機の表示値）'
    : (cmKatchBMR(L) != null ? 'Katch-McArdle（除脂肪量ベース・推定）'
    : (cmMifflinBMR(L, cust) != null ? 'Mifflin-St Jeor（年齢ベース・推定）' : null));
  if (bmr != null) {
    const factor = ADV_ACTIVITY[advActivity];
    const tdee = bmr * factor;
    // 安全な減量速度＝体重の約0.5%/週（筋肉を守れるペース）。脂肪1kg≈7700kcal。
    const safeKgWeek = 0.005 * L.weight;
    const dailyDeficit = Math.round(safeKgWeek * 7700 / 7);
    let targetKcal, kcalNote;
    if (dir === 'cut')      { targetKcal = Math.max(tdee - dailyDeficit, bmr); kcalNote = `安全な減量速度（体重の約0.5%/週 ≈ ${safeKgWeek.toFixed(2)}kg/週）から逆算。急激な制限は筋肉と代謝の低下を招くため、基礎代謝（${Math.round(bmr)}kcal）は下回らないようにします。`; }
    else if (dir === 'gain'){ targetKcal = tdee + 250; kcalNote = '増量は脂肪を抑えるため小さめの余剰（+250kcal前後）に。'; }
    else                    { targetKcal = tdee; kcalNote = '現状維持は消費カロリー（TDEE）と同程度を目安に。'; }
    // たんぱく質：目標別に体重1kgあたりで傾斜（減量時は筋肉維持のため高め）
    const protPerKg = dir === 'cut' ? 2.0 : dir === 'gain' ? 1.8 : 1.6;
    const protein_g = Math.round(protPerKg * L.weight);
    const fat_g = Math.round(targetKcal * 0.25 / 9);                 // 脂質はホルモン産生のため総kcalの約25%
    const carb_g = Math.max(Math.round((targetKcal - protein_g * 4 - fat_g * 9) / 4), 0);
    const fiber_g = '20〜25';
    const water_ml = Math.round(L.weight * 35);
    const notes = [];
    notes.push(`たんぱく質は体重1kgあたり ${protPerKg}g（${dir === 'cut' ? '減量中の筋肉維持' : dir === 'gain' ? '筋合成の促進' : '筋量の維持'}が狙い）。`);
    notes.push('脂質は総カロリーの約25%。ホルモン産生と脂溶性ビタミンの吸収に必要なため極端に削らないのが原則です。');
    notes.push('炭水化物はトレーニングの主燃料。運動前後に多めに配分すると質が上がります。');
    notes.push('たんぱく質は1回20〜40gを3〜4回に分け、運動後の摂取も意識すると筋合成に有効です。');
    if (dir === 'cut') notes.push('減量が長引く場合は週1回ほど維持カロリーに戻す日（リフィード）を入れると、代謝適応の防止とモチベーション維持に役立ちます。');
    nutrition = {
      bmr: Math.round(bmr), bmrSrc, tdee: Math.round(tdee), targetKcal: Math.round(targetKcal),
      protein_g, fat_g, carb_g, fiber_g, water_ml, factor, dir, kcalNote, notes,
    };
  }

  /* ── トレーニング（解剖学：弱い部位を主要筋・役割・種目で深掘り） ── */
  let training = { weakKey:null, weakPart:null, muscles:'', role:'', exercises:[], note:'' };
  const segPairs = [
    { key:'arm',   v:L.armM },
    { key:'leg',   v:L.legM },
    { key:'trunk', v:L.trunkM },
  ].filter(p => p.v != null);
  if (segPairs.length) {
    const weak = segPairs.reduce((a, b) => (b.v < a.v ? b : a));
    const m = TRAIN_MAP[weak.key];
    training.weakKey = weak.key; training.weakPart = m.lbl;
    training.muscles = m.muscles; training.role = m.role; training.exercises = m.ex;
  } else {
    training.exercises = TRAIN_MAP.leg.ex;            // データが無ければ最大筋群＝脚を起点に
    training.note = '部位別データが未入力のため、基礎代謝に効く脚を起点に全身を提案しています。';
  }
  training.note = (training.note ? training.note + ' ' : '') + (dir === 'cut'
    ? '週2〜3回の筋トレで筋肉を守りつつ、有酸素20〜30分を組み合わせると脂肪燃焼が進みます。'
    : dir === 'gain'
    ? '週3〜4回、対象筋にしっかり刺激を入れ、漸進的に負荷を上げましょう。'
    : '週2〜3回の全身筋トレで維持・向上を。');

  /* ── 生活習慣（根拠つき） ── */
  const lifestyle = [];
  lifestyle.push(`水分は1日あたり約 ${Math.round(L.weight * 35)} ml が目安。代謝・体温調節・パフォーマンスを支えます。`);
  lifestyle.push('睡眠は7〜8時間。不足は食欲ホルモン（レプチン/グレリン）の乱れと筋回復の低下を招きます。');
  lifestyle.push('座りっぱなしを避け、こまめに立つ・歩く（NEAT）を増やすと総消費が上がります。');
  if (zVisceral && (zVisceral.label === '高い' || zVisceral.label === 'やや高'))
    lifestyle.push('内臓脂肪対策として、間食・アルコール・就寝直前の食事を見直しましょう。');
  if (zBodyFat && zBodyFat.label === '高い')
    lifestyle.push('体脂肪が高めです。極端な制限より、緩やかな食事調整と運動の習慣化が続けやすく効果的です。');

  return { metrics, zones, insights, dir, nutrition, training, lifestyle };
}

function buildAdvicePane(cust) {
  const pane = document.getElementById('cmPaneAdvice');
  while (pane.firstChild) pane.removeChild(pane.firstChild);

  const adv = buildAdvice(cust);
  if (!adv) {
    const e = document.createElement('div'); e.className = 'cm-empty';
    const t = document.createElement('span'); t.textContent = '体重・体脂肪率を含む測定記録が必要です';
    e.appendChild(t); pane.appendChild(e); return;
  }

  const section = (titleText) => {
    const s = document.createElement('div'); s.className = 'adv-sec';
    const h = document.createElement('h4'); h.textContent = titleText; s.appendChild(h);
    return s;
  };

  // Activity factor selector
  const actSec = section('活動レベル');
  const sel = document.createElement('select'); sel.className = 'adv-select';
  [['low','低い（座位中心）'],['mid','普通（軽い運動あり）'],['high','高い（よく動く）']].forEach(([v, l]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = l;
    if (v === advActivity) o.selected = true; sel.appendChild(o);
  });
  sel.addEventListener('change', () => { advActivity = sel.value; buildAdvicePane(cust); });
  actSec.appendChild(sel); pane.appendChild(actSec);

  const kv = (k, v) => { const r = document.createElement('div'); r.className = 'adv-kv';
    const a = document.createElement('span'); a.textContent = k;
    const b = document.createElement('b'); b.textContent = v; r.appendChild(a); r.appendChild(b); return r; };
  const para = (txt, cls) => { const p = document.createElement('p'); p.className = 'adv-p' + (cls ? ' ' + cls : ''); p.textContent = txt; return p; };
  const fx = (v, d = 1) => v == null ? '—' : (Number.isInteger(v) ? v : v.toFixed(d));

  // 指標サマリー
  const m = adv.metrics;
  const ms = section('体組成の指標');
  if (m.ffmi != null)         ms.appendChild(kv('FFMI（筋肉の発達度・身長補正）', `${fx(m.ffmi)}`));
  if (m.fmi != null)          ms.appendChild(kv('FMI（脂肪量指数）', `${fx(m.fmi)}`));
  if (m.lbm != null)          ms.appendChild(kv('除脂肪量', `${fx(m.lbm)} kg`));
  if (m.fatMass != null)      ms.appendChild(kv('体脂肪量', `${fx(m.fatMass)} kg`));
  if (m.bmi != null)          ms.appendChild(kv('BMI', `${fx(m.bmi)}`));
  if (m.bodyAge != null)      ms.appendChild(kv('体年齢（測定）', `${m.bodyAge} 歳${m.age != null ? `（実年齢 ${m.age} 歳）` : ''}`));
  if (m.measuredBMR != null)  ms.appendChild(kv('基礎代謝量（実測）', `${m.measuredBMR} kcal`));
  if (m.metabolicAge != null) ms.appendChild(kv('代謝年齢（推定）', `${m.metabolicAge} 歳${m.age != null ? `（実年齢 ${m.age} 歳）` : ''}`));
  if (ms.childElementCount > 1) pane.appendChild(ms);

  // 所見（指標の突き合わせ）
  if (adv.insights.length) {
    const is = section('所見');
    const ul = document.createElement('ul'); ul.className = 'adv-list';
    adv.insights.forEach(x => { const li = document.createElement('li'); li.textContent = x; ul.appendChild(li); });
    is.appendChild(ul); pane.appendChild(is);
  }

  // Nutrition
  if (adv.nutrition) {
    const n = adv.nutrition;
    const s = section('栄養・カロリー目安');
    s.appendChild(kv(`基礎代謝(BMR)`, `${n.bmr} kcal`));
    if (n.bmrSrc) s.appendChild(para(`算出式: ${n.bmrSrc}`, 'muted'));
    s.appendChild(kv('消費カロリー(TDEE)', `${n.tdee} kcal`));
    s.appendChild(kv(n.dir === 'cut' ? '目標摂取(減量)' : n.dir === 'gain' ? '目標摂取(増量)' : '目標摂取(維持)', `${n.targetKcal} kcal`));
    if (n.kcalNote) s.appendChild(para(n.kcalNote, 'muted'));
    s.appendChild(kv('たんぱく質', `${n.protein_g} g`));
    s.appendChild(kv('脂質', `${n.fat_g} g`));
    s.appendChild(kv('炭水化物', `${n.carb_g} g`));
    s.appendChild(kv('食物繊維', `${n.fiber_g} g`));
    s.appendChild(kv('水分', `${n.water_ml} ml`));
    const ul = document.createElement('ul'); ul.className = 'adv-list';
    n.notes.forEach(x => { const li = document.createElement('li'); li.textContent = x; ul.appendChild(li); });
    s.appendChild(ul);
    pane.appendChild(s);
  }

  // Training
  const ts = section('トレーニング提案');
  if (adv.training.weakPart) {
    ts.appendChild(para(`優先部位: ${adv.training.weakPart}（筋率が相対的に低め）`));
    if (adv.training.muscles) ts.appendChild(para(`主な筋肉: ${adv.training.muscles}`, 'muted'));
    if (adv.training.role)    ts.appendChild(para(adv.training.role, 'muted'));
  }
  const ul = document.createElement('ul'); ul.className = 'adv-list';
  adv.training.exercises.forEach(ex => {
    const li = document.createElement('li');
    const nm = document.createElement('b'); nm.textContent = ex.name;
    li.appendChild(nm);
    li.appendChild(document.createTextNode(`　${ex.sr}`));
    const cue = document.createElement('span'); cue.className = 'muted'; cue.style.display = 'block'; cue.textContent = `フォーム: ${ex.cue}`;
    li.appendChild(cue);
    ul.appendChild(li);
  });
  ts.appendChild(ul);
  ts.appendChild(para(adv.training.note, 'muted')); pane.appendChild(ts);

  // Lifestyle
  const ls = section('生活習慣アドバイス');
  const ul2 = document.createElement('ul'); ul2.className = 'adv-list';
  adv.lifestyle.forEach(x => { const li = document.createElement('li'); li.textContent = x; ul2.appendChild(li); });
  ls.appendChild(ul2); pane.appendChild(ls);

  // Disclaimer
  pane.appendChild(para('※ 本内容は一般的な体組成データに基づく目安であり、医療診断ではありません。体調や既往症に応じて専門家にご相談ください。', 'muted'));
}

/* ═══════════════════════════════════════
   CUSTOMER ANALYTICS — helpers
═══════════════════════════════════════ */
const SEG_FIELDS = [
  { k:'armM',   lbl:'腕 筋率',   short:'腕筋', kind:'m' },
  { k:'armF',   lbl:'腕 脂率',   short:'腕脂', kind:'f' },
  { k:'legM',   lbl:'脚 筋率',   short:'脚筋', kind:'m' },
  { k:'legF',   lbl:'脚 脂率',   short:'脚脂', kind:'f' },
  { k:'trunkM', lbl:'体幹 筋率', short:'体幹筋', kind:'m' },
  { k:'trunkF', lbl:'体幹 脂率', short:'体幹脂', kind:'f' },
];

const cmToday = () => new Date().toISOString().slice(0, 10);
function cmHeight(cust) { for (const r of (cust.records || [])) if (r.height) return r.height; return null; }
function cmBMI(r, cust) { if (r && r.bmi != null) return r.bmi; const h = (r && r.height) || cmHeight(cust); return (r && r.weight != null && h) ? r.weight / ((h / 100) ** 2) : null; }
/* 体年齢（実測）：InBody等で測定した体年齢を記録に保存した値。推定の cmMetabolicAge とは別物。 */
function cmBodyAge(r) { return (r && r.bodyAge != null) ? r.bodyAge : null; }
/* 基礎代謝量（実測・kcal）：InBody等の測定機が表示するカロリー値を記録に保存した値。推定の cmKatchBMR/cmMifflinBMR より優先して栄養計算に使う。 */
function cmBMR(r) { return (r && r.bmr != null) ? r.bmr : null; }
function cmLBM(r)  { return (r && r.weight != null && r.bodyFatPct != null) ? r.weight * (1 - r.bodyFatPct / 100) : null; }
function cmLatest(cust) { return cust.records?.[0] || null; }                 // records stored newest-first
function cmPrev(cust)   { return cust.records?.[1] || null; }
function cmFirst(cust)  { const rs = cust.records; return rs && rs.length ? rs[rs.length - 1] : null; }

/* Coloured delta badge. lowerBetter/higherBetter decide good (green) vs bad (red). */
function cmDeltaBadge(curr, base, opt = {}) {
  if (curr == null || base == null) return null;
  const d = curr - base;
  const digits = opt.digits ?? 1;
  const arrow = Math.abs(d) < 1e-9 ? '→' : (d > 0 ? '▲' : '▼');
  const sign  = d > 0 ? '+' : '';
  let cls = 'flat';
  if (!opt.neutral && Math.abs(d) > 1e-9) {
    const good = opt.lowerBetter ? d < 0 : d > 0;
    cls = good ? 'good' : 'bad';
  }
  const span = document.createElement('span');
  span.className = 'cm-delta ' + cls + (opt.tiny ? ' tiny' : '');
  span.textContent = `${opt.label ? opt.label + ' ' : ''}${arrow}${sign}${d.toFixed(digits)}${opt.unit || ''}`;
  return span;
}

function cmSumCard(label, valueText, valueColor, deltaEl, subText) {

  const l = document.createElement('div'); l.className = 'l'; l.textContent = label;
  const v = document.createElement('div'); v.className = 'v'; v.textContent = valueText;
  if (valueColor) v.style.color = valueColor;
  card.appendChild(l); card.appendChild(v);
  if (deltaEl) { const w = document.createElement('div'); w.appendChild(deltaEl); card.appendChild(w); }
  if (subText) { const s = document.createElement('div'); s.className = 'sub'; s.textContent = subText; card.appendChild(s); }
  return card;
}
