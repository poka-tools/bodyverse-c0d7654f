<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BODYVERSE</title>
<meta name="theme-color" content="#15171a">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BODYVERSE">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/favicon-192.png">
<script src="./vendor/chartjs/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#15171a;--surf:#1e2024;--surf2:#2a2d33;--surf3:#33373e;
  --text:#e6e8ec;--muted:#9aa0aa;--border:#3a3f46;
  --blue:#4f9fff;--green:#19d390;--gold:#ffd060;--red:#ff6b6b;
  --nav-h:60px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Hiragino Kaku Gothic ProN','Segoe UI',system-ui,sans-serif;
  -webkit-text-size-adjust:100%;font-size:16px;line-height:1.45}
body{overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:16px}
.app{min-height:100dvh;display:flex;flex-direction:column;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}

/* ── top bar ── */
.topbar{position:sticky;top:0;z-index:20;background:rgba(21,23,26,.92);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  padding:calc(.5rem + env(safe-area-inset-top)) .9rem .5rem;
  display:flex;align-items:center;gap:.6rem}
.topbar .logo{height:30px;width:auto}
.cust-pick{flex:1;min-width:0;display:flex;align-items:center;gap:.35rem;
  background:var(--surf2);border:1px solid var(--border);border-radius:10px;
  padding:.5rem .7rem;color:var(--text);font-weight:700;font-size:.98rem}
.cust-pick .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left}
.cust-pick .ar{color:var(--muted);font-size:.7rem}
.icon-btn{background:var(--surf2);border:1px solid var(--border);color:var(--muted);
  border-radius:10px;width:42px;height:42px;font-size:1.15rem;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center}

/* ── content ── */
.view{display:none;flex:1;padding:.9rem .9rem 1.4rem;overflow-y:auto}
.view.on{display:block}
.section-t{font-size:.74rem;font-weight:700;letter-spacing:.05em;color:var(--muted);
  text-transform:uppercase;margin:1.1rem .15rem .5rem}
.section-t:first-child{margin-top:.2rem}

/* ── cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:1rem}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.metric{background:var(--surf);border:1px solid var(--border);border-radius:16px;
  padding:.9rem 1rem;position:relative;overflow:hidden}
.metric .lbl{font-size:.78rem;color:var(--muted);font-weight:600}
.metric .val{font-size:2rem;font-weight:800;line-height:1.15;margin-top:.15rem;
  font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.metric .val .u{font-size:.95rem;font-weight:600;color:var(--muted);margin-left:.15rem}
.metric .dl{font-size:.8rem;font-weight:700;margin-top:.25rem;font-variant-numeric:tabular-nums}
.metric.big{grid-column:1 / -1}
.metric.big .val{font-size:2.7rem}
.up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
.metric .spark{position:absolute;right:.5rem;bottom:.4rem;opacity:.5}

.sub-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem}
.subm{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:.6rem .55rem;text-align:center}
.subm .l{font-size:.66rem;color:var(--muted);font-weight:600}
.subm .v{font-size:1.05rem;font-weight:800;margin-top:.1rem;font-variant-numeric:tabular-nums}

/* ── goal ── */
.goal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.goal-head h3{font-size:.95rem}
.goal-pct{font-size:1.6rem;font-weight:800;font-variant-numeric:tabular-nums}
.gbar{margin:.55rem 0}
.gbar .gl{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:.22rem}
.gbar .gl b{font-variant-numeric:tabular-nums}
.gtrack{height:8px;background:var(--surf3);border-radius:6px;overflow:hidden}
.gfill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width .5s}

/* ── chips / pills ── */
.chips{display:flex;gap:.45rem;flex-wrap:wrap}
.chip{background:var(--surf2);border:1px solid var(--border);color:var(--muted);
  border-radius:999px;padding:.4rem .9rem;font-size:.84rem;font-weight:600}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── form ── */
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:.3rem}
.field .req{color:var(--gold)}
.inp{width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);
  border-radius:11px;padding:.7rem .8rem;font-size:16px}
.inp::placeholder{color:#6b7280}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.unit-tog{display:flex;gap:.3rem}
.unit-tog button{flex:1;background:var(--surf2);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:.4rem;font-size:.8rem;font-weight:700}
.unit-tog button.on{background:var(--blue);border-color:var(--blue);color:#fff}
details.more{margin:.4rem 0 .9rem;border:1px solid var(--border);border-radius:12px;background:var(--surf);overflow:hidden}
details.more>summary{padding:.75rem .9rem;font-weight:700;font-size:.9rem;color:var(--text);list-style:none}
details.more>summary::-webkit-details-marker{display:none}
details.more>summary::after{content:"＋ 詳細";float:right;color:var(--muted);font-size:.82rem;font-weight:600}
details.more[open]>summary::after{content:"－ 閉じる"}
details.more .more-body{padding:0 .9rem .9rem}

.btn{display:block;width:100%;border:none;border-radius:12px;padding:.95rem;
  font-size:1rem;font-weight:800;color:#fff;background:var(--blue)}
.btn.green{background:var(--green);color:#06281c}
.btn.ghost{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn+.btn{margin-top:.6rem}

/* ── list rows ── */
.rec-row{display:flex;align-items:center;gap:.7rem;background:var(--surf);border:1px solid var(--border);
  border-radius:13px;padding:.75rem .85rem;margin-bottom:.55rem}
.rec-row .rd{font-weight:800;font-size:.92rem;min-width:5.2em}
.rec-row .rv{flex:1;font-size:.82rem;color:var(--muted)}
.rec-row .rv b{color:var(--text);font-variant-numeric:tabular-nums}
.rec-row .x{color:var(--muted);background:var(--surf2);border:1px solid var(--border);
  border-radius:8px;width:34px;height:34px;flex:0 0 auto;font-size:.95rem}

.cust-row{display:flex;align-items:center;gap:.6rem;background:var(--surf);border:1px solid var(--border);
  border-radius:13px;padding:.8rem .85rem;margin-bottom:.5rem}
.cust-row.sel{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue) inset}
.cust-row .ci{flex:1;min-width:0}
.cust-row .cn{font-weight:800;font-size:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cust-row .cs{font-size:.76rem;color:var(--muted);margin-top:.1rem}
.cust-row .cg{font-size:.72rem;color:var(--gold);font-weight:700}

.empty{text-align:center;color:var(--muted);padding:2.5rem 1rem;font-size:.92rem}
.empty .big{font-size:1.05rem;color:var(--text);font-weight:700;margin-bottom:.4rem}

.chart-card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:.9rem .8rem;margin-bottom:.8rem}
.chart-card h4{font-size:.84rem;color:var(--muted);font-weight:700;margin:0 0 .5rem .3rem}
.chart-wrap{position:relative;height:180px}

/* ── bottom nav ── */
.botnav{position:fixed;left:0;right:0;bottom:0;z-index:30;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);background:rgba(26,28,32,.96);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);display:flex}
.botnav button{flex:1;background:none;border:none;color:var(--muted);font-size:.74rem;font-weight:700;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.15rem;padding-top:.3rem}
.botnav button .ic{font-size:1.25rem;line-height:1}
.botnav button.on{color:var(--blue)}

/* ── sheet / modal ── */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none}
.scrim.on{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--surf);
  border-radius:20px 20px 0 0;border-top:1px solid var(--border);
  max-height:86vh;overflow-y:auto;transform:translateY(100%);transition:transform .26s ease;
  padding:.4rem 1rem calc(1.2rem + env(safe-area-inset-bottom))}
.sheet.on{transform:translateY(0)}
.sheet .grip{width:42px;height:4px;background:var(--border);border-radius:3px;margin:.6rem auto .3rem}
.sheet h3{font-size:1.05rem;margin:.4rem 0 .9rem}
.opt{display:flex;align-items:center;gap:.6rem;padding:.85rem .3rem;border-bottom:1px solid var(--border);font-weight:600}
.opt:last-child{border-bottom:none}
.opt.sel{color:var(--blue)}
.opt .ox{margin-left:auto;color:var(--muted);font-size:.78rem;font-variant-numeric:tabular-nums}
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + 1.2rem);transform:translateX(-50%);
  background:#000;color:#fff;padding:.65rem 1.1rem;border-radius:999px;font-size:.86rem;font-weight:700;
  z-index:80;opacity:0;transition:opacity .25s;border:1px solid var(--border);pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.pclink{display:block;text-align:center;color:var(--muted);font-size:.8rem;margin-top:1.4rem;text-decoration:none}

/* ════════ レポート（印刷専用・画面では非表示） ════════ */
#mReport{display:none}
@media print{
  @page{size:A4;margin:13mm}
  html,body{background:#fff!important;color:#1a1c1e!important;height:auto!important;overflow:visible!important}
  body>*:not(#mReport){display:none!important}
  #mReport{display:block!important;font-family:'Hiragino Kaku Gothic ProN','Segoe UI',sans-serif;font-size:12px;line-height:1.5;color:#1a1c1e}
  #mReport h2{font-size:14px;color:#1a265a;border-left:5px solid #4f9fff;padding-left:6px;margin:7mm 0 2.5mm;break-after:avoid;page-break-after:avoid}
  #mReport .mr-cover{border-bottom:2px solid #1a265a;padding-bottom:4mm;margin-bottom:2mm}
  #mReport .mr-cover-top{display:flex;justify-content:space-between;align-items:flex-end;gap:8mm}
  #mReport .mr-gym{font-size:14px;font-weight:700;color:#1a265a;margin-bottom:1.5mm}
  #mReport .mr-title{font-size:18px;font-weight:800;color:#1a265a;letter-spacing:.04em}
  #mReport .mr-meta{margin-top:3mm;font-size:12px;color:#445}
  #mReport .mr-meta>div{margin:.6mm 0}
  #mReport .mr-ach{text-align:right;white-space:nowrap}
  #mReport .mr-ach-lbl{font-size:12px;color:#778;font-weight:600}
  #mReport .mr-ach-pct{font-size:46px;font-weight:800;line-height:.95}
  #mReport .mr-boxes{display:grid;grid-template-columns:1fr 1fr;gap:2.5mm;margin:2mm 0}
  #mReport .mr-box{border:1px solid #d4dae3;border-radius:5px;padding:2.5mm 3mm;background:#fbfcfe}
  #mReport .mr-box small{display:block;font-size:11px;color:#778;margin-bottom:1mm}
  #mReport .mr-box b{font-size:17px;color:#1a265a}
  #mReport .mr-box .mr-d{font-size:11px;font-weight:700;margin-left:1.5mm}
  #mReport .mr-gb-row{display:flex;align-items:baseline;gap:1.5mm;font-weight:700}
  #mReport .mr-gb-cur{color:#2563c0;font-size:15px}
  #mReport .mr-gb-arrow{color:#9aa3ad}
  #mReport .mr-gb-tgt{color:#1e8e5a;font-size:15px}
  #mReport .mr-gb-rem{display:block;font-size:11px;color:#667;margin-top:.8mm}
  #mReport .mr-legend{font-size:11px;color:#778;margin:1mm 0 2mm}
  #mReport table{width:100%;border-collapse:collapse;font-size:12px;margin-top:2mm}
  #mReport thead{display:table-header-group}
  #mReport tr{break-inside:avoid;page-break-inside:avoid}
  #mReport th{background:#1a265a;color:#fff;padding:2mm;text-align:center;font-weight:600}
  #mReport td{border:1px solid #e3e7f0;padding:1.8mm;text-align:center}
  #mReport tbody tr:nth-child(even){background:#f5f8ff}
  #mReport .mr-up{color:#c0392b}
  #mReport .mr-down{color:#1e8e5a}
  #mReport .mr-chart{break-inside:avoid;page-break-inside:avoid;margin:2mm 0 3mm}
  #mReport .mr-chart figcaption{font-size:11px;color:#556;text-align:center;margin-top:1mm}
  #mReport .mr-chart canvas{width:100%!important;height:auto!important;border:1px solid #ddd}
  #mReport .mr-disc{margin-top:6mm;font-size:9px;color:#778;border-top:1px solid #ddd;padding-top:2mm}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <img class="logo" src="./bodyverse-logo.png" alt="BODYVERSE">
    <button class="cust-pick" id="custPick" onclick="openCustSheet()">
      <span class="nm" id="custName">顧客を選択</span><span class="ar">▾</span>
    </button>
    <button class="icon-btn" onclick="openSettings()" aria-label="設定">⚙</button>
  </div>

  <!-- HOME -->
  <div class="view on" id="vHome"></div>
  <!-- RECORD -->
  <div class="view" id="vRec"></div>
  <!-- TREND -->
  <div class="view" id="vTrend"></div>
  <!-- CUSTOMERS -->
  <div class="view" id="vCust"></div>
</div>

<nav class="botnav">
  <button class="on" data-tab="home"  onclick="setTab('home',this)"><span class="ic">🏠</span>ホーム</button>
  <button         data-tab="rec"   onclick="setTab('rec',this)"><span class="ic">📝</span>記録</button>
  <button         data-tab="trend" onclick="setTab('trend',this)"><span class="ic">📈</span>推移</button>
  <button         data-tab="cust"  onclick="setTab('cust',this)"><span class="ic">👤</span>顧客</button>
</nav>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>
<div id="mReport"></div>

<script>
'use strict';
/* ════════ data layer (index-3d.html と完全互換) ════════ */
const DB_KEY='bodyvis_customers_v1', ACT_KEY='bodyvis_m_active';
const CDB={
  load(){try{return JSON.parse(localStorage.getItem(DB_KEY)||'{}')}catch{return{}}},
  save(d){localStorage.setItem(DB_KEY,JSON.stringify(d))},
  all(){return this.load()},
  get(n){return this.load()[n]||null},
  set(c){const d=this.load();d[c.name]=c;this.save(d)},
  del(n){const d=this.load();delete d[n];this.save(d)},
  rename(o,n){const d=this.load();if(!d[o]||d[n])return false;const c=d[o];c.name=n;d[n]=c;delete d[o];this.save(d);return true},
  addRec(name,rec){const d=this.load();if(!d[name])return;
    d[name].records=[rec,...d[name].records.filter(r=>r.date.slice(0,7)!==rec.date.slice(0,7))].sort((a,b)=>b.date.localeCompare(a.date));
    this.save(d)},
  delRec(name,date){const d=this.load();if(!d[name])return;d[name].records=d[name].records.filter(r=>r.date!==date);this.save(d)},
  setGoal(name,goal){const d=this.load();if(!d[name])return;d[name].goal=goal;this.save(d)},
};

/* ════════ state ════════ */
const S={tab:'home',active:localStorage.getItem(ACT_KEY)||null,viewDate:null,range:'all'};
const charts={};

/* ════════ helpers ════════ */
const $=id=>document.getElementById(id);
function el(t,c,txt){const e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.textContent=txt;return e;}
const fmt=(v,d=1)=>v==null||v===''||isNaN(v)?'—':(+v).toFixed(d).replace(/\.0$/,'');
const ymLabel= d=>{if(!d)return'';const[y,m]=d.split('-');return `${+y}年${+m}月`;};
const todayMonth=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('on'),1800);}
const sorted=c=>[...(c.records||[])].sort((a,b)=>b.date.localeCompare(a.date)); // newest first
const asc=c=>[...(c.records||[])].sort((a,b)=>a.date.localeCompare(b.date));
const bmiOf=r=>r.bmi!=null?+r.bmi:(r.height&&r.weight?+(r.weight/Math.pow(r.height/100,2)).toFixed(1):null);

/* metric meta: dir = which direction is "good" (down/up) */
const METRICS={
  weight:{lbl:'体重',unit:'kg',dir:'down',d:1},
  bodyFatPct:{lbl:'体脂肪率',unit:'%',dir:'down',d:1},
  muscleMass:{lbl:'骨格筋率',unit:'%',dir:'up',d:1},
};
function deltaClass(key,diff){if(diff==null||Math.abs(diff)<0.05)return['flat','→'];
  const good=METRICS[key]?.dir==='down'?diff<0:diff>0;
  return [good?'up':'down',(diff>0?'▲':'▼')];}

function activeCust(){return S.active?CDB.get(S.active):null;}
function ensureActive(){const names=Object.keys(CDB.all());
  if(S.active&&CDB.get(S.active))return; S.active=names[0]||null;
  if(S.active)localStorage.setItem(ACT_KEY,S.active);else localStorage.removeItem(ACT_KEY);}

/* goal progress: baseline(first)→latest に対する目標到達率 */
function metricProgress(first,latest,goal,key){
  if(first==null||latest==null||goal==null)return null;
  const denom=goal-first; if(Math.abs(denom)<1e-6)return latest===goal?100:0;
  let p=(latest-first)/denom*100; return Math.max(0,Math.min(100,Math.round(p)));}
function overallProgress(c){
  const a=asc(c); if(!a.length||!c.goal)return null;
  const first=a[0],latest=a[a.length-1]; let sum=0,n=0;
  for(const k of ['weight','bodyFatPct','muscleMass']){
    if(c.goal[k]==null)continue;
    const p=metricProgress(first[k],latest[k],c.goal[k],k);
    if(p!=null){sum+=p;n++;}}
  return n?{pct:Math.round(sum/n),n}:null;}

/* ════════ tab switching ════════ */
function setTab(tab,btn){
  S.tab=tab;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.botnav button').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');else document.querySelector(`.botnav [data-tab="${tab}"]`)?.classList.add('on');
  ({home:renderHome,rec:renderRec,trend:renderTrend,cust:renderCust})[tab]();
  document.querySelector('.view.on')?.scrollTo(0,0);
}
window.setTab=setTab;

/* ════════ HOME ════════ */
function renderHome(){
  const v=$('vHome'); v.innerHTML='';
  const c=activeCust();
  if(!c){v.appendChild(emptyState('顧客がいません','右下の「顧客」から追加してください')); return;}
  const recs=sorted(c);
  if(!recs.length){
    const e=emptyState(`${c.name} さんの記録がありません`,'「記録」タブから最初の測定を登録してください');
    const b=el('button','btn','📝 記録を追加'); b.style.marginTop='1rem'; b.onclick=()=>setTab('rec');
    e.appendChild(b); v.appendChild(e); return;
  }
  if(!S.viewDate||!recs.find(r=>r.date===S.viewDate))S.viewDate=recs[0].date;
  const idx=recs.findIndex(r=>r.date===S.viewDate);
  const cur=recs[idx], prev=recs[idx+1]||null;

  // date selector
  const dsel=el('button','cust-pick'); dsel.style.width='100%'; dsel.style.marginBottom='.2rem';
  dsel.innerHTML=`<span class="nm">📅 ${ymLabel(cur.date)} 時点</span><span class="ar">▾</span>`;
  dsel.onclick=openDateSheet; v.appendChild(dsel);

  // report button
  const rb=el('button','cust-pick'); rb.style.width='100%'; rb.style.marginBottom='.5rem';
  rb.innerHTML='<span class="nm">📄 レポートを出力（PDF）</span><span class="ar">›</span>';
  rb.onclick=()=>openReport(c.name); v.appendChild(rb);

  // primary metrics
  v.appendChild(sec('最新の測定値'));

  const grid=el('div','metric-grid');

  // secondary

              ['身長',cur.height,'cm'],['皮下脂肪',cur.subcutFat,'cm²'],['体年齢',cur.bodyAge,'歳']];
  const sg=el('div','sub-grid'); sg.style.marginTop='.7rem';

    m.appendChild(el('div','l',l));

    m.appendChild(vv); sg.appendChild(m);});
  v.appendChild(sg);

  // goal
  if(c.goal){
    v.appendChild(sec('目標達成度'));
    const op=overallProgress(c);
    const card=el('div','card');
    const head=el('div','goal-head');
    head.appendChild(el('h3',null,'目標までの進捗'));
    const pct=el('div','goal-pct'); pct.style.color=op?(op.pct>=100?'var(--green)':op.pct>=50?'var(--blue)':'var(--gold)'):'var(--muted)';
    pct.textContent=op?op.pct+'%':'—'; head.appendChild(pct); card.appendChild(head);
    const a=asc(c), first=a[0], latest=a[a.length-1];
    ['weight','bodyFatPct','muscleMass'].forEach(k=>{
      if(c.goal[k]==null)return;
      const M=METRICS[k], gv=c.goal[k], cv=latest[k];
      const p=metricProgress(first[k],latest[k],gv,k)??0;
      const bar=el('div','gbar');
      const gl=el('div','gl');
      gl.innerHTML=`<span>${M.lbl}</span><b>${fmt(cv,1)} → 目標 ${fmt(gv,1)}${M.unit}</b>`;
      bar.appendChild(gl);
      const tr=el('div','gtrack'), fl=el('div','gfill'); fl.style.width=p+'%'; tr.appendChild(fl); bar.appendChild(tr);
      card.appendChild(bar);
    });
    v.appendChild(card);
  }

  // mini weight trend
  const a=asc(c);
  if(a.length>=2){
    v.appendChild(sec('体重の推移'));
    const cc=el('div','chart-card'); const w=el('div','chart-wrap'); const cv=el('canvas'); cv.id='homeSpark';
    w.appendChild(cv); cc.appendChild(w); v.appendChild(cc);
    drawLine('homeSpark',a.map(r=>r.date),[{label:'体重',data:a.map(r=>r.weight),color:getCss('--blue')}],c.goal?.weight);
  }
}
function metricCard(key,cur,prev,big){
  const M=METRICS[key], card=el('div',big?'metric big':'metric');
  card.appendChild(el('div','lbl',M.lbl));
  const val=el('div','val'); val.innerHTML=`${fmt(cur[key],M.d)}<span class="u">${M.unit}</span>`; card.appendChild(val);
  if(prev){const diff=cur[key]!=null&&prev[key]!=null?+(cur[key]-prev[key]).toFixed(1):null;
    const[cls,ar]=deltaClass(key,diff);
    const dl=el('div','dl '+cls); dl.textContent=diff==null?'前回比 —':`前回比 ${ar} ${fmt(Math.abs(diff),1)}${M.unit}`;
    card.appendChild(dl);}
  return card;
}

function saveRec(){
  const c=activeCust(); if(!c)return;
  const month=$('af_month').value||todayMonth();
  const g=id=>{const e=$(id);return e&&e.value!==''?+e.value:null;};
  const weight=g('af_weight'), bf=g('af_bodyFatPct');
  let muscle=g('af_muscle');
  if(weight==null||bf==null||muscle==null){toast('体重・体脂肪率・骨格筋は必須です');return;}
  if(muscleUnit==='kg'&&weight)muscle=+(muscle/weight*100).toFixed(1); // kg→%
  const rec={date:month+'-01',weight,bodyFatPct:bf,muscleMass:muscle};
  const opt={height:'af_height',visceralFat:'af_visceralFat',subcutFat:'af_subcutFat',bmr:'af_bmr',bmi:'af_bmi',bodyAge:'af_bodyAge'};
  for(const k in opt){const val=g(opt[k]);if(val!=null)rec[k]=val;}
  const note=$('af_note')?.value?.trim(); if(note)rec.note=note;
  if(rec.bmi==null&&rec.height&&weight)rec.bmi=+(weight/Math.pow(rec.height/100,2)).toFixed(1);
  CDB.addRec(c.name,rec);
  toast('保存しました'); S.viewDate=rec.date; setTab('home');
}
function delRec(date){
  const c=activeCust(); if(!c)return;
  if(!confirm(`${ymLabel(date)} の記録を削除します。\n⚠️ 元に戻せません。よろしいですか？`))return;
  CDB.delRec(c.name,date); if(S.viewDate===date)S.viewDate=null; toast('削除しました'); renderRec();
}

  ];

function rangeFilter(a,range){
  if(range==='all'||!a.length)return a;
  const months={'3m':3,'6m':6,'1y':12}[range];
  const last=new Date(a[a.length-1].date); const cut=new Date(last.getFullYear(),last.getMonth()-months+1,1);
  return a.filter(r=>new Date(r.date)>=cut);
}

/* ════════ import / export ════════ */
function exportJSON(){
  const data=CDB.all(); if(!Object.keys(data).length){toast('書き出す顧客がいません');return;}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`bodyvis_customers_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  closeSheet(); toast('書き出しました');
}
function importJSON(e){
  const file=e.target.files?.[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const incoming=JSON.parse(r.result);
    if(typeof incoming!=='object'||!incoming||Array.isArray(incoming))throw new Error('JSON形式が不正です');
    const cur=CDB.all(); let added=0,merged=0;
    Object.values(incoming).forEach(c=>{if(!c||!c.name)return; c.records=Array.isArray(c.records)?c.records:[];
      // 取込データの目標値を数値へ強制（不正値の混入＝XSS/破損を防ぐ）
      if(c.goal&&typeof c.goal==='object'){for(const k of ['weight','bodyFatPct','muscleMass','visceralFat','armM','armF','legM','legF','trunkM','trunkF']){
        if(c.goal[k]!=null){const n=Number(c.goal[k]); c.goal[k]=isNaN(n)?null:n;}}}
      if(cur[c.name]){const byD={};[...(cur[c.name].records||[]),...c.records].forEach(x=>{if(x&&x.date)byD[x.date]=x;});
        cur[c.name].records=Object.values(byD).sort((a,b)=>b.date.localeCompare(a.date));
        if(c.goal)cur[c.name].goal=c.goal; if(c.age!=null&&cur[c.name].age==null)cur[c.name].age=c.age; merged++;}
      else{cur[c.name]=c;added++;}});
    CDB.save(cur); ensureActive(); syncTop();
    alert(`取込完了：新規 ${added} 名 / 更新 ${merged} 名`); renderCust();
  }catch(err){alert('取込に失敗しました：'+err.message);} e.target.value='';};
  r.readAsText(file);
}

/* ════════ small ui helpers ════════ */
function sec(t){return el('div','section-t',t);}
function field(label,inputNode){const f=el('div','field');const l=el('label',null,label);f.appendChild(l);f.appendChild(inputNode);return f;}
function numField(label,id,unit,val,req){
  const f=el('div','field'); const l=el('label'); l.innerHTML=label+(unit?` <span style="color:var(--muted);font-weight:400">(${unit})</span>`:'')+(req?' <span class="req">*</span>':''); f.appendChild(l);
  const i=inputEl('number',id,val===''||val==null?'':val); i.setAttribute('inputmode','decimal'); i.step='0.1'; f.appendChild(i); return f;
}
function inputEl(type,id,val){const i=document.createElement('input'); i.className='inp'; i.type=type; i.id=id; if(val!=null)i.value=val; return i;}
function emptyState(big,sub){const e=el('div','empty'); e.appendChild(el('div','big',big)); if(sub)e.appendChild(el('div',null,sub)); return e;}
const getCss=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();

/* ════════ charts ════════ */
Chart.defaults.font.family="'Hiragino Kaku Gothic ProN','Segoe UI',sans-serif";
function drawLine(canvasId,labels,series,goal){
  if(charts[canvasId]){charts[canvasId].destroy();}
  const ctx=$(canvasId); if(!ctx)return;
  const ds=series.map(s=>({label:s.label,data:s.data,borderColor:s.color,backgroundColor:s.color+'22',
    borderWidth:2.4,tension:.35,pointRadius:3,pointBackgroundColor:s.color,pointBorderWidth:0,fill:true,spanGaps:true}));
  if(goal!=null)ds.push({label:'目標',data:labels.map(()=>goal),borderColor:getCss('--gold'),borderWidth:1.4,
    borderDash:[5,4],pointRadius:0,fill:false});
  charts[canvasId]=new Chart(ctx,{type:'line',data:{labels:labels.map(d=>{const[,m]=d.split('-');const[y]=d.split('-');return `${y.slice(2)}/${+m}`;}),datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,animation:{duration:500},
      plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:getCss('--muted'),font:{size:10},maxTicksLimit:6}},
              y:{grid:{color:'rgba(120,135,160,.12)'},ticks:{color:getCss('--muted'),font:{size:10}},border:{display:false}}}}});
}

/* ════════ レポート（HTML印刷方式・PDFは「プリント→PDFで保存」） ════════ */
function getBrand(){try{return JSON.parse(localStorage.getItem('bodyvis_brand_v1')||'{}')||{}}catch{return{}}}
function repSan(s){return String(s||'report').replace(/[\\/:*?"<>|]+/g,'_').replace(/\s+/g,'_');}
const repCharts={};
function repCanvas(id){const cv=document.createElement('canvas');cv.id=id;cv.width=680;cv.height=240;return cv;}
function repLine(cv,labels,data,color,goal){
  repCharts[cv.id]=new Chart(cv,{type:'line',
    data:{labels:labels.map(d=>{const[y,m]=d.split('-');return `${y.slice(2)}/${+m}`;}),
      datasets:[{data,borderColor:color,backgroundColor:color+'22',borderWidth:2,tension:.3,pointRadius:2,pointBackgroundColor:color,pointBorderWidth:0,fill:true,spanGaps:true},
        ...(goal!=null?[{data:labels.map(()=>goal),borderColor:'#c08a00',borderWidth:1.2,borderDash:[5,4],pointRadius:0,fill:false}]:[])]},
    options:{responsive:false,animation:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:'#667',font:{size:10},maxTicksLimit:8}},
              y:{grid:{color:'#e3e7f0'},ticks:{color:'#667',font:{size:10}},border:{display:false}}}}});
}

function buildMReport(c){
  const root=$('mReport'); root.innerHTML='';
  Object.keys(repCharts).forEach(k=>{repCharts[k].destroy();delete repCharts[k];});
  const a=asc(c); if(!a.length)return false;
  const recs=sorted(c), latest=recs[0], prev=recs[1]||null, first=a[0];
  const brand=getBrand();

  /* ── 表紙 ── */
  const cover=el('div','mr-cover'), ctop=el('div','mr-cover-top'), cl=el('div');
  if(brand.gymName)cl.appendChild(el('div','mr-gym',brand.gymName));
  cl.appendChild(el('div','mr-title','BODY COMPOSITION REPORT'));
  const meta=el('div','mr-meta');
  meta.appendChild(el('div',null,`お名前: ${c.name||''}　/　${c.gender==='male'?'男性':'女性'}${c.age!=null?`　/　${c.age}歳`:''}`));
  meta.appendChild(el('div',null,`対象期間: ${ymLabel(first.date)} 〜 ${ymLabel(latest.date)}　/　${a.length} 件の測定`));
  if(brand.trainerName)meta.appendChild(el('div',null,`担当: ${brand.trainerName}`));
  meta.appendChild(el('div',null,`発行日: ${new Date().toLocaleDateString('ja-JP')}`));
  cl.appendChild(meta); ctop.appendChild(cl);
  const op=overallProgress(c);
  if(op){const col=op.pct>=100?'#1e8e5a':op.pct>=50?'#2563c0':'#c08a00';
    const ab=el('div','mr-ach');
    ab.appendChild(el('div','mr-ach-lbl',first.date===latest.date?'達成度（初回）':'総合達成度'));
    const big=el('div','mr-ach-pct',op.pct+'%'); big.style.color=col; ab.appendChild(big);
    ctop.appendChild(ab);}
  cover.appendChild(ctop); root.appendChild(cover);

  /* ── Before → After（初回 → 最新） ── */
  if(first.date!==latest.date){
    root.appendChild(el('h2',null,'Before → After'));
    const t=document.createElement('table');
    const thead=document.createElement('thead'),hr=document.createElement('tr');
    ['指標',`初回（${ymLabel(first.date)}）`,`最新（${ymLabel(latest.date)}）`,'変化'].forEach(h=>hr.appendChild(el('th',null,h)));
    thead.appendChild(hr); t.appendChild(thead);
    const tb=document.createElement('tbody');
    [['weight','kg'],['bodyFatPct','%'],['muscleMass','%']].forEach(([k,u])=>{
      const m=METRICS[k],tr=document.createElement('tr');
      tr.appendChild(el('td',null,m.lbl));
      tr.appendChild(el('td',null,first[k]!=null?fmt(first[k])+u:'—'));
      tr.appendChild(el('td',null,latest[k]!=null?fmt(latest[k])+u:'—'));
      let txt='—',cls=null;
      if(first[k]!=null&&latest[k]!=null){const d=latest[k]-first[k];
        txt=(d>0?'+':'')+fmt(d)+u;
        cls=Math.abs(d)<1e-9?null:((d<0)===(m.dir==='down')?'mr-down':'mr-up');}
      tr.appendChild(el('td',cls,txt)); tb.appendChild(tr);});
    t.appendChild(tb); root.appendChild(t);
  }

  /* ── 測定サマリー（最新・前回比） ── */
  root.appendChild(el('h2',null,'測定サマリー'));
  const boxes=el('div','mr-boxes');
  const mkBox=(lbl,key,unit,val,base)=>{
    const b=el('div','mr-box'); b.appendChild(el('small',null,lbl));
    const line=el('div'); line.appendChild(Object.assign(el('b'),{textContent:val!=null?fmt(val)+unit:'—'}));
    if(val!=null&&base!=null){const d=val-base;
      if(Math.abs(d)>=0.05){const[cls,arw]=deltaClass(key,d);
        const sp=el('span','mr-d '+(cls==='up'?'mr-down':cls==='down'?'mr-up':''),`${arw}${fmt(Math.abs(d))}${unit}`);
        // deltaClass: 'up'=good(緑) 'down'=bad(赤)。印刷では mr-down=緑/mr-up=赤に合わせる
        line.appendChild(sp);}}
    b.appendChild(line); return b;};
  boxes.appendChild(mkBox('体重','weight','kg',latest.weight,prev?.weight));
  boxes.appendChild(mkBox('体脂肪率','bodyFatPct','%',latest.bodyFatPct,prev?.bodyFatPct));
  boxes.appendChild(mkBox('骨格筋率','muscleMass','%',latest.muscleMass,prev?.muscleMass));
  boxes.appendChild(mkBox('BMI','weight','',bmiOf(latest),bmiOf(prev||{})));
  root.appendChild(boxes);

  /* ── 部位別の前月比較（腕・脚・体幹） ── */
  if(prev){
    const PARTS=[['両腕','arm'],['両脚','leg'],['体幹','trunk']];
    const SEGM=[['骨格筋率','M','%','up'],['皮下脂肪率','F','%','down']];
    const has=PARTS.some(([,p])=>SEGM.some(([,mk])=>prev[p+mk]!=null||latest[p+mk]!=null));
    if(has){
      root.appendChild(el('h2',null,'部位別の前月比較（腕・脚・体幹）'));
      const t=document.createElement('table');
      const thead=document.createElement('thead'),hr=document.createElement('tr');
      ['部位','指標',`前月（${ymLabel(prev.date)}）`,`当月（${ymLabel(latest.date)}）`,'変化'].forEach(h=>hr.appendChild(el('th',null,h)));
      thead.appendChild(hr); t.appendChild(thead);
      const tb=document.createElement('tbody');
      PARTS.forEach(([pl,p])=>SEGM.forEach(([ml,mk,u,dir])=>{
        const pv=prev[p+mk],cv=latest[p+mk],tr=document.createElement('tr');
        tr.appendChild(el('td',null,pl)); tr.appendChild(el('td',null,ml));
        tr.appendChild(el('td',null,pv!=null?fmt(pv)+u:'—'));
        tr.appendChild(el('td',null,cv!=null?fmt(cv)+u:'—'));
        let txt='—',cls=null;
        if(pv!=null&&cv!=null){const d=cv-pv; txt=(d>0?'+':'')+fmt(d)+u;
          cls=Math.abs(d)<1e-9?null:((d<0)===(dir==='down')?'mr-down':'mr-up');}
        tr.appendChild(el('td',cls,txt)); tb.appendChild(tr);}));
      t.appendChild(tb); root.appendChild(t);
    }
  }

  /* ── 目標と達成度 ── */
  if(c.goal&&['weight','bodyFatPct','muscleMass'].some(k=>c.goal[k]!=null)){
    root.appendChild(el('h2',null,'目標と達成度'));
    root.appendChild(el('div','mr-legend','青＝現在　／　緑＝目標'));
    const gb=el('div','mr-boxes');
    [['体重','weight','kg'],['体脂肪率','bodyFatPct','%'],['骨格筋率','muscleMass','%']].forEach(([lbl,k,u])=>{
      const g=c.goal[k]; if(g==null)return; const cur=latest[k];
      const box=el('div','mr-box'); box.appendChild(el('small',null,lbl));
      const row=el('div','mr-gb-row');
      row.appendChild(el('span','mr-gb-cur',cur!=null?fmt(cur)+u:'—'));
      row.appendChild(el('span','mr-gb-arrow','→'));
      row.appendChild(el('span','mr-gb-tgt',fmt(g)+u));
      box.appendChild(row);
      if(cur!=null){const rem=g-cur; box.appendChild(el('small','mr-gb-rem',Math.abs(rem)<0.05?'✓ 達成':`あと ${rem>0?'+':''}${fmt(rem)}${u}`));}
      gb.appendChild(box);});
    root.appendChild(gb);
  }

  /* ── 推移グラフ（体重・体脂肪率・骨格筋率） ── */
  if(a.length>=2){
    root.appendChild(el('h2',null,'推移グラフ'));
    const labels=a.map(r=>r.date.slice(0,7));
    [['weight','体重 (kg)','#4f9fff'],['bodyFatPct','体脂肪率 (%)','#ff8a5b'],['muscleMass','骨格筋率 (%)','#19c39a']].forEach(([k,cap,col],i)=>{
      if(!a.some(r=>r[k]!=null))return;
      const fig=el('figure','mr-chart'); const cv=repCanvas('mrc_'+i); fig.appendChild(cv);
      fig.appendChild(el('figcaption',null,cap)); root.appendChild(fig);
      repLine(cv,labels,a.map(r=>r[k]??null),col,c.goal?.[k]);});
  }

  /* ── 月次推移テーブル ── */
  if(a.length){
    root.appendChild(el('h2',null,'月次推移'));
    const t=document.createElement('table');
    const thead=document.createElement('thead'),hr=document.createElement('tr');
    ['年月','体重','体脂肪率','骨格筋率','BMI','前月比(体重)'].forEach(h=>hr.appendChild(el('th',null,h)));
    thead.appendChild(hr); t.appendChild(thead);
    const tb=document.createElement('tbody');
    a.forEach((r,i)=>{const p=i>0?a[i-1]:null,tr=document.createElement('tr'),bmi=bmiOf(r);
      tr.appendChild(el('td',null,ymLabel(r.date)));
      tr.appendChild(el('td',null,r.weight!=null?fmt(r.weight):'—'));
      tr.appendChild(el('td',null,r.bodyFatPct!=null?fmt(r.bodyFatPct):'—'));
      tr.appendChild(el('td',null,r.muscleMass!=null?fmt(r.muscleMass):'—'));
      tr.appendChild(el('td',null,bmi!=null?fmt(bmi):'—'));
      let txt='—',cls=null;
      if(p&&r.weight!=null&&p.weight!=null){const d=r.weight-p.weight; txt=(d>0?'+':'')+fmt(d)+'kg';
        cls=Math.abs(d)<1e-9?null:(d<0?'mr-down':'mr-up');}
      tr.appendChild(el('td',cls,txt)); tb.appendChild(tr);});
    t.appendChild(tb); root.appendChild(t);
  }

  root.appendChild(el('div','mr-disc','※ 本レポートは体組成データに基づく一般的な目安であり、医療診断ではありません。'));
  return true;
}

let _repPrevTitle=null;
function openReport(name){
  const c=CDB.get(name||S.active);
  if(!c){toast('顧客を選択してください');return;}
  if(!(c.records||[]).length){toast('記録がありません');return;}
  closeSheet();
  if(!buildMReport(c)){toast('記録がありません');return;}
  _repPrevTitle=document.title; document.title=`BODYVERSE_${repSan(c.name)}`;
  // canvas は responsive:false で同期描画済み。1〜2フレーム待ってから印刷。
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    (document.fonts&&document.fonts.ready||Promise.resolve()).then(()=>{
      try{window.print();}catch(e){toast('印刷を開けませんでした');}
    });
  }));
}
window.openReport=openReport;
window.addEventListener('afterprint',()=>{ if(_repPrevTitle!=null){document.title=_repPrevTitle;_repPrevTitle=null;} });

/* ════════ boot ════════ */
ensureActive(); syncTop();
setTab('home');
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
